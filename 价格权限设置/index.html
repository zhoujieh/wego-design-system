<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>价格权限设置</title>
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/page.css" />
  <link rel="stylesheet" href="./css/host-shell.css" />
</head>
<body data-bg="page" data-host-shell="true">
  <div class="preview-shell">
    <div class="phone-frame">
      <div class="phone-screen">
        <div class="phone-status" aria-hidden="true">
          <span>9:41</span>
          <span>5G</span>
        </div>
        <main class="host-shell-page" data-host-content>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="dongtai" hidden aria-label="动态"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="haoyou" hidden aria-label="好友"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="workspace" hidden aria-label="工作台"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="xiaoxi" hidden aria-label="消息"></section>
          <section class="host-shell-page__panel" data-host-tab="my" hidden>
            <section class="card card--surface host-shell-profile-card">
              <div class="card__content host-shell-profile">
                <div class="host-shell-profile__main">
                  <div class="avatar avatar--56 avatar--initials">微</div>
                  <div class="host-shell-profile__meta">
                    <div class="host-shell-profile__title-row">
                      <h1 class="host-shell-profile__title">微购相册·店主</h1>
                      <span class="badge badge--inline badge--text host-shell-profile__badge"><span class="badge__text">SVIP</span></span>
                    </div>
                    <p class="host-shell-profile__subtitle">超级管理员</p>
                  </div>
                </div>
                <div class="host-shell-profile__actions">
                  <button type="button" class="button button--secondary button--sm">+ 员工</button>
                  <button type="button" class="button button--secondary button--sm">员工管理</button>
                </div>
              </div>
            </section>

            <section class="card card--filled host-shell-membership-card">
              <div class="card__content host-shell-membership">
                <div class="host-shell-membership__header">
                  <span class="card__header host-shell-membership__label">SVIP 年度超级会员</span>
                  <button type="button" class="button button--primary button--sm">去续费</button>
                </div>
                <div class="host-shell-membership__body">
                  <div class="card__body host-shell-membership__usage">
                    <strong>90.33G</strong>
                    <span>/360G</span>
                  </div>
                  <button type="button" class="link link--default host-shell-link-button">空间管理</button>
                </div>
              </div>
            </section>

            <section class="card card--surface host-shell-app-card">
              <div class="card__content host-shell-app-card__content">
                <div class="host-shell-grid" data-entry-group="my-app-center">
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/一键开团.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">一键开团</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/店铺装修.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">店铺装修</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/收款码.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">收款码</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/我的小店.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">我的小店</span>
                  </button>
                </div>
              </div>
            </section>

            <section class="card card--surface host-shell-list-card">
              <div class="card__content host-shell-list-card__content">
                <div class="host-shell-list" data-entry-group="my-settings">
                  <button
                    type="button"
                    class="cell cell--single cell--bg-white cell--clickable cell--divider-center"
                    data-route-id="my-settings"
                    data-entry-label="设置"
                    data-screen-src="./pages/settings.html"
                  >
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">设置</span></div>
                      </div>
                      <div class="cell__action">
                        <span class="cell__action-text" data-my-summary>仅自己可见</span>
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                  <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-route-id="my-wallet">
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">我的钱包</span></div>
                      </div>
                      <div class="cell__action">
                        <span class="cell__action-text">￥0.02</span>
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                  <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-route-id="my-favorites">
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">我的收藏</span></div>
                      </div>
                      <div class="cell__action">
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                  <button type="button" class="cell cell--single cell--bg-white cell--clickable" data-route-id="my-coupons">
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">我的卡券</span></div>
                      </div>
                      <div class="cell__action">
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                </div>
              </div>
            </section>
          </section>
        </main>

        <div id="push-screen" class="push-screen" hidden></div>
        <div id="modal-overlay" class="modal-overlay" hidden></div>
        <div id="app-toast" class="app-toast" hidden></div>

        <nav class="bottom-nav">
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="dongtai">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-dongtai.svg" alt="" data-tab-icon="dongtai" /></span>
            <span class="bottom-nav__label">动态</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="haoyou">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-haoyou.svg" alt="" data-tab-icon="haoyou" /></span>
            <span class="bottom-nav__label">好友</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="workspace">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-gongzuotai.svg" alt="" data-tab-icon="gongzuotai" /></span>
            <span class="bottom-nav__label">工作台</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="xiaoxi">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-xiaoxi.svg" alt="" data-tab-icon="xiaoxi" /></span>
            <span class="bottom-nav__label">消息</span>
          </button>
          <button type="button" class="bottom-nav__item active" data-host-tab-trigger="my">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-active-wode.svg" alt="" data-tab-icon="wode" /></span>
            <span class="bottom-nav__label">我的</span>
          </button>
        </nav>
        <div class="phone-indicator" aria-hidden="true">
          <div class="phone-indicator-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <template id="template-settings-screen">
    <section class="screen-panel price-settings-page" data-screen="settings" data-bg="page">
      <div class="navbar">
        <div class="navbar__body">
          <div class="navbar__left">
            <button type="button" class="navbar__left-btn" data-close-screen aria-label="返回我的">
              <i class="wego-iconfont-s icon-fanhui"></i>
            </button>
          </div>
          <div class="navbar__center"><span class="navbar__title">设置</span></div>
          <div class="navbar__right"></div>
        </div>
      </div>
      <div class="page-body price-settings-page__body">
        <div class="price-settings-page__section-title">价格与可见性</div>
        <section class="cell-group price-settings-page__group">
          <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-open-modal="price-visibility">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">价格权限</span></div>
                <div class="cell__subtitle" data-summary-copy>仅自己可见</div>
              </div>
              <div class="cell__action">
                <div class="cell__action-badge">
                  <span class="badge badge--inline badge--text" data-summary-status><span class="badge__text">私密</span></span>
                </div>
                <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
              </div>
            </div>
          </button>
        </section>
        <p class="price-settings-page__helper">
          价格权限保存后立即生效，控制商品价格在相册、详情页和分享卡片的展示范围。
        </p>
      </div>
    </section>
  </template>

  <template id="template-price-visibility-screen">
    <section class="screen-panel price-visibility-page" data-screen="price-visibility" data-bg="page">
      <div class="navbar">
        <div class="navbar__body navbar__body--spaced">
          <div class="navbar__left">
            <button type="button" class="navbar__left-text" data-close-modal>取消</button>
          </div>
          <div class="navbar__center"><span class="navbar__title">价格权限</span></div>
          <div class="navbar__right navbar__right--button">
            <div class="navbar__action navbar__action--button">
              <button type="button" class="btn btn--strong btn--sm" data-save-rule>保存</button>
            </div>
          </div>
        </div>
      </div>

      <div class="page-body price-visibility-page__body">
        <div class="price-visibility-page__section-title">谁可以看到价格</div>
        <section class="cell-group price-visibility-page__group" data-visibility-group>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="visibilityMode" data-radio-value="private">
            <div class="cell__select">
              <div class="radio radio--sm" data-radio-control="visibilityMode" data-radio-value="private">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">私密</span></div>
                <div class="cell__subtitle">仅自己可见，相册和分享卡片都不展示价格</div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="visibilityMode" data-radio-value="public">
            <div class="cell__select">
              <div class="radio radio--sm" data-radio-control="visibilityMode" data-radio-value="public">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">公开</span></div>
                <div class="cell__subtitle">所有人可见，包括未关注客户</div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="visibilityMode" data-radio-value="allow">
            <div class="cell__select">
              <div class="radio radio--sm" data-radio-control="visibilityMode" data-radio-value="allow">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">谁可以看</span></div>
                <div class="cell__subtitle">仅选中的粉丝分组可以看到价格</div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-radio-option data-radio-group="visibilityMode" data-radio-value="deny">
            <div class="cell__select">
              <div class="radio radio--sm" data-radio-control="visibilityMode" data-radio-value="deny">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">不给谁看</span></div>
                <div class="cell__subtitle">选中的粉丝分组看不到价格，其他人都可见</div>
              </div>
            </div>
          </button>

          <div class="price-visibility-page__fan-group" data-fan-group-list hidden>
            <div class="price-visibility-page__fan-group-title" data-fan-group-title>选择可见的粉丝分组</div>
            <div class="cell-group price-visibility-page__fan-list" data-fan-list>
              <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="fanGroups" data-checkbox-value="all">
                <div class="cell__backspace"></div>
                <div class="cell__select">
                  <div class="checkbox checkbox--sm" data-checkbox-child="fanGroups" data-checkbox-value="all">
                    <div class="checkbox__inner"></div>
                    <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
                  </div>
                </div>
                <div class="cell__body">
                  <div class="cell__content">
                    <div class="cell__title-row"><span class="cell__title">全部粉丝</span></div>
                  </div>
                </div>
              </button>
              <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="fanGroups" data-checkbox-value="new">
                <div class="cell__backspace"></div>
                <div class="cell__select">
                  <div class="checkbox checkbox--sm" data-checkbox-child="fanGroups" data-checkbox-value="new">
                    <div class="checkbox__inner"></div>
                    <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
                  </div>
                </div>
                <div class="cell__body">
                  <div class="cell__content">
                    <div class="cell__title-row"><span class="cell__title">新客</span></div>
                  </div>
                </div>
              </button>
              <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="fanGroups" data-checkbox-value="vip">
                <div class="cell__backspace"></div>
                <div class="cell__select">
                  <div class="checkbox checkbox--sm" data-checkbox-child="fanGroups" data-checkbox-value="vip">
                    <div class="checkbox__inner"></div>
                    <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
                  </div>
                </div>
                <div class="cell__body">
                  <div class="cell__content">
                    <div class="cell__title-row"><span class="cell__title">老客VIP</span></div>
                  </div>
                </div>
              </button>
              <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="fanGroups" data-checkbox-value="agent">
                <div class="cell__backspace"></div>
                <div class="cell__select">
                  <div class="checkbox checkbox--sm" data-checkbox-child="fanGroups" data-checkbox-value="agent">
                    <div class="checkbox__inner"></div>
                    <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
                  </div>
                </div>
                <div class="cell__body">
                  <div class="cell__content">
                    <div class="cell__title-row"><span class="cell__title">代理分销</span></div>
                  </div>
                </div>
              </button>
              <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="fanGroups" data-checkbox-value="staff">
                <div class="cell__backspace"></div>
                <div class="cell__select">
                  <div class="checkbox checkbox--sm" data-checkbox-child="fanGroups" data-checkbox-value="staff">
                    <div class="checkbox__inner"></div>
                    <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
                  </div>
                </div>
                <div class="cell__body">
                  <div class="cell__content">
                    <div class="cell__title-row"><span class="cell__title">员工内购</span></div>
                  </div>
                </div>
              </button>
              <button type="button" class="cell cell--single cell--bg-white cell--clickable" data-checkbox-child-row data-checkbox-group="fanGroups" data-checkbox-value="silent">
                <div class="cell__backspace"></div>
                <div class="cell__select">
                  <div class="checkbox checkbox--sm" data-checkbox-child="fanGroups" data-checkbox-value="silent">
                    <div class="checkbox__inner"></div>
                    <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
                  </div>
                </div>
                <div class="cell__body">
                  <div class="cell__content">
                    <div class="cell__title-row"><span class="cell__title">沉默用户</span></div>
                  </div>
                </div>
              </button>
            </div>
          </div>
        </section>

        <p class="price-visibility-page__helper" data-visibility-summary>当前为私密，仅自己可见价格。</p>
      </div>
    </section>
  </template>

  <script src="./js/host-shell.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
