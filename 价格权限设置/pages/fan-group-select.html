<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>选择粉丝分组</title>
  <link rel="stylesheet" href="../lib/colors_and_type.css" />
  <link rel="stylesheet" href="../lib/components.css" />
  <link rel="stylesheet" href="../lib/iconfont.css" />
  <link rel="stylesheet" href="../css/page.css" />
</head>
<body data-bg="page">
  <header data-component="navbar" class="navbar">
    <div class="navbar__body navbar__body--spaced">
      <div class="navbar__left">
        <a class="navbar__left-btn" href="javascript:history.back()" data-position="left">
          <i class="wego-iconfont-s icon-fanhui"></i>
        </a>
      </div>
      <div class="navbar__center">
        <span class="navbar__title" data-page-title>选择粉丝分组</span>
      </div>
      <div class="navbar__right navbar__right--text">
        <div class="navbar__action navbar__action--text" data-action="done"><span class="navbar__action-label">完成</span></div>
      </div>
    </div>
  </header>

  <main class="page-body">
    <section class="section-group">
      <div class="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" data-action="new-group">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row">
              <span class="cell__title">新建分组</span>
              <span class="cell__title-icon wego-iconfont-s icon-yuanjia"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="section-title">选择分组</div>
    <section class="section-group" data-fan-group-list>
    </section>

    <p class="page-helper" data-empty-hint hidden>还没有粉丝分组,点击上方"新建分组"创建</p>
  </main>

  <div class="price-permission-page__dialog" data-new-group-dialog hidden>
    <div class="price-permission-page__dialog-mask" data-dialog-close></div>
    <div class="price-permission-page__dialog-panel">
      <div class="price-permission-page__dialog-title">新建分组</div>
      <input type="text" class="price-permission-page__dialog-input" placeholder="输入分组名称" maxlength="12" data-new-group-input />
      <div class="price-permission-page__dialog-actions">
        <button type="button" class="btn btn--medium btn--sm" data-dialog-close>取消</button>
        <button type="button" class="btn btn--strong btn--sm" data-new-group-confirm>确定</button>
      </div>
    </div>
  </div>

  <div class="page-body__toast" data-toast hidden></div>

  <script src="../js/app.js"></script>
</body>
</html>
