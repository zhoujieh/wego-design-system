<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>价格权限</title>
  <link rel="stylesheet" href="../lib/colors_and_type.css" />
  <link rel="stylesheet" href="../lib/components.css" />
  <link rel="stylesheet" href="../lib/iconfont.css" />
  <link rel="stylesheet" href="../css/page.css" />
</head>
<body data-bg="page">
  <header data-component="navbar" class="navbar">
    <div class="navbar__body navbar__body--spaced">
      <div class="navbar__left">
        <span class="navbar__left-text" data-action="cancel">取消</span>
      </div>
      <div class="navbar__center">
        <span class="navbar__title">价格权限</span>
      </div>
      <div class="navbar__right navbar__right--button">
        <div class="navbar__action navbar__action--button">
          <button type="button" class="btn btn--strong btn--sm" data-action="save">保存</button>
        </div>
      </div>
    </div>
  </header>

  <main class="page-body">
    <div class="section-title">谁能看到我的价格</div>
    <section class="section-group" data-mode-group="price-permission">
      <div class="cell cell--double cell--divider-right-edge cell--bg-white cell--clickable" data-mode="public">
        <div class="cell__select"><div class="radio"><div class="radio__inner"></div></div></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">公开</span></div>
            <div class="cell__subtitle">所有访客都能看到商品价格</div>
          </div>
        </div>
      </div>

      <div class="cell cell--double cell--divider-right-edge cell--bg-white cell--clickable" data-mode="private">
        <div class="cell__select"><div class="radio"><div class="radio__inner"></div></div></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">私密</span></div>
            <div class="cell__subtitle">仅自己可见,可设置自动公开时间</div>
          </div>
        </div>
      </div>

      <div class="cell cell--double cell--divider-right-edge cell--bg-white cell--clickable" data-mode="partial">
        <div class="cell__select"><div class="radio"><div class="radio__inner"></div></div></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">部分可见</span></div>
            <div class="cell__subtitle">仅选定粉丝分组可见</div>
          </div>
        </div>
      </div>

      <div class="cell cell--double cell--bg-white cell--clickable" data-mode="exclude">
        <div class="cell__select"><div class="radio"><div class="radio__inner"></div></div></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">不给谁看</span></div>
            <div class="cell__subtitle">选定粉丝分组不可见,其余人可见</div>
          </div>
        </div>
      </div>
    </section>

    <section class="section-group price-permission-page__conditional" data-conditional="private" hidden>
      <div class="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable">
        <div class="cell__backspace"></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">自动公开</span></div>
          </div>
          <div class="cell__action">
            <div class="switch switch--off" data-auto-public-switch><div class="switch__thumb"></div></div>
          </div>
        </div>
      </div>
      <div class="cell cell--single cell--bg-white cell--clickable" data-auto-public-time-row hidden>
        <div class="cell__backspace"></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">公开时间</span></div>
          </div>
          <div class="cell__action">
            <span class="cell__action-text" data-auto-public-time-label>未设置</span>
            <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
          </div>
        </div>
      </div>
    </section>

    <section class="section-group price-permission-page__conditional" data-conditional="partial" hidden>
      <div class="cell cell--single cell--bg-white cell--clickable" data-open-fan-group="partial">
        <div class="cell__backspace"></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">选择可见分组</span></div>
          </div>
          <div class="cell__action">
            <span class="cell__action-text" data-fan-group-summary="partial">未选择</span>
            <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
          </div>
        </div>
      </div>
    </section>

    <section class="section-group price-permission-page__conditional" data-conditional="exclude" hidden>
      <div class="cell cell--single cell--bg-white cell--clickable" data-open-fan-group="exclude">
        <div class="cell__backspace"></div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">选择屏蔽分组</span></div>
          </div>
          <div class="cell__action">
            <span class="cell__action-text" data-fan-group-summary="exclude">未选择</span>
            <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
          </div>
        </div>
      </div>
    </section>

    <div class="page-body__toast" data-toast hidden></div>
  </main>

  <div class="price-permission-page__picker" data-time-picker hidden>
    <div class="price-permission-page__picker-mask" data-time-picker-close></div>
    <div class="price-permission-page__picker-panel">
      <div class="price-permission-page__picker-header">
        <span class="navbar__left-text" data-time-picker-cancel>取消</span>
        <span class="price-permission-page__picker-title">选择公开时间</span>
        <span class="navbar__left-text" data-time-picker-confirm>确定</span>
      </div>
      <input type="datetime-local" class="price-permission-page__picker-input" data-time-picker-input />
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
