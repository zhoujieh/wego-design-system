<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
<style>
/* ═══ Page Layer: UIKit Shell & Phone Frame ═══ */
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-page);
  font-family: var(--body-md-font-family);
  -webkit-font-smoothing: antialiased;
}

.uikit-shell {
  width: 100%;
  max-width: 1184px;
  margin: 0 auto;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--spacer-16);
}

.uikit-sidebar, .uikit-main, .uikit-toolbar { min-width: 0; }
.uikit-sidebar { overflow: hidden; max-width: 100%; }

[data-component] { min-width: 0; max-width: 100%; overflow: hidden; }

.uikit-responsive-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--spacer-4);
}

.uikit-table-wrap {
  max-width: 100%;
  overflow-x: auto;
  overscroll-behavior-x: contain;
}

.uikit-truncate {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.uikit-nowrap {
  white-space: nowrap;
  flex-shrink: 0;
}

.uikit-action-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  max-width: 160px;
  overflow: hidden;
}

.uikit-action {
  min-width: 0;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══ Phone Frame ═══ */
.phone-frame {
  width: 390px;
  height: 780px;
  border-radius: 40px;
  border: 8px solid var(--bg-inverse);
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow-xl);
  background: var(--bg-page);
  flex-shrink: 0;
}

.phone-screen {
  width: 100%;
  height: 100%;
  border-radius: inherit;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-page);
}

/* ═══ Phone Internal: Status Bar, Header, Body, Bottom Nav, Home Indicator ═══ */
.phone-status {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--spacer-16);
  background: var(--bg-surface);
  font-size: var(--body-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
  flex-shrink: 0;
}

.phone-header {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 var(--spacer-16);
  background: var(--bg-surface);
  font-size: var(--heading-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
  flex-shrink: 0;
  gap: var(--spacer-8);
}

.phone-header-back {
  width: var(--size-32);
  height: var(--size-32);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: var(--radius-6);
  flex-shrink: 0;
}

.phone-header-back:hover {
  background: var(--bg-state-hover);
}

.phone-header-title {
  font-size: var(--heading-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.phone-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.phone-body::-webkit-scrollbar { display: none; }

.phone-indicator {
  height: 34px;
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.phone-indicator-bar {
  width: 134px;
  height: 5px;
  background: var(--bg-inverse);
  border-radius: var(--radius-full);
  opacity: 0.2;
}

/* ═══ Screen-specific Layout Helpers ═══ */
.section-pad {
  padding: var(--spacer-12);
}

.section-gap {
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.chip-row {
  display: flex;
  gap: var(--spacer-8);
  padding: var(--spacer-12);
  overflow-x: auto;
  flex-shrink: 0;
}

.chip-row::-webkit-scrollbar { display: none; }

.card-grid {
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.profile-section {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  padding: var(--spacer-16);
  display: flex;
  align-items: center;
  gap: var(--spacer-12);
}

.menu-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--spacer-12) var(--spacer-16);
  background: var(--bg-surface);
  cursor: pointer;
  min-width: 0;
}

.menu-item:hover {
  background: var(--bg-state-hover);
}

.menu-item:first-of-type {
  border-radius: var(--radius-12) var(--radius-12) 0 0;
}

.menu-item:last-of-type {
  border-radius: 0 0 var(--radius-12) var(--radius-12);
}

.menu-item:only-of-type {
  border-radius: var(--radius-12);
}

.menu-item + .menu-item {
  border-top: 1px solid var(--border-neutral-l1);
}

.menu-label {
  font-size: var(--body-lg-font-size);
  color: var(--text-default);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.menu-arrow {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.form-block {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  padding: var(--spacer-16);
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.form-actions {
  display: flex;
  gap: var(--spacer-8);
  margin-top: var(--spacer-8);
}

.color-select-row {
  display: flex;
  gap: var(--spacer-8);
  align-items: center;
}

.color-select-label {
  font-size: var(--body-md-font-size);
  color: var(--text-secondary);
  flex-shrink: 0;
}

.section-title {
  font-size: var(--body-sm-font-size);
  color: var(--text-tertiary);
  padding: var(--spacer-16) var(--spacer-16) var(--spacer-8);
}

.section-group {
  background: var(--bg-surface);
  width: 100%;
}

.section-gap {
  height: var(--spacer-8);
}

/* ═══ Responsive ═══ */
@media (max-width: 640px) {
  .uikit-shell {
    padding: var(--spacer-8);
    align-items: flex-start;
  }
  .phone-frame {
    width: 100%;
    height: auto;
    min-height: 100vh;
    border-radius: 0;
    border: none;
    box-shadow: none;
  }
}
</style>
</head>
<body>
<div class="uikit-shell" data-layout-guard="uikit-v1">

}

/* ═══ Home Indicator ═══ */
function HomeIndicator() {
  return (

  );
}

/* ═══ Bottom Navigation ═══ */
function BottomNav({ current, onNavigate }) {
  const tabs = [
    { id: 'home', label: '首页', icon: 'home' },
    { id: 'discover', label: '发现', icon: 'compass' },
    { id: 'cart', label: '购物车', icon: 'shopping-cart' },
    { id: 'profile', label: '我的', icon: 'user' }
  ];

  const handleNav = (id) => {
    if (id === 'home') {
      onNavigate(id);
    }
    if (id === 'profile') {
      onNavigate(id);
    }
  };

  return (
    <div data-component="bottom-nav" className="bottom-nav">
      {tabs.map(tab => (
        <div
          key={tab.id}
          className={`bottom-nav__item${current === tab.id ? ' active' : ''}`}
          onClick={() => handleNav(tab.id)}
        >
          <i data-lucide={tab.icon} className="bottom-nav__icon" style={{width:24,height:24}}></i>
          <span className="bottom-nav__label">{tab.label}</span>
          {tab.id === 'home' && <span className="badge badge--corner badge--dot"></span>}
          {tab.id === 'cart' && <span className="badge badge--corner badge--number badge--number-multi">99+</span>}
        </div>
      ))}
    </div>
  );
}

/* ═══ Screen 4: 业务设置 (岗位权限设置) ═══ */

    <div>
      <div style={{display:'flex',alignItems:'center',gap:'var(--spacer-8)',padding:'var(--spacer-16)',background:'var(--bg-surface)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'var(--spacer-4)',flex:1,minWidth:0}}>
          <div className="avatar avatar--24 avatar--initials">车</div>
          <span style={{fontSize:'var(--body-lg-font-size)',fontWeight:'var(--font-weight-medium)',color:'var(--text-default)'}}>车车</span>
          <div data-component="tag" className="tag tag--20 tag--brand-stroke uikit-nowrap"><span className="tag__label">管理员</span></div>
        </div>
        <a className="link link--inline" style={{fontSize:'var(--body-md-font-size)',flexShrink:0}}>切换岗位</a>
      </div>
      <div className="section-title">选款与上架</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('selection')}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">选款与上架</span></div></div>
            <div className="cell__action"><div className={`switch${switches.selection?' switch--on':' switch--off'}`}><div className="switch__thumb"></div></div></div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('contactInfo')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.contactInfo?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.contactInfo && <div className="checkbox__icon">{CHECK_SVG}</div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许查看上家的联系方式</span></div></div></div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('publishEdit')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.publishEdit?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.publishEdit && <div className="checkbox__icon">{CHECK_SVG}</div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许发布、编辑、上下架商品</span></div></div></div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('inventory')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.inventory?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.inventory && <div className="checkbox__icon">{CHECK_SVG}</div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许查看和编辑库存</span></div></div></div>
        </div>
      </div>
      <div className="section-gap"></div>
      <div className="section-title">订单</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('order')}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">订单</span></div></div>
            <div className="cell__action"><div className={`switch${switches.order?' switch--on':' switch--off'}`}><div className="switch__thumb"></div></div></div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('viewOrders')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.viewOrders?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.viewOrders && <div className="checkbox__icon">{CHECK_SVG}</div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许查看订单</span></div></div></div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('modifyOrder')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.modifyOrder?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.modifyOrder && <div className="checkbox__icon">{CHECK_SVG}</div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许修改订单(包括改单、改价等)</span></div></div></div>
        </div>
      </div>
      <div className="section-gap"></div>
      <div className="section-title">运营</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('ops')}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">运营</span></div></div>
            <div className="cell__action"><div className={`switch${switches.ops?' switch--on':' switch--off'}`}><div className="switch__thumb"></div></div></div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('createManageTask')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.createManageTask?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.createManageTask && <div className="checkbox__icon">{CHECK_SVG}</div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许创建并管理任务</span></div></div></div>
        </div>
      </div>
    </div>
  );
}

/* ═══ App Root ═══ */
function App() {
  const [screen, setScreen] = useState('home');

  useEffect(() => {
    lucide.createIcons();
  }, [screen]);

  return (
    <div className="phone-screen">
      <StatusBar />
      {screen === 'home' && (
        <div className="phone-header">
          <span className="phone-header-title">微购精选</span>
        </div>
      )}
      {screen === 'detail' && (
        <div className="phone-header">
          <div className="phone-header-back" onClick={() => setScreen('home')}>
            <i data-lucide="chevron-left" style={{width:24,height:24}}></i>
          </div>
          <span className="phone-header-title">商品详情</span>
        </div>
      )}
      {screen === 'profile' && (
        <div className="phone-header">
          <span className="phone-header-title">我的</span>
        </div>
      )}
      {screen === 'bizSettings' && (
        <div className="phone-header">
          <div className="phone-header-back" onClick={() => setScreen('profile')}>
            <i data-lucide="chevron-left" style={{width:24,height:24}}></i>
          </div>
          <span className="phone-header-title">岗位权限设置</span>
        </div>
      )}
      <div className="phone-body">
        {screen === 'home' && <HomeScreen onProductClick={() => setScreen('detail')} />}
        {screen === 'detail' && <DetailScreen />}
        {screen === 'profile' && <ProfileScreen onBizSettings={() => setScreen('bizSettings')} />}
        {screen === 'bizSettings' && <BizSettingsScreen onBack={() => setScreen('profile')} />}
      </div>
      <BottomNav current={screen === 'bizSettings' ? 'profile' : screen} onNavigate={setScreen} />
      <HomeIndicator />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>lucide.createIcons();</script>
</body>
</html>
