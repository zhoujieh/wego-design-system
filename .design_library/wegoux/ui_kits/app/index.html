<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../scaffold.css">
<link rel="stylesheet" href="../../iconfont.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* 在 iframe 中不允许 scaffold.css 的 min-height: 100% 撑满页面 */
html, body { min-height: auto; }

.uikit-sidebar, .uikit-main, .uikit-toolbar { min-width: 0; }
.uikit-sidebar { overflow: hidden; max-width: 100%; }

[data-component] { min-width: 0; max-width: 100%; }
[data-component]:not([data-component="bottom-nav"]) { overflow: hidden; }
[data-component="bottom-nav"] { overflow: visible; }

.uikit-responsive-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--spacer-4);
}

.uikit-table-wrap {
  max-width: 100%;
  overflow-x: auto;
  overscroll-behavior-x: contain;
}

.uikit-truncate {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.uikit-nowrap {
  white-space: nowrap;
  flex-shrink: 0;
}

.uikit-action-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  max-width: 160px;
  overflow: hidden;
}

.uikit-action {
  min-width: 0;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══ Phone Internal: NavBar, Body, Bottom Nav, Home Indicator ═══ */
.navbar.uikit-navbar {
  width: 100%;
}

.phone-status {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--spacer-16);
  background: var(--bg-surface);
  box-sizing: border-box;
  font-size: var(--body-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
  flex-shrink: 0;
}

.navbar.uikit-navbar .navbar__center--wide {
  grid-column: 1 / 8;
}

.navbar.uikit-navbar .navbar__left-btn {
  border-radius: var(--radius-6);
}

/* ═══ Screen-specific Layout Helpers ═══ */
.section-pad {
  padding: var(--spacer-12);
}

.section-gap {
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.chip-row {
  display: flex;
  gap: var(--spacer-8);
  padding: var(--spacer-12);
  overflow-x: auto;
  flex-shrink: 0;
}

.chip-row::-webkit-scrollbar { display: none; }

.card-grid {
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.profile-section {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  padding: var(--spacer-16);
  display: flex;
  align-items: center;
  gap: var(--spacer-12);
}

.form-block {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  padding: var(--spacer-16);
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.form-actions {
  display: flex;
  gap: var(--spacer-8);
  margin-top: var(--spacer-8);
}

.color-select-row {
  display: flex;
  gap: var(--spacer-8);
  align-items: center;
}

.color-select-label {
  font-size: var(--body-md-font-size);
  color: var(--text-secondary);
  flex-shrink: 0;
}

.section-title {
  font-size: var(--body-sm-font-size);
  color: var(--text-tertiary);
  padding: var(--spacer-16) var(--spacer-16) var(--spacer-8);
}

.section-group {
  background: var(--bg-surface);
  width: 100%;
}

.section-separator {
  height: var(--spacer-8);
}

.uikit-product-image {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  font-size: 28px;
}

.uikit-product-image--audio {
  background: var(--bg-brand-surface-l1);
}

.uikit-product-image--phone {
  background: var(--status-info-surface-l1);
}

.uikit-product-image--home {
  background: var(--status-warning-surface-l1);
}

.uikit-hero-image {
  width: 100%;
  height: 200px;
  border-radius: 0;
}

.uikit-hero-image .uikit-product-image {
  font-size: 64px;
}

.uikit-check-icon {
  width: 13px;
  height: 10px;
  display: block;
}
</style>
</head>
<body class="uikit-page">
<div class="uikit-shell" data-layout-guard="uikit-v1">

/* ═══ App NavBar ═══ */
function AppNavbar({ title, onBack }) {

/* ═══ Screen 4: 业务设置 (岗位权限设置) ═══ */
function BizSettingsScreen({ onBack }) {
  const [attributionChecked, setAttributionChecked] = useState(true);
  const [switches, setSwitches] = useState({
    selection: true, fans: true, order: true, purchase: true,
    delivery: true, finance: true, ops: true, warehouse: true
  });
  const toggleSwitch = (key) => setSwitches(prev => ({ ...prev, [key]: !prev[key] }));
  const [permissions, setPermissions] = useState({
    contactInfo: true, pinnedStatus: true, moments: true, followToggle: true,
    publishEdit: true, inventory: true, price: false,
    viewFans: true, approveFans: true, deleteFans: true, changeFansBinding: true,
    viewVisitors: true, createCustomer: true,
    viewOrders: true, createOrder: true, viewPhone: true,
    modifyOrder: true, modifySender: true, modifyPayment: true,
    purchaseOrder: true, viewSupplier: true, manageSupplier: true,
    buyFromUp: true, managePurchase: true, manageBackup: true,
    deliveryGoods: true, setShipping: true,
    walletOp: true, viewTransaction: true,
    privateDomain: true, createManageTask: true, shopDeco: true, marketingGames: true
  });
  const togglePermission = (key) => setPermissions(prev => ({ ...prev, [key]: !prev[key] }));

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:'var(--spacer-8)',padding:'var(--spacer-16)',background:'var(--bg-surface)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'var(--spacer-4)',flex:1,minWidth:0}}>
          <div className="avatar avatar--24 avatar--initials">车</div>
          <span style={{fontSize:'var(--body-lg-font-size)',fontWeight:'var(--font-weight-medium)',color:'var(--text-default)'}}>车车</span>
          <div data-component="tag" className="tag tag--20 tag--brand-stroke uikit-nowrap"><span className="tag__label">管理员</span></div>
        </div>
        <a className="link link--inline" style={{fontSize:'var(--body-md-font-size)',flexShrink:0}}>切换岗位</a>
      </div>
      <div className="section-title">选款与上架</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('selection')}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">选款与上架</span></div></div>
            <div className="cell__action"><div className={`switch${switches.selection?' switch--on':' switch--off'}`}><div className="switch__thumb"></div></div></div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('contactInfo')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.contactInfo?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.contactInfo && <div className="checkbox__icon"><CheckIcon /></div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许查看上家的联系方式</span></div></div></div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('publishEdit')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.publishEdit?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.publishEdit && <div className="checkbox__icon"><CheckIcon /></div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许发布、编辑、上下架商品</span></div></div></div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('inventory')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.inventory?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.inventory && <div className="checkbox__icon"><CheckIcon /></div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许查看和编辑库存</span></div></div></div>
        </div>
      </div>
      <div className="section-separator"></div>
      <div className="section-title">订单</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('order')}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">订单</span></div></div>
            <div className="cell__action"><div className={`switch${switches.order?' switch--on':' switch--off'}`}><div className="switch__thumb"></div></div></div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('viewOrders')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.viewOrders?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.viewOrders && <div className="checkbox__icon"><CheckIcon /></div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许查看订单</span></div></div></div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('modifyOrder')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.modifyOrder?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.modifyOrder && <div className="checkbox__icon"><CheckIcon /></div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许修改订单(包括改单、改价等)</span></div></div></div>
        </div>
      </div>
      <div className="section-separator"></div>
      <div className="section-title">运营</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('ops')}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">运营</span></div></div>
            <div className="cell__action"><div className={`switch${switches.ops?' switch--on':' switch--off'}`}><div className="switch__thumb"></div></div></div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('createManageTask')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.createManageTask?' checkbox--checked':''}`}><div className="checkbox__inner"></div>{permissions.createManageTask && <div className="checkbox__icon"><CheckIcon /></div>}</div>
          </div>
          <div className="cell__body"><div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许创建并管理任务</span></div></div></div>
        </div>
      </div>
    </div>
  );
}

/* ═══ App Root ═══ */
function App() {
  const [screen, setScreen] = useState('home');

  return (
    <div className="phone-screen">
      {screen === 'home' && <AppNavbar title="微购精选" />}
      {screen === 'detail' && <AppNavbar title="商品详情" onBack={() => setScreen('home')} />}
      {screen === 'profile' && <AppNavbar title="我的" />}
      {screen === 'bizSettings' && <AppNavbar title="岗位权限设置" onBack={() => setScreen('profile')} />}
      <div className="phone-body">
        {screen === 'home' && <HomeScreen onProductClick={() => setScreen('detail')} />}
        {screen === 'detail' && <DetailScreen />}
        {screen === 'profile' && <ProfileScreen onBizSettings={() => setScreen('bizSettings')} />}
        {screen === 'bizSettings' && <BizSettingsScreen onBack={() => setScreen('profile')} />}
      </div>
      <BottomNav current={screen} onNavigate={setScreen} />
      <HomeIndicator />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
