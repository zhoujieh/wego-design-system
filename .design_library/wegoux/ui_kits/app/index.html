<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../scaffold.css">
<link rel="stylesheet" href="../../iconfont.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* 在 iframe 中不允许 scaffold.css 的 min-height: 100% 撑满页面 */
html, body { min-height: auto; }

.uikit-sidebar, .uikit-main, .uikit-toolbar { min-width: 0; }
.uikit-sidebar { overflow: hidden; max-width: 100%; }

[data-component] { min-width: 0; max-width: 100%; }
[data-component]:not([data-component="bottom-nav"]) { overflow: hidden; }
[data-component="bottom-nav"] { overflow: visible; }

.uikit-responsive-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--spacer-4);
}

.uikit-table-wrap {
  max-width: 100%;
  overflow-x: auto;
  overscroll-behavior-x: contain;
}

.uikit-truncate {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.uikit-nowrap {
  white-space: nowrap;
  flex-shrink: 0;
}

.uikit-action-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  max-width: 160px;
  overflow: hidden;
}

.uikit-action {
  min-width: 0;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══ Phone Internal: NavBar, Body, Bottom Nav, Home Indicator ═══ */
.navbar.uikit-navbar {
  width: 100%;
}

.phone-status {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--spacer-16);
  background: var(--bg-surface);
  box-sizing: border-box;
  font-size: var(--body-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
  flex-shrink: 0;
}

.navbar.uikit-navbar .navbar__center--wide {
  grid-column: 1 / 8;
}

.navbar.uikit-navbar .navbar__left-btn {
  border-radius: var(--radius-6);
}

/* ═══ Screen-specific Layout Helpers ═══ */
.section-pad {
  padding: var(--spacer-12);
}

.section-gap {
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.chip-row {
  display: flex;
  gap: var(--spacer-8);
  padding: var(--spacer-12);
  overflow-x: auto;
  flex-shrink: 0;
}

.chip-row::-webkit-scrollbar { display: none; }

.card-grid {
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.profile-section {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  padding: var(--spacer-16);
  display: flex;
  align-items: center;
  gap: var(--spacer-12);
}

.form-block {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  padding: var(--spacer-16);
  display: flex;
  flex-direction: column;
  gap: var(--spacer-12);
}

.form-actions {
  display: flex;
  gap: var(--spacer-8);
  margin-top: var(--spacer-8);
}

.color-select-row {
  display: flex;
  gap: var(--spacer-8);
  align-items: center;
}

.color-select-label {
  font-size: var(--body-md-font-size);
  color: var(--text-secondary);
  flex-shrink: 0;
}

.section-title {
  font-size: var(--body-sm-font-size);
  color: var(--text-tertiary);
  padding: var(--spacer-16) var(--spacer-16) var(--spacer-8);
}

.section-group {
  background: var(--bg-surface);
  width: 100%;
}

.section-separator {
  height: var(--spacer-8);
}

.uikit-product-image {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  font-size: 28px;
}

.uikit-product-image--audio {
  background: var(--bg-brand-surface-l1);
}

.uikit-product-image--phone {
  background: var(--status-info-surface-l1);
}

.uikit-product-image--home {
  background: var(--status-warning-surface-l1);
}

.uikit-hero-image {
  width: 100%;
  height: 200px;
  border-radius: 0;
}

.uikit-hero-image .uikit-product-image {
  font-size: 64px;
}

.uikit-check-icon {
  width: 13px;
  height: 10px;
  display: block;
}

.uikit-section-title {
  font-size: var(--body-sm-font-size);
  color: var(--text-tertiary);
  padding: var(--spacer-16) var(--spacer-16) var(--spacer-8);
}

.uikit-section-group {
  background: var(--bg-surface);
  width: 100%;
}

.uikit-section-gap {
  height: var(--spacer-8);
}

.biz-summary {
  background: var(--bg-surface);
  padding: var(--spacer-16);
  display: flex;
  align-items: flex-start;
  gap: var(--spacer-12);
}

.biz-summary__main {
  flex: 1;
  min-width: 0;
}

.biz-summary__title-row {
  display: flex;
  align-items: center;
  gap: var(--spacer-8);
  min-width: 0;
}

.biz-summary__title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: var(--heading-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
}

.biz-summary__desc {
  margin-top: var(--spacer-4);
  font-size: var(--body-sm-font-size);
  line-height: var(--body-sm-line-height);
  color: var(--text-secondary);
}

.biz-summary__meta {
  margin-top: var(--spacer-8);
  display: flex;
  align-items: center;
  gap: var(--spacer-12);
}

.biz-summary__meta span {
  font-size: var(--body-sm-font-size);
  color: var(--text-tertiary);
}

.uikit-helper-text {
  padding: var(--spacer-12) var(--spacer-16) var(--spacer-20);
  font-size: var(--body-sm-font-size);
  line-height: var(--body-sm-line-height);
  color: var(--text-tertiary);
}

.uikit-modal-screen {
  position: absolute;
  inset: 0;
  z-index: var(--z-overlay);
  display: flex;
  flex-direction: column;
  background: var(--bg-page);
  transform: translateY(100%);
  transition: transform var(--duration-normal) var(--ease-enter);
  will-change: transform;
}

.uikit-modal-screen.is-open {
  transform: translateY(0);
}

.uikit-modal-screen .navbar {
  width: 100%;
  flex-shrink: 0;
}

.uikit-modal-screen .navbar__left-text,
.uikit-modal-screen .navbar__action-label {
  font-size: var(--body-lg-font-size);
}

.uikit-toast {
  position: absolute;
  left: 50%;
  bottom: 120px;
  transform: translate(-50%, 16px);
  padding: 8px 16px;
  border-radius: var(--radius-full);
  background: rgba(30, 32, 40, 0.82);
  color: var(--text-inverse);
  font-size: var(--body-sm-font-size);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--duration-fast) var(--ease-standard), transform var(--duration-fast) var(--ease-standard);
  z-index: var(--z-toast);
  white-space: nowrap;
}

.uikit-toast.is-visible {
  opacity: 1;
  transform: translate(-50%, 0);
}
</style>
</head>
<body class="uikit-page">
<div class="uikit-shell" data-layout-guard="uikit-v1">
  <div class="phone-frame">
    <div id="root"></div>
  </div>
</div>
<script type="text/babel">
const { useEffect, useState } = React;

/* ═══ App NavBar ═══ */
function AppNavbar({ title, onBack }) {
  return (
    <>
      <div className="phone-status">
        <span>9:41</span>
        <span>5G</span>
      </div>
      <div data-component="navbar" className="navbar uikit-navbar">
        <div className="navbar__body">
          <div className="navbar__left">
            {onBack && (
              <div className="navbar__left-btn" onClick={onBack} aria-label="返回">
                <i className="wego-iconfont-s icon-fanhui"></i>
              </div>
            )}
          </div>
          <div className={`navbar__center${onBack ? '' : ' navbar__center--wide'}`}>
            <span className="navbar__title">{title}</span>
          </div>
          <div className="navbar__right"></div>
        </div>
      </div>
    </>
  );
}

/* ═══ Home Indicator ═══ */
function HomeIndicator() {
  return (
    <div className="phone-indicator">
      <div className="phone-indicator-bar"></div>
    </div>
  );
}

/* ═══ Bottom Navigation ═══ */
function BottomNav({ current, onNavigate }) {
  const activeTab = current === 'profile' || current === 'bizSettings' ? 'wode' : 'dongtai';
  const iconSrc = (tab) => `../../assets/icons/tab-${activeTab === tab ? 'active-' : ''}${tab}.svg`;

  return (
    <nav data-component="bottom-nav" className="bottom-nav">
      <div className={`bottom-nav__item${activeTab === 'dongtai' ? ' active' : ''}`} data-tab="dongtai" onClick={() => onNavigate('home')}>
        <div className="bottom-nav__icon">
          <img src={iconSrc('dongtai')} width="32" height="32" alt="" />
        </div>
        <span className="bottom-nav__label">动态</span>
      </div>
      <div className={`bottom-nav__item${activeTab === 'haoyou' ? ' active' : ''}`} data-tab="haoyou">
        <div className="bottom-nav__icon">
          <img src={iconSrc('haoyou')} width="32" height="32" alt="" />
          <span className="badge badge--corner badge--number">6</span>
        </div>
        <span className="bottom-nav__label">好友</span>
      </div>
      <div className={`bottom-nav__item${activeTab === 'gongzuotai' ? ' active' : ''}`} data-tab="gongzuotai">
        <div className="bottom-nav__icon">
          <img src={iconSrc('gongzuotai')} width="32" height="32" alt="" />
          <span className="badge badge--corner badge--number badge--number-multi">18</span>
        </div>
        <span className="bottom-nav__label">工作台</span>
      </div>
      <div className={`bottom-nav__item${activeTab === 'xiaoxi' ? ' active' : ''}`} data-tab="xiaoxi">
        <div className="bottom-nav__icon">
          <img src={iconSrc('xiaoxi')} width="32" height="32" alt="" />
          <span className="badge badge--corner badge--number badge--number-multi">45</span>
        </div>
        <span className="bottom-nav__label">消息</span>
      </div>
      <div className={`bottom-nav__item${activeTab === 'wode' ? ' active' : ''}`} data-tab="wode" onClick={() => onNavigate('profile')}>
        <div className="bottom-nav__icon">
          <img src={iconSrc('wode')} width="32" height="32" alt="" />
          <span className="badge badge--corner badge--dot"></span>
        </div>
        <span className="bottom-nav__label">我的</span>
      </div>
    </nav>
  );
}

/* ═══ Screen 1: 首页 Home ═══ */
function HomeScreen({ onProductClick }) {
  return (
    <div className="section-gap">
      {/* Category Chips */}
      <div className="chip-row">
        <div data-component="tag" className="tag tag--32 tag--brand tag--selected uikit-nowrap"><span className="tag__label">全部</span></div>
        <div data-component="tag" className="tag tag--32 tag--gray tag--normal uikit-nowrap"><span className="tag__label">数码</span></div>
        <div data-component="tag" className="tag tag--32 tag--white tag--normal uikit-nowrap"><span className="tag__label">服饰</span></div>
        <div data-component="tag" className="tag tag--32 tag--gray tag--normal uikit-nowrap"><span className="tag__label">美妆</span></div>
        <div data-component="tag" className="tag tag--32 tag--white tag--normal uikit-nowrap"><span className="tag__label">食品</span></div>
        <div data-component="tag" className="tag tag--32 tag--white tag--normal uikit-nowrap"><span className="tag__label">家居</span></div>
      </div>

      {/* Product Cards */}
      <div className="section-pad card-grid">
        {/* Card 1 */}
        <div data-component="card" className="card card--surface" onClick={onProductClick} style={{cursor:'pointer'}}>
          <div className="card__media" style={{position:'relative', overflow:'visible'}}>
            <div data-component="image" className="wg-image wg-image--md wg-image--rounded-md">
              <div className="wg-image__src is-loaded uikit-product-image uikit-product-image--audio">
                <i className="wego-iconfont-s icon-shangpin"></i>
              </div>
            </div>
            <span
              className="badge badge--corner badge--text"
              style={{ '--badge-text-bg': 'var(--accent-green)', '--badge-text-color': 'var(--text-inverse)' }}
            ><span className="badge__text">NEW</span></span>
          </div>
          <div className="card__content">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',minWidth:0}}>
              <div className="uikit-truncate" style={{flex:1}}>
                <div className="card__header">Apple AirPods Pro</div>
                <div className="card__body">第二代 主动降噪 无线蓝牙耳机</div>
              </div>
              <div data-component="tag" className="tag tag--20 tag--brand-stroke uikit-nowrap"><span className="tag__label">新品</span></div>
            </div>
            <div className="card__footer">
              <span className="card__price">¥1,899</span>
            </div>
          </div>
        </div>

        {/* Card 2 */}
        <div data-component="card" className="card card--surface">
          <div className="card__media">
            <div data-component="image" className="wg-image wg-image--md wg-image--rounded-md">
              <div className="wg-image__src is-loaded uikit-product-image uikit-product-image--phone">
                <i className="wego-iconfont-s icon-shouji"></i>
              </div>
            </div>
          </div>
          <div className="card__content">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',minWidth:0}}>
              <div className="uikit-truncate" style={{flex:1}}>
                <div className="card__header">小米14 Ultra</div>
                <div className="card__body">徕卡光学 骁龙8Gen3 澎湃OS</div>
              </div>
              <div data-component="tag" className="tag tag--20 tag--white uikit-nowrap"><span className="tag__label">热销</span></div>
            </div>
            <div className="card__footer">
              <span className="card__price">¥5,999</span>
            </div>
          </div>
        </div>

        {/* Card 3 */}
        <div data-component="card" className="card card--surface">
          <div className="card__media">
            <div data-component="image" className="wg-image wg-image--md wg-image--rounded-md">
              <div className="wg-image__src is-loaded uikit-product-image uikit-product-image--home">
                <i className="wego-iconfont-s icon-tupian"></i>
              </div>
            </div>
          </div>
          <div className="card__content">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',minWidth:0}}>
              <div className="uikit-truncate" style={{flex:1}}>
                <div className="card__header">戴森V12吸尘器</div>
                <div className="card__body">轻量无线 激光探测 整机HEPA过滤</div>
              </div>
              <div data-component="tag" className="tag tag--20 tag--gray uikit-nowrap"><span className="tag__label">推荐</span></div>
            </div>
            <div className="card__footer">
              <span className="card__price">¥3,499</span>
            </div>
          </div>
        </div>
      </div>

      {/* Primary CTA Banner */}
      <div className="section-pad">
        <div style={{background:'var(--bg-brand-surface-l1)',borderRadius:'var(--radius-12)',padding:'var(--spacer-16)',display:'flex',alignItems:'center',justifyContent:'space-between',minWidth:0}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:'var(--body-md-font-size)',color:'var(--text-secondary)'}}>限时特惠</div>
            <div style={{fontSize:'var(--body-lg-font-size)',fontWeight:'var(--font-weight-semibold)',color:'var(--text-default)',marginTop:4}}>爆款直降 低至5折</div>
          </div>
          <button data-component="button" className="btn btn--strong btn--md uikit-nowrap">立即抢购</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ Screen 2: 商品详情 Detail ═══ */
function DetailScreen() {
  const [qty, setQty] = useState(1);

  return (
    <div className="section-gap">
      {/* Product Image */}
      <div data-component="image" className="wg-image uikit-hero-image">
        <div className="wg-image__src is-loaded uikit-product-image uikit-product-image--audio">
          <i className="wego-iconfont-s icon-shangpin"></i>
        </div>
      </div>

      {/* Product Info Card */}
      <div className="section-pad">
        <div data-component="card" className="card card--surface">
          <div className="card__content">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',minWidth:0}}>
              <div className="uikit-truncate" style={{flex:1}}>
                <div className="card__header">Apple AirPods Pro (第二代)</div>
                <div className="card__body" style={{marginTop:4}}>主动降噪 自适应音频 通透模式</div>
              </div>
            </div>
            <div style={{display:'flex',gap:'var(--spacer-8)',marginTop:'var(--spacer-8)',flexWrap:'wrap'}}>
              <div data-component="tag" className="tag tag--20 tag--brand-stroke uikit-nowrap"><span className="tag__label">新品</span></div>
              <div data-component="tag" className="tag tag--20 tag--white uikit-nowrap"><span className="tag__label">官方正品</span></div>
              <div data-component="tag" className="tag tag--20 tag--gray uikit-nowrap"><span className="tag__label">2年保修</span></div>
            </div>
            <div className="card__footer" style={{marginTop:'var(--spacer-8)'}}>
              <span className="card__price">¥1,899.00</span>
            </div>
          </div>
        </div>
      </div>

      {/* Color Selection */}
      <div className="section-pad">
        <div className="color-select-row" style={{marginBottom:'var(--spacer-8)'}}>
          <span className="color-select-label">颜色选择</span>
        </div>
        <div style={{display:'flex',gap:'var(--spacer-8)'}}>
          <div data-component="tag" className="tag tag--32 tag--brand tag--selected uikit-nowrap"><span className="tag__label">白色</span></div>
          <div data-component="tag" className="tag tag--32 tag--white tag--normal uikit-nowrap"><span className="tag__label">黑色</span></div>
        </div>
      </div>

      {/* Quantity Selector */}
      <div className="section-pad">
        <div className="color-select-label" style={{marginBottom:'var(--spacer-8)'}}>数量</div>
        <div data-component="counter" className="counter" data-counter data-counter-min="1">
          <div className="counter__body">
          <button
            className="counter__btn counter__btn--minus"
            type="button"
            aria-label="减少"
            onClick={() => setQty(Math.max(1, qty - 1))}
          >
            <i className="counter__icon icon-jian16"></i>
          </button>
          <input className="counter__value" type="text" inputMode="numeric" value={qty} readOnly />
          <button
            className="counter__btn counter__btn--plus"
            type="button"
            aria-label="增加"
            onClick={() => setQty(qty + 1)}
          >
            <i className="counter__icon icon-jia16"></i>
          </button>
          </div>
          <div className="counter__message counter__hint"></div>
          <div className="counter__message counter__error"></div>
        </div>
      </div>

      {/* Action Buttons */}
      <div className="section-pad" style={{display:'flex',gap:'var(--spacer-8)'}}>
        <button data-component="button" className="btn btn--strong btn--lg uikit-nowrap" style={{flex:1}}>加入购物车</button>
      </div>
      <div className="section-pad" style={{paddingTop:0,display:'flex',gap:'var(--spacer-8)'}}>
        <button data-component="button" className="btn btn--medium btn--lg uikit-nowrap" style={{flex:1}}>立即购买</button>
        <button data-component="button" className="btn btn--weak btn--lg uikit-nowrap" style={{flex:1}}>
          <i className="btn__icon icon-shoucang"></i>收藏
        </button>
      </div>
    </div>
  );
}

/* ═══ Screen 3: 我的 Profile ═══ */
function ProfileScreen({ onBizSettings }) {
  return (
    <div className="section-gap">
      {/* User Profile */}
      <div className="section-pad">
        <div className="profile-section">
          <div data-component="avatar" className="avatar avatar--56 avatar--initials uikit-nowrap">张</div>
          <div style={{minWidth:0,flex:1}}>
            <div className="uikit-truncate" style={{fontSize:'var(--heading-sm-font-size)',fontWeight:'var(--font-weight-semibold)',color:'var(--text-default)'}}>张小明</div>
            <div style={{display:'flex',alignItems:'center',gap:'var(--spacer-4)',marginTop:'var(--spacer-4)'}}>
              <div data-component="tag" className="tag tag--20 tag--brand-stroke uikit-nowrap"><span className="tag__label">金牌会员</span></div>
            </div>
          </div>
          <i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
        </div>
      </div>

      {/* Menu List */}
      <div className="section-pad" style={{paddingTop:0}}>
        <div data-component="cell" className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable">
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">我的订单</span></div></div>
            <div className="cell__action">
              <div className="cell__action-badge"><span className="badge badge--inline badge--number">2</span></div>
              <i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
            </div>
          </div>
        </div>
        <div data-component="cell" className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={onBizSettings}>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">业务设置</span></div></div>
            <div className="cell__action"><i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i></div>
          </div>
        </div>

/* ═══ Checkbox SVG asset helper ═══ */
function CheckIcon() {
  return <img className="checkbox__asset uikit-check-icon" src="../../assets/icons/checkbox-check.svg" alt="" />;
}

/* ═══ Screen 4: 业务设置（全屏模态） ═══ */
function BizSettingsContent() {

    exportData: true,
    editPrice: false,
    notifyMembers: true

          </div>
          <div className="biz-summary__desc">适用于业务数据管理、成员协作和提醒策略统一配置。</div>
          <div className="biz-summary__meta">
            <span>最近保存：今天 09:20</span>
            <a data-component="link" className="link">查看说明</a>

        </div>
      </div>

      <div className="uikit-section-title">基础信息</div>
      <div className="uikit-section-group">

          <div className="form-body">
            <div className="form-body__label">方案名称</div>
            <div className="form-body__action">
              <input
                type="text"
                value={planName}

              />
            </div>
          </div>
          <div className="form-body form-body--clickable">
            <div className="form-body__label">负责人</div>
            <div className="form-body__action">
              <div className="form-body__select">
                <span className="form-body__select-text has-value">商品运营组</span>
                <i className="form-body__select-arrow wego-iconfont-s icon-youjiantou16"></i>
              </div>
            </div>
          </div>
          <div className="form-body form-body--clickable">
            <div className="form-body__label">同步频率</div>
            <div className="form-body__action">
              <div className="form-body__select">
                <span className="form-body__select-text has-value">每30分钟</span>
                <i className="form-body__select-arrow wego-iconfont-s icon-youjiantou16"></i>
              </div>
            </div>
          </div>
          <div className="form-body">
            <div className="form-body__label">统计口径</div>
            <div className="form-body__action">
              <div className="form-body__radio-group">

                    <div className="radio__dot"></div>
                  </div>
                  <span>全店汇总</span>
                </div>
                <div className="form-body__radio-item" onClick={() => setReportCycle('shop')}>
                  <div className={`radio radio--sm${reportCycle === 'shop' ? ' radio--checked' : ''}`}>
                    <div className="radio__inner"></div>
                    <div className="radio__dot"></div>
                  </div>
                  <span>按门店</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="uikit-section-gap"></div>
      <div className="uikit-section-title">规则与提醒</div>
      <div className="uikit-section-group">
        <div className="cell cell--double cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('autoSync')}>

            </div>

          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => toggleSwitch('stockAlert')}>

            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">可见范围</span></div></div>
            <div className="cell__action">
              <span className="cell__action-text">全部导购</span>
              <i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i>

        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable">

        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('exportData')}>

            </div>

          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许修改售价</span></div></div>

        </div>
        <div className="cell cell--double cell--divider-right-edge cell--bg-white cell--clickable" onClick={() => togglePermission('notifyMembers')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.notifyMembers ? ' checkbox--checked' : ''}`}>
              <div className="checkbox__inner"></div>
              {permissions.notifyMembers && <div className="checkbox__icon"><CheckIcon /></div>}
            </div>
          </div>
          <div className="cell__body">
            <div className="cell__content">
              <div className="cell__title-row"><span className="cell__title">保存后通知相关成员</span></div>
              <div className="cell__subtitle">保存生效后，通过站内消息通知受影响成员。</div>
            </div>
          </div>
        </div>
      </div>

      <div className="uikit-helper-text">主操作仅放在顶部导航栏，内容区和底部不重复放保存按钮。</div>
    </div>
  );
}

function BizSettingsModal({ isOpen, onCancel, onSave }) {
  return (
    <div className={`uikit-modal-screen${isOpen ? ' is-open' : ''}`}>
      <StatusBar />
      <div data-component="navbar" className="navbar">
        <div className="navbar__body navbar__body--spaced">
          <div className="navbar__left">
            <span className="navbar__left-text" onClick={onCancel}>取消</span>
          </div>
          <div className="navbar__center">
            <span className="navbar__title">业务设置</span>
          </div>
          <div className="navbar__right navbar__right--text">
            <div className="navbar__action navbar__action--text" onClick={onSave}>
              <span className="navbar__action-label">保存</span>
            </div>
          </div>
        </div>
      </div>
      <div className="phone-body">
        <BizSettingsContent />
      </div>
      <HomeIndicator />
    </div>
  );
}

/* ═══ App Root ═══ */
function App() {
  const [screen, setScreen] = useState('home');
  const [bizSettingsMounted, setBizSettingsMounted] = useState(false);
  const [bizSettingsOpen, setBizSettingsOpen] = useState(false);
  const [toast, setToast] = useState('');

  useEffect(() => {
    if (!toast) return undefined;
    const timer = window.setTimeout(() => setToast(''), 1500);
    return () => window.clearTimeout(timer);
  }, [toast]);

  const openBizSettings = () => {
    setScreen('profile');
    setBizSettingsMounted(true);
    window.setTimeout(() => setBizSettingsOpen(true), 16);
  };

  const closeBizSettings = () => {
    setBizSettingsOpen(false);
    window.setTimeout(() => setBizSettingsMounted(false), 260);
  };

  const saveBizSettings = () => {
    setToast('已保存业务设置');
    closeBizSettings();
  };

  return (
    <div className="phone-screen">
      {screen === 'home' && <AppNavbar title="微购精选" />}
      {screen === 'detail' && <AppNavbar title="商品详情" onBack={() => setScreen('home')} />}
      {screen === 'profile' && <AppNavbar title="我的" />}
      <div className="phone-body">
        {screen === 'home' && <HomeScreen onProductClick={() => setScreen('detail')} />}
        {screen === 'detail' && <DetailScreen />}
        {screen === 'profile' && <ProfileScreen onBizSettings={openBizSettings} />}
      </div>
      <BottomNav current={screen} onNavigate={setScreen} />
      <HomeIndicator />
      {bizSettingsMounted ? <BizSettingsModal isOpen={bizSettingsOpen} onCancel={closeBizSettings} onSave={saveBizSettings} /> : null}
      <div className={`uikit-toast${toast ? ' is-visible' : ''}`}>{toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
