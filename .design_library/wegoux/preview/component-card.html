<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin:0; padding:32px !important; background:var(--color-bg-page); font-family:var(--font-family-text); color:var(--color-text-primary); }
.row { display:flex; gap:var(--space-8); align-items:flex-start; margin-bottom:var(--space-8); }
.label { font-size:var(--font-size-10); color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:.5px; flex-shrink:0; width:92px; padding-top:4px; white-space:nowrap; }
.divider { border:none; border-top:1px solid var(--color-divider-default); margin:var(--space-8) 0; }

/* @component-css-start */
.card { display:flex; flex-direction:column; gap:var(--space-12); font-family:var(--font-family-text); color:var(--color-text-primary); flex:1; min-width:0; }
.card--elevated { background:var(--color-bg-surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); padding:var(--space-16); }
.card--outlined { background:var(--color-bg-surface); border:1px solid var(--color-border-default); border-radius:var(--radius-md); padding:var(--space-16); }
.card--filled { background:var(--color-bg-subtle); border-radius:var(--radius-md); padding:var(--space-12); }
.card__media { width:100%; height:150px; background:var(--color-bg-muted); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:var(--font-size-12); color:var(--color-text-tertiary); flex-shrink:0; }
.card__header { font-size:var(--font-size-16); font-weight:var(--font-weight-semibold); line-height:var(--font-lineheight-16); }
.card__body { font-size:var(--font-size-14); color:var(--color-text-secondary); line-height:var(--font-lineheight-14); }
.card__footer { font-size:var(--font-size-12); color:var(--color-text-tertiary); display:flex; gap:var(--space-8); align-items:center; }
.card__price { font-size:var(--font-size-18); font-weight:var(--font-weight-semibold); color:var(--color-text-primary); }
.card__tag { display:inline-block; background:var(--color-bg-muted); border-radius:var(--radius-xs); padding:var(--space-2) var(--space-4); font-size:var(--font-size-10); color:var(--color-text-secondary); white-space:nowrap; }
/* @component-css-end */
</style>
</head>
<body>
<div class="row">
  <span class="label">浮起</span>
  <div class="card card--elevated" data-evidence-sample="elevated-default">
    <div class="card__media">商品图片</div>
    <div class="card__header">经典款帆布鞋</div>
    <div class="card__body">舒适透气，简约百搭，适合日常休闲穿着</div>
    <div class="card__footer">
      <span class="card__price">¥299</span>
      <span class="card__tag">热卖</span>
    </div>
  </div>
</div>
<hr class="divider">
<div class="row">
  <span class="label">线框</span>
  <div class="card card--outlined" data-evidence-sample="outlined-default">
    <div class="card__header">订单通知</div>
    <div class="card__body">您的订单已发货，预计3-5个工作日送达</div>
    <div class="card__footer">2025-06-27 14:30</div>
  </div>
</div>
<div class="row">
  <span class="label">填充</span>
  <div class="card card--filled" data-evidence-sample="filled-compact">
    <div class="card__body">账户余额 <span class="card__price">¥1,280.00</span></div>
    <div class="card__footer">最近更新：今日 10:00</div>
  </div>
</div>
</body>
</html>
