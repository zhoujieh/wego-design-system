<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: 32px !important; background: var(--color-bg-page); font-family: var(--font-family-text); color: var(--color-text-primary); }
.preview-phone { width: 375px; margin: 0 auto var(--space-32); background: var(--color-bg-surface); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md); }
.preview-phone__content { min-height: 520px; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); font-size: var(--font-size-14); }
.label { font-size: var(--font-size-12); color: var(--color-text-secondary); margin-bottom: var(--space-12); text-align: center; }
.divider { border: none; border-top: 1px solid var(--color-divider-default); margin: var(--space-24) 0; }

/* @component-css-start */

/* ── Bottom Nav ──────────────────────────────────────────────── */
/* @anatomy
   <nav class="bottom-nav">
     <div class="bottom-nav__item [active]" data-tab="tab-key">
       <div class="bottom-nav__icon">
         [inline svg or img]
         [<span class="badge badge--corner badge--number [badge--number-multi]">6</span>]
         [<span class="badge badge--corner badge--dot"></span>]
       </div>
       <span class="bottom-nav__label">Tab</span>
     </div>
   </nav>
*/
.bottom-nav {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  justify-content: space-around;
  width: 100%;
  background: var(--color-bg-surface);
  border-top: 0.5px solid var(--color-border-default);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  flex-shrink: 0;
}

.bottom-nav__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  flex: 1 0 0;
  min-width: 0;
  cursor: pointer;
  height: var(--size-56);
  padding: 0 var(--space-16);
  color: var(--color-text-primary);
  position: relative;
}

.bottom-nav__item.active { color: var(--color-brand); }

.bottom-nav__icon {
  width: var(--size-32);
  height: var(--size-32);
  flex-shrink: 0;
  position: relative;
}

.bottom-nav__icon svg,
.bottom-nav__icon img {
  width: 100%;
  height: 100%;
  display: block;
}

.bottom-nav__label {
  font-family: var(--font-family-text);
  font-size: var(--font-size-10);
  font-weight: var(--font-weight-regular);
  line-height: normal;
  white-space: nowrap;
  font-feature-settings: "zero";
}

/* ── Badge 复用说明 ─────────────────────────────────────── */
/* 直接复用 Badge 组件 class（已通过 components.css 引入）:
   数字角标: <span class="badge badge--corner badge--number [badge--number-multi]">6</span>
   红点:     <span class="badge badge--corner badge--dot"></span> */

/* @component-css-end */
</style>
</head>

/* Click handler — switch active tab immediately, no press/hover animation */
document.querySelectorAll('.bottom-nav').forEach(nav => {
  nav.querySelectorAll('.bottom-nav__item').forEach(item => {
    item.addEventListener('click', () => {
      const tab = item.dataset.tab;
      if (!tab) return;

      nav.querySelectorAll('.bottom-nav__item').forEach(el => {
        el.classList.remove('active');
        const t = el.dataset.tab;
        if (t && ICONS[t]) {
          /* Only replace the SVG icon, preserve badge elements */
          const iconWrap = el.querySelector('.bottom-nav__icon');
          const badge = iconWrap.querySelector('.badge');
          iconWrap.innerHTML = ICONS[t].default;
          if (badge) iconWrap.appendChild(badge);
        }
      });

      item.classList.add('active');
      if (ICONS[tab]) {
        const iconWrap = item.querySelector('.bottom-nav__icon');
        const badge = iconWrap.querySelector('.badge');
        iconWrap.innerHTML = ICONS[tab].active;
        if (badge) iconWrap.appendChild(badge);
      }
    });
  });
});
</script>
