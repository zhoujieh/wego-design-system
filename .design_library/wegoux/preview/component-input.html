<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>输入框 - 微购设计系统</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>
.specimen { display: flex; flex-direction: column; gap: var(--space-0); }
.stage { display: flex; flex-direction: column; gap: var(--space-0); }
.story { display: flex; flex-direction: column; gap: var(--space-8); margin-bottom: var(--space-12); }
.story:last-child { margin-bottom: var(--space-0); }
.story-label { width: 92px; flex-shrink: 0; font-size: var(--font-size-12); font-weight: var(--font-weight-medium); color: var(--color-text-secondary); line-height: var(--font-lineheight-12); }
.rail { display: flex; gap: var(--space-16); align-items: flex-start; flex-wrap: wrap; }

/* @component-css-start */
.input-group { display: flex; flex-direction: column; gap: var(--space-8); width: 100%; max-width: 320px; flex-shrink: 0; position: relative; }
.input-group .field-label { font-size: var(--font-size-14); font-weight: var(--font-weight-medium); color: var(--color-text-primary); line-height: var(--font-lineheight-14); white-space: nowrap; }
.input-group input, .input-group textarea { width: 100%; box-sizing: border-box; border: 1px solid var(--color-border-default); border-radius: var(--radius-sm); background: var(--color-bg-surface); color: var(--color-text-primary); font-size: 14px; font-family: var(--font-family-text); line-height: 14px; padding: 0 12px; outline: none; transition: border-color var(--duration-fast) var(--ease-standard); }
.input-group input { height: 36px; }
.input-group textarea { min-height: 96px; resize: vertical; padding: 8px; }
.input-group input::placeholder, .input-group textarea::placeholder { color: var(--color-text-placeholder); }
.input-group input:focus, .input-group textarea:focus { border-color: var(--color-brand); }
.input-group.is-error input, .input-group.is-error textarea { border-color: var(--color-danger); color: var(--color-danger); }
.input-group.is-disabled input, .input-group.is-disabled textarea { background: var(--color-bg-muted); color: var(--color-text-disabled); cursor: not-allowed; }
.input-group.is-disabled .field-label { color: var(--color-text-disabled); }

/* ── Input Wrapper & Clear Button ─────────────────────────── */
.input-wrapper { position: relative; }
.input-wrapper input { padding-right: 36px; }
.input-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: none; background: none; border: none; cursor: pointer; padding: 4px; line-height: 1; }
.input-clear i { font-family: "wego-iconfont-s"; font-size: 16px; font-style: normal; color: var(--color-text-placeholder); }
.input-group.is-error .input-clear i { color: var(--color-danger); }
.input-group.is-disabled .input-clear { display: none !important; }

/* ── Field Error ───────────────────────────────────────────── */
.field-error { position: absolute; top: 100%; left: 0; margin-top: 0; white-space: nowrap; display: none; font-size: var(--font-size-10); color: var(--color-danger); }
.input-group.is-error .field-error { display: block; }

/* ── Number Input (数字输入框) ──────────────────────────────── */
.number-input { display: flex; align-items: center; gap: var(--space-8); width: 120px; min-width: 80px; max-width: 128px; height: var(--size-32); padding: 6px var(--space-8); background: var(--color-bg-subtle); border: 0.5px solid var(--color-border-default); border-radius: var(--radius-sm); box-sizing: border-box; transition: border-color var(--duration-fast) var(--ease-standard), background var(--duration-fast) var(--ease-standard); }
.number-input__field { flex: 1 1 0; min-width: 0; border: none; outline: none; background: transparent; text-align: center; font-family: var(--font-family-number); font-size: var(--font-size-16); font-weight: var(--font-weight-medium); color: var(--color-text-primary); line-height: 20px; padding: 0; font-feature-settings: "zero"; }
.number-input__field::placeholder { color: var(--color-text-disabled); font-size: var(--font-size-14); font-weight: var(--font-weight-regular); }
.number-input__suffix { flex-shrink: 0; font-size: var(--font-size-14); font-weight: var(--font-weight-regular); color: var(--color-text-secondary); text-align: right; white-space: nowrap; font-feature-settings: "zero"; }
/* Focus */
.number-input.is-focus { border-color: var(--color-text-primary); }
/* Error */
.number-input.is-error { background: var(--color-status-danger-surface-l1); border-color: var(--color-status-danger-border); }
.number-input.is-error .number-input__field { color: var(--color-danger); }
/* Disabled */
.number-input.is-disabled { opacity: 0.5; pointer-events: none; }
/* @component-css-end */
</style>
</head>
<body>
<div class="pv-header"><h1>输入框</h1><p>独立输入框，支持 text/textarea、聚焦、错误、禁用状态。</p></div>
<div class="specimen">
<div class="stage">
<!-- Text Input -->
<div class="story">
<span class="story-label">标准文本输入</span>
<div class="rail">
<div class="input-group">
<span class="field-label">手机号</span>
<div class="input-wrapper">
<input type="text" placeholder="请输入手机号码">
<button type="button" class="input-clear"><i class="icon-yuancha-mian"></i></button>
</div>
</div>
<div class="input-group">
<span class="field-label">手机号</span>
<div class="input-wrapper">
<input type="text" value="13800138000">
<button type="button" class="input-clear"><i class="icon-yuancha-mian"></i></button>
</div>
</div>
<div class="input-group is-error">
<span class="field-label">手机号</span>
<div class="input-wrapper">
<input type="text" value="15011102223">
<button type="button" class="input-clear"><i class="icon-yuancha-mian"></i></button>
</div>
<span class="field-error">请输入正确的手机号码</span>
</div>
<div class="input-group is-disabled">
<span class="field-label">手机号</span>
<div class="input-wrapper">
<input type="text" value="13800138000" disabled>
<button type="button" class="input-clear"><i class="icon-yuancha-mian"></i></button>
</div>
</div>
</div>
</div>
<!-- Textarea -->
<div class="story">
<span class="story-label">多行文本输入</span>
<div class="rail">
<div class="input-group">
<span class="field-label">备注</span>
<textarea placeholder="请输入备注信息（最多200字）"></textarea>
</div>
<div class="input-group">
<span class="field-label">备注</span>
<textarea>商品已收到，包装完好，物流很快。</textarea>
</div>
</div>
</div>
<!-- Number Input -->
<div class="story">
<span class="story-label">数字输入框</span>
<div class="rail">
<div class="number-input" data-number-input>
<input class="number-input__field" type="text" inputmode="decimal" placeholder="请输入">
<span class="number-input__suffix">元</span>
</div>
<div class="number-input" data-number-input>
<input class="number-input__field" type="text" inputmode="decimal" value="888">
<span class="number-input__suffix">元</span>
</div>
<div class="number-input is-error" data-number-input>
<input class="number-input__field" type="text" inputmode="decimal" value="888">
<span class="number-input__suffix">元</span>
</div>
<div class="number-input is-error" data-number-input>
<input class="number-input__field" type="text" inputmode="decimal" placeholder="请输入">
<span class="number-input__suffix">元</span>
</div>
<div class="number-input is-disabled">
<input class="number-input__field" type="text" inputmode="decimal" value="888" disabled>
<span class="number-input__suffix">元</span>
</div>
</div>
</div>
</div>
</div>
<script>
// ── Number Input: focus state ──
document.querySelectorAll('[data-number-input]').forEach(wrapper => {
  const field = wrapper.querySelector('.number-input__field');
  field.addEventListener('focus', () => wrapper.classList.add('is-focus'));
  field.addEventListener('blur', () => wrapper.classList.remove('is-focus'));
});

// ── Text Input: clear button visibility ──
document.querySelectorAll('.input-group input[type="text"]').forEach(input => {
  const clearBtn = input.parentElement.querySelector('.input-clear');
  if (!clearBtn) return;

  function updateClear() {
    if (input.disabled) {
      clearBtn.style.display = 'none';
    } else {
      clearBtn.style.display = input.value ? 'block' : 'none';
    }
  }

  input.addEventListener('input', updateClear);
  input.addEventListener('focus', updateClear);
  input.addEventListener('blur', updateClear);

  clearBtn.addEventListener('click', (e) => {
    e.preventDefault();
    input.value = '';
    updateClear();
    input.focus();
  });

  updateClear();
});
</script>
</body>
</html>
