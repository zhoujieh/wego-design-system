<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>
.preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,132px),1fr));gap:var(--spacer-8);width:100%;max-width:560px;box-sizing:border-box;margin-bottom:var(--spacer-16)}
.preview-item{display:flex;align-items:center;justify-content:space-between;gap:var(--spacer-12);min-width:0;min-height:52px;padding:var(--spacer-12);box-sizing:border-box;border:1px solid var(--border-neutral-l2);border-radius:var(--radius-8);background:var(--bg-surface)}
.preview-item .label{width:auto;min-width:0;overflow-wrap:anywhere;color:var(--text-secondary)}
.dark-strip .preview-grid{margin-bottom:0}
.dark-strip .preview-item{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
.dark-strip .preview-item .label{color:rgba(255,255,255,.7)}
.interaction-panel{width:100%;max-width:420px;box-sizing:border-box;margin-bottom:var(--spacer-16);padding:var(--spacer-12);border:1px solid var(--border-neutral-l2);border-radius:var(--radius-8);background:var(--bg-surface)}
.interactive-row{display:flex;align-items:center;gap:var(--spacer-8);min-height:32px;cursor:pointer}
.interactive-row + .interactive-row{margin-top:var(--spacer-8)}
.interactive-row .radio{cursor:pointer}
.interaction-label{font-size:var(--body-md-font-size);color:var(--text-default)}
@media (max-width: 420px){
  .preview-item{align-items:flex-start;flex-direction:column}
}

/* @component-css-start */
.radio { --radio-surface:transparent; --radio-border:var(--border-control); --radio-disabled-surface:var(--bg-control-disabled); --radio-disabled-border:var(--border-disabled); --radio-disabled-dot:var(--border-disabled); width:24px; height:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; cursor:pointer; }
.radio__inner { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--radio-border); background:var(--radio-surface); box-sizing:border-box; transition:border-color var(--duration-fast) var(--ease-standard), background var(--duration-fast) var(--ease-standard); }
.radio__dot { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:11px; height:11px; border-radius:50%; background:var(--bg-brand); display:none; }

.radio--checked .radio__inner { border-color:var(--text-brand); }
.radio--checked .radio__dot { display:block; }

/* 20px = 24px * 5/6; inner: ~16.5px; dot: 11*(5/6)≈9px */
.radio--sm { width:20px; height:20px; }
.radio--sm .radio__inner { width:16.5px; height:16.5px; }
.radio--sm .radio__dot { width:9px; height:9px; }

/* Disabled — unchecked: subtle border + disabled surface */
.radio--disabled:not(.radio--checked) { pointer-events:none; cursor:not-allowed; }
.radio--disabled:not(.radio--checked) .radio__inner { border-color:var(--radio-disabled-border); background:var(--radio-disabled-surface); }
/* Disabled — checked: subtle border + bg; dot matches border */
.radio--checked.radio--disabled { pointer-events:none; cursor:not-allowed; }
.radio--checked.radio--disabled .radio__inner { border-color:var(--radio-disabled-border); background:var(--radio-disabled-surface); }
.radio--checked.radio--disabled .radio__dot { background:var(--radio-disabled-dot); }

/* Dark mode overrides for .dark context */
.dark .radio { --radio-surface:var(--bg-inverse-surface-l1); --radio-border:var(--border-inverse); --radio-disabled-surface:rgba(255,255,255,.03); --radio-disabled-border:rgba(255,255,255,.12); --radio-disabled-dot:rgba(255,255,255,.18); }
/* @component-css-end */
</style>
</head>
<body>
<div class="pv-header"><h1>单选</h1><p>24 / 20px，品牌绿圆点选中态。</p></div>
<div class="pv-section__title">默认状态 — 24px</div>
<div class="preview-grid">
  <div class="preview-item"><span class="label">未选中</span>
  <div class="radio radio--static" data-sample="default-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
  <div class="preview-item"><span class="label">选中</span>
  <div class="radio radio--checked radio--static" data-sample="default-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
</div>

<div class="pv-section__title">默认状态 — 20px</div>
<div class="preview-grid">
  <div class="preview-item"><span class="label">未选中</span>
  <div class="radio radio--sm radio--static" data-sample="sm-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
  <div class="preview-item"><span class="label">选中</span>
  <div class="radio radio--sm radio--checked radio--static" data-sample="sm-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
</div>


<div class="pv-section__title">禁用状态 — 24px</div>
<div class="preview-grid">
  <div class="preview-item"><span class="label">禁用未选中</span>
  <div class="radio radio--disabled radio--static" data-sample="disabled-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
  <div class="preview-item"><span class="label">禁用选中</span>
  <div class="radio radio--checked radio--disabled radio--static" data-sample="disabled-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
</div>

<div class="pv-section__title">禁用状态 — 20px</div>
<div class="preview-grid">
  <div class="preview-item"><span class="label">禁用未选中</span>
  <div class="radio radio--sm radio--disabled radio--static" data-sample="sm-disabled-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
  <div class="preview-item"><span class="label">禁用选中</span>
  <div class="radio radio--sm radio--checked radio--disabled radio--static" data-sample="sm-disabled-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
  </div>
</div>


<div class="pv-section__title">暗色模式 — 24px</div>
<div class="dark-strip dark dark-mode">
  <div class="preview-grid">
    <div class="preview-item"><span class="label">暗色未选中</span>
    <div class="radio radio--static" data-sample="dark-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
    <div class="preview-item"><span class="label">暗色选中</span>
    <div class="radio radio--checked radio--static" data-sample="dark-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
    <div class="preview-item"><span class="label">暗色禁用未选中</span>
    <div class="radio radio--disabled radio--static" data-sample="dark-disabled-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
    <div class="preview-item"><span class="label">暗色禁用选中</span>
    <div class="radio radio--checked radio--disabled radio--static" data-sample="dark-disabled-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
  </div>
</div>

<div class="pv-section__title">暗色模式 — 20px</div>
<div class="dark-strip dark dark-mode">
  <div class="preview-grid">
    <div class="preview-item"><span class="label">暗色未选中</span>
    <div class="radio radio--sm radio--static" data-sample="dark-sm-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
    <div class="preview-item"><span class="label">暗色选中</span>
    <div class="radio radio--sm radio--checked radio--static" data-sample="dark-sm-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
    <div class="preview-item"><span class="label">暗色禁用未选中</span>
    <div class="radio radio--sm radio--disabled radio--static" data-sample="dark-sm-disabled-unchecked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
    <div class="preview-item"><span class="label">暗色禁用选中</span>
    <div class="radio radio--sm radio--checked radio--disabled radio--static" data-sample="dark-sm-disabled-checked"><div class="radio__inner"></div><div class="radio__dot"></div></div>
    </div>
  </div>
</div>

<div class="pv-section__title">交互演示 — 24px（互斥单选，不可取消选择）</div>
<div class="interaction-panel">
  <div class="interactive-row" onclick="selectRadio(this)">
    <div class="radio radio--checked" data-group="demo1">
      <div class="radio__inner"></div><div class="radio__dot"></div>
    </div>
    <span class="interaction-label">选项 A</span>
  </div>
  <div class="interactive-row" onclick="selectRadio(this)">
    <div class="radio" data-group="demo1">
      <div class="radio__inner"></div><div class="radio__dot"></div>
    </div>
    <span class="interaction-label">选项 B</span>
  </div>
  <div class="interactive-row" onclick="selectRadio(this)">
    <div class="radio" data-group="demo1">
      <div class="radio__inner"></div><div class="radio__dot"></div>
    </div>
    <span class="interaction-label">选项 C</span>
  </div>
</div>

<script>
/*
 * Radio group — mutually exclusive, cannot deselect.
 * All radios in a group share the same data-group attribute.
 * Clicking another radio deselects the current one and selects the target.
 * Clicking the already-selected radio does nothing.
 * Disabled radios are ignored.
 */
function selectRadio(el) {
  var target = el.classList.contains('radio') ? el : el.querySelector('.radio');
  if (!target || target.classList.contains('radio--disabled')) return;
  if (target.classList.contains('radio--checked')) return; // 不可取消

  var group = target.getAttribute('data-group');
  if (group) {
    var siblings = document.querySelectorAll('.radio[data-group="' + group + '"]');
    for (var i = 0; i < siblings.length; i++) {
      siblings[i].classList.remove('radio--checked');
    }
  }
  target.classList.add('radio--checked');
}
</script>
</body>
</html>
