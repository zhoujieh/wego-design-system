<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button - 按钮</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>
/* @component-css-start */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:var(--spacer-4); border:none; cursor:pointer; font-family:var(--body-md-font-family); font-weight:var(--font-weight-medium); white-space:nowrap; transition:background var(--duration-fast) var(--ease-standard); flex-shrink:0; }

/* ── Icon (iconfont，仅支持加号图标，用于新建场景) ── */
.btn__icon { font-family:"wego-iconfont-s" !important; font-style:normal; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; line-height:1; flex-shrink:0; }
.btn--sm .btn__icon { font-size:16px; }
.btn--md .btn__icon, .btn--lg .btn__icon { font-size:20px; }
.btn--icon-only { padding:0 !important; width:var(--size-40); min-width:unset; max-width:unset; }
.btn--sm.btn--icon-only { width:var(--size-32); }

/* ── Emphasis ── */
.btn--strong { background:var(--bg-brand); color:var(--text-inverse); }
.btn--strong:hover { background:var(--bg-brand-hover); }
.btn--strong:active { background:var(--bg-brand-disabled); }
.btn--strong.btn--disabled { background:var(--bg-overlay-l1); color:var(--text-disabled); pointer-events:none; cursor:not-allowed; }
.btn--medium { background:var(--bg-overlay-l1); color:var(--text-brand); }
.btn--medium:hover { background:var(--bg-overlay-l2); }
.btn--medium:active { background:var(--bg-state-selected); }
.btn--medium.btn--disabled { background:var(--bg-overlay-l1); color:var(--text-disabled); pointer-events:none; cursor:not-allowed; }
.btn--weak { background:var(--bg-overlay-l1); color:var(--text-default); }
.btn--weak:hover { background:var(--bg-overlay-l2); }
.btn--weak:active { background:var(--bg-state-selected); }
.btn--weak.btn--disabled { background:var(--bg-overlay-l1); color:var(--text-disabled); pointer-events:none; cursor:not-allowed; }

/* ── Size ── */
.btn--lg { height:var(--size-48); min-width:144px; max-width:180px; padding:0 14px; font-size:var(--heading-sm-font-size); border-radius:var(--radius-8); }
.btn--md { height:var(--size-40); min-width:var(--size-40); padding:0 14px; font-size:var(--body-lg-font-size); border-radius:var(--radius-8); }
.btn--sm { height:var(--size-32); min-width:var(--size-32); max-width:120px; padding:0 12px; font-size:var(--body-md-font-size); border-radius:var(--radius-6); }
/* @component-css-end */
</style>
</head>
<body>

<div class="pv-header">
  <h1>按钮 Button</h1>
  <p>强/中/弱三种强调级别，大/中/小三种尺寸，支持图标和纯图标模式。</p>
</div>

<div class="pv-section">
  <div class="pv-section__title">强调级别 (Emphasis) — Size: Medium</div>
  <div class="row">
    <span class="label">强 / Strong</span>
    <button class="btn btn--strong btn--md">主要操作</button>
  </div>
  <div class="row">
    <span class="label">中 / Medium</span>
    <button class="btn btn--medium btn--md">灰底绿字</button>
  </div>
  <div class="row">
    <span class="label">弱 / Weak</span>
    <button class="btn btn--weak btn--md">灰底深字</button>
  </div>
</div>

<div class="pv-section">
  <div class="pv-section__title">尺寸 (Size) — Emphasis: Strong</div>
  <div class="row">
    <span class="label">大 / Large</span>
    <button class="btn btn--strong btn--lg">大型 48px</button>
  </div>
  <div class="row">
    <span class="label">中 / Medium</span>
    <button class="btn btn--strong btn--md">中型 40px</button>
  </div>
  <div class="row">
    <span class="label">小 / Small</span>
    <button class="btn btn--strong btn--sm">小型 32px</button>
  </div>
</div>

<div class="pv-section">
  <div class="pv-section__title">带图标 (icon-jia16)</div>
  <div class="row">
    <span class="label">文字 + 图标</span>
    <button class="btn btn--strong btn--md"><i class="btn__icon icon-jia16"></i>新建商品</button>
    <button class="btn btn--medium btn--md"><i class="btn__icon icon-jia16"></i>添加</button>
    <button class="btn btn--weak btn--md"><i class="btn__icon icon-jia16"></i>新建</button>
  </div>
  <div class="row">
    <span class="label">仅图标</span>
    <button class="btn btn--strong btn--md btn--icon-only"><i class="btn__icon icon-jia16"></i></button>
    <button class="btn btn--medium btn--md btn--icon-only"><i class="btn__icon icon-jia16"></i></button>
    <button class="btn btn--weak btn--sm btn--icon-only"><i class="btn__icon icon-jia16"></i></button>
  </div>
</div>

<div class="pv-section">
  <div class="pv-section__title">状态 (State)</div>
  <div class="row">
    <span class="label">默认</span>
    <button class="btn btn--strong btn--md">Strong</button>
    <button class="btn btn--medium btn--md">Medium</button>
    <button class="btn btn--weak btn--md">Weak</button>
  </div>
  <div class="row">
    <span class="label">禁用</span>
    <button class="btn btn--strong btn--md btn--disabled" disabled>Strong</button>
    <button class="btn btn--medium btn--md btn--disabled" disabled>Medium</button>
    <button class="btn btn--weak btn--md btn--disabled" disabled>Weak</button>
  </div>
</div>

</body>
</html>
