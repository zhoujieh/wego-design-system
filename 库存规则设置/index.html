<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>库存规则设置</title>
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/page.css" />
  <link rel="stylesheet" href="./css/host-shell.css" />
</head>
<body data-bg="page" data-host-shell="true">
  <div class="preview-shell">
    <div class="phone-frame">
      <div class="phone-screen">
        <div class="phone-status" aria-hidden="true">
          <span>9:41</span>
          <span>5G</span>
        </div>
        <main class="host-shell-page" data-host-content>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="dongtai" hidden aria-label="动态"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="haoyou" hidden aria-label="好友"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="workspace" hidden aria-label="工作台"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="xiaoxi" hidden aria-label="消息"></section>
          <section class="host-shell-page__panel" data-host-tab="my" hidden>
            <section class="card card--surface host-shell-profile-card">
              <div class="card__content host-shell-profile">
                <div class="host-shell-profile__main">
                  <div class="avatar avatar--56 avatar--initials">微</div>
                  <div class="host-shell-profile__meta">
                    <div class="host-shell-profile__title-row">
                      <h1 class="host-shell-profile__title">微购相册·店主</h1>
                      <span class="badge badge--inline badge--text host-shell-profile__badge"><span class="badge__text">SVIP</span></span>
                    </div>
                    <p class="host-shell-profile__subtitle">超级管理员</p>
                  </div>
                </div>
                <div class="host-shell-profile__actions">
                  <button type="button" class="button button--secondary button--sm">+ 员工</button>
                  <button type="button" class="button button--secondary button--sm">员工管理</button>
                </div>
              </div>
            </section>

            <section class="card card--filled host-shell-membership-card">
              <div class="card__content host-shell-membership">
                <div class="host-shell-membership__header">
                  <span class="card__header host-shell-membership__label">SVIP 年度超级会员</span>
                  <button type="button" class="button button--primary button--sm">去续费</button>
                </div>
                <div class="host-shell-membership__body">
                  <div class="card__body host-shell-membership__usage">
                    <strong>90.33G</strong>
                    <span>/360G</span>
                  </div>
                  <button type="button" class="link link--default host-shell-link-button">空间管理</button>
                </div>
              </div>
            </section>

            <section class="card card--surface host-shell-app-card">
              <div class="card__content host-shell-app-card__content">
                <div class="host-shell-grid" data-entry-group="my-app-center">
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/一键开团.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">一键开团</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/店铺装修.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">店铺装修</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/收款码.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">收款码</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry">
                    <img src="./lib/icons/app-center/库存管理.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">库存管理</span>
                  </button>
                </div>
              </div>
            </section>

            <section class="card card--surface host-shell-list-card">
              <div class="card__content host-shell-list-card__content">
                <div class="host-shell-list" data-entry-group="my-settings">
                  <button
                    type="button"
                    class="cell cell--single cell--bg-white cell--clickable cell--divider-center"
                    data-route-id="my-settings"
                    data-entry-label="设置"
                    data-screen-src="./pages/settings.html"
                  >
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">设置</span></div>
                      </div>
                      <div class="cell__action">
                        <span class="cell__action-text">库存规则</span>
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                  <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-route-id="my-wallet">
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">我的钱包</span></div>
                      </div>
                      <div class="cell__action">
                        <span class="cell__action-text">￥0.02</span>
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                  <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-route-id="my-favorites">
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">我的收藏</span></div>
                      </div>
                      <div class="cell__action">
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                  <button type="button" class="cell cell--single cell--bg-white cell--clickable" data-route-id="my-coupons">
                    <div class="cell__body">
                      <div class="cell__content">
                        <div class="cell__title-row"><span class="cell__title">我的卡券</span></div>
                      </div>
                      <div class="cell__action">
                        <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
                      </div>
                    </div>
                  </button>
                </div>
              </div>
            </section>
          </section>
        </main>

        <div id="push-screen" class="push-screen" hidden></div>
        <div id="modal-overlay" class="modal-overlay" hidden></div>
        <div id="app-toast" class="app-toast" hidden></div>

        <nav class="bottom-nav">
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="dongtai">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-dongtai.svg" alt="" data-tab-icon="dongtai" /></span>
            <span class="bottom-nav__label">动态</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="haoyou">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-haoyou.svg" alt="" data-tab-icon="haoyou" /></span>
            <span class="bottom-nav__label">好友</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="workspace">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-gongzuotai.svg" alt="" data-tab-icon="gongzuotai" /></span>
            <span class="bottom-nav__label">工作台</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="xiaoxi">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-xiaoxi.svg" alt="" data-tab-icon="xiaoxi" /></span>
            <span class="bottom-nav__label">消息</span>
          </button>
          <button type="button" class="bottom-nav__item active" data-host-tab-trigger="my">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-active-wode.svg" alt="" data-tab-icon="wode" /></span>
            <span class="bottom-nav__label">我的</span>
          </button>
        </nav>
        <div class="phone-indicator" aria-hidden="true">
          <div class="phone-indicator-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <template id="template-settings-screen">
    <section class="screen-panel inventory-settings-page" data-screen="settings" data-bg="page">
      <div class="navbar">
        <div class="navbar__body">
          <div class="navbar__left">
            <button type="button" class="navbar__left-btn" data-close-screen aria-label="返回设置宿主">
              <i class="wego-iconfont-s icon-fanhui"></i>
            </button>
          </div>
          <div class="navbar__center"><span class="navbar__title">设置</span></div>
          <div class="navbar__right"></div>
        </div>
      </div>
      <div class="page-body inventory-settings-page__body">
        <div class="inventory-settings-page__section-title">库存与预警</div>
        <section class="inventory-settings-page__group">
          <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-open-modal="inventory-rule">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">库存规则</span></div>
                <div class="cell__subtitle" data-summary-copy>已启用 3 项保护，2 个渠道参与可售库存同步</div>
              </div>
              <div class="cell__action">
                <div class="cell__action-badge">
                  <span class="badge badge--inline badge--text" data-summary-status><span class="badge__text">已启用</span></span>
                </div>
                <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
              </div>
            </div>
          </button>
        </section>

        <div class="inventory-settings-page__section-title">常用开关</div>
        <section class="inventory-settings-page__group">
          <div class="cell cell--single cell--bg-white cell--divider-center">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">库存预警通知</span></div>
              </div>
              <div class="cell__action">
                <span class="cell__action-text" data-summary-alerts>3 人接收</span>
              </div>
            </div>
          </div>
          <div class="cell cell--single cell--bg-white">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">扣减时机</span></div>
              </div>
              <div class="cell__action">
                <span class="cell__action-text" data-summary-deduct>付款减库存</span>
              </div>
            </div>
          </div>
        </section>

        <p class="inventory-settings-page__helper">
          库存规则保存后立即生效，并同步影响锁单、可售库存展示和低库存预警。
        </p>
      </div>
    </section>
  </template>

  <template id="template-inventory-rule-screen">
    <section class="screen-panel inventory-rule-page" data-screen="inventory-rule" data-bg="page">
      <div class="navbar">
        <div class="navbar__body navbar__body--spaced">
          <div class="navbar__left">
            <button type="button" class="navbar__left-text" data-close-modal>取消</button>
          </div>
          <div class="navbar__center"><span class="navbar__title">库存规则</span></div>
          <div class="navbar__right navbar__right--button">
            <div class="navbar__action navbar__action--button">
              <button type="button" class="btn btn--strong btn--sm" data-save-rule>保存</button>
            </div>
          </div>
        </div>
      </div>

      <div class="page-body inventory-rule-page__body">
        <section class="inventory-rule-page__summary">
          <div class="inventory-rule-page__summary-main">
            <div class="inventory-rule-page__summary-row">
              <h2 class="inventory-rule-page__summary-title">门店现货库存防穿仓</h2>
              <span class="badge badge--inline badge--text inventory-rule-page__summary-badge"><span class="badge__text">库存方案</span></span>
            </div>
            <p class="inventory-rule-page__summary-desc">统一控制扣减时机、预占库存时长、预警通知和多渠道同步范围。</p>
          </div>
          <div class="inventory-rule-page__tag-group">
            <span class="tag tag--20 tag--brand-stroke"><span class="tag__label">实时同步</span></span>
            <span class="tag tag--20 tag--white"><span class="tag__label">支持预警</span></span>
            <span class="tag tag--20 tag--gray"><span class="tag__label">订单锁库</span></span>
          </div>
        </section>

        <div class="inventory-rule-page__section-title">基础控制</div>
        <section class="cell-group inventory-rule-page__group">
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-switch-row data-setting-switch="enabled">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">启用库存规则</span></div>
                <div class="cell__subtitle">关闭后仅保留手工改库存，不做锁单和阈值保护</div>
              </div>
              <div class="cell__action">
                <div class="switch switch--on" data-switch-control="enabled"><div class="switch__thumb"></div></div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-switch-row data-setting-switch="freezeOversold">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">锁单时冻结可售库存</span></div>
                <div class="cell__subtitle">提交订单后先冻结库存，支付超时自动释放</div>
              </div>
              <div class="cell__action">
                <div class="switch switch--on" data-switch-control="freezeOversold"><div class="switch__thumb"></div></div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-switch-row data-setting-switch="shareAcrossChannels">
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">多渠道共享可售库存</span></div>
                <div class="cell__subtitle">微信小店、视频号、门店现货共用同一可售数量</div>
              </div>
              <div class="cell__action">
                <div class="switch switch--off" data-switch-control="shareAcrossChannels"><div class="switch__thumb"></div></div>
              </div>
            </div>
          </button>
        </section>

        <div class="inventory-rule-page__section-title">扣减时机</div>
        <section class="cell-group inventory-rule-page__group">
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="deductMode" data-radio-value="pay">
            <div class="cell__select">
              <div class="radio radio--sm radio--checked" data-radio-control="deductMode" data-radio-value="pay">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">付款减库存</span></div>
                <div class="cell__subtitle">适合现货商品，保证下单占位但不提前扣减</div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="deductMode" data-radio-value="lock">
            <div class="cell__select">
              <div class="radio radio--sm" data-radio-control="deductMode" data-radio-value="lock">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">下单锁库存</span></div>
                <div class="cell__subtitle">提交订单即扣减，适合爆款和限量场景</div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-radio-option data-radio-group="deductMode" data-radio-value="ship">
            <div class="cell__select">
              <div class="radio radio--sm" data-radio-control="deductMode" data-radio-value="ship">
                <div class="radio__inner"></div>
                <div class="radio__dot"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">发货减库存</span></div>
                <div class="cell__subtitle">更适合预售或人工确认后再出库的流程</div>
              </div>
            </div>
          </button>
        </section>

        <div class="inventory-rule-page__section-title">阈值与同步</div>
        <section class="cell-group inventory-rule-page__group">
          <div class="form">
            <div class="form-body form-body--preserve-content-align">
              <div class="form-body__label">预占时长</div>
              <div class="form-body__action">
                <div class="number-input inventory-rule-page__number-input" data-number-input>
                  <input class="number-input__field" type="text" inputmode="numeric" value="30" data-number-key="holdMinutes" aria-label="预占时长">
                  <span class="number-input__suffix">分钟</span>
                </div>
              </div>
            </div>
            <div class="form-body form-body--preserve-content-align">
              <div class="form-body__label">安全库存</div>
              <div class="form-body__action">
                <div class="number-input inventory-rule-page__number-input" data-number-input>
                  <input class="number-input__field" type="text" inputmode="numeric" value="8" data-number-key="safeStock" aria-label="安全库存">
                  <span class="number-input__suffix">件</span>
                </div>
              </div>
            </div>
            <div class="form-body form-body--preserve-content-align">
              <div class="form-body__label">预警阈值</div>
              <div class="form-body__action">
                <div class="number-input inventory-rule-page__number-input" data-number-input>
                  <input class="number-input__field" type="text" inputmode="numeric" value="3" data-number-key="warningStock" aria-label="预警阈值">
                  <span class="number-input__suffix">件</span>
                </div>
              </div>
            </div>
            <div class="form-body form-body--preserve-content-align">
              <div class="form-body__label">同步策略</div>
              <div class="form-body__right-btn">
                <div class="form-body__stack-group" data-stack-group="syncStrategy">
                  <button type="button" class="stack stack--selected" data-stack-option data-stack-value="realtime">
                    <div class="stack__bg">
                      <span class="stack__label">实时</span>
                      <span class="stack__check-corner"><i class="stack__check-icon wego-iconfont-s icon-duihao16"></i></span>
                    </div>
                  </button>
                  <button type="button" class="stack" data-stack-option data-stack-value="batch">
                    <div class="stack__bg">
                      <span class="stack__label">批量</span>
                      <span class="stack__check-corner"><i class="stack__check-icon wego-iconfont-s icon-duihao16"></i></span>
                    </div>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="inventory-rule-page__section-title">生效渠道</div>
        <section class="cell-group inventory-rule-page__group inventory-rule-page__group--padded">
          <div class="inventory-rule-page__tag-group" data-tag-group="channels">
            <button type="button" class="tag tag--28 tag--brand tag--selected" data-tag-option data-tag-value="wechat">
              <span class="tag__label">微信小店</span>
            </button>
            <button type="button" class="tag tag--28 tag--brand tag--selected" data-tag-option data-tag-value="video">
              <span class="tag__label">视频号</span>
            </button>
            <button type="button" class="tag tag--28 tag--white tag--normal" data-tag-option data-tag-value="offline">
              <span class="tag__label">门店现货</span>
            </button>
            <button type="button" class="tag tag--28 tag--white tag--normal" data-tag-option data-tag-value="distributor">
              <span class="tag__label">分销代发</span>
            </button>
          </div>
          <p class="inventory-rule-page__helper inventory-rule-page__helper--tight">只同步已勾选渠道的可售库存，未勾选渠道仍允许手工维护。</p>
        </section>

        <div class="inventory-rule-page__section-title">预警接收人</div>
        <section class="cell-group inventory-rule-page__group">
          <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-parent-row data-checkbox-group="receivers">
            <div class="cell__select">
              <div class="checkbox checkbox--indeterminate checkbox--sm" data-checkbox-parent="receivers">
                <div class="checkbox__inner"></div>
                <div class="checkbox__minus"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">全选通知对象</span></div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="receivers" data-checkbox-value="owner">
            <div class="cell__backspace"></div>
            <div class="cell__select">
              <div class="checkbox checkbox--checked checkbox--sm" data-checkbox-child="receivers" data-checkbox-value="owner">
                <div class="checkbox__inner"></div>
                <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">店主</span></div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="receivers" data-checkbox-value="buyer">
            <div class="cell__backspace"></div>
            <div class="cell__select">
              <div class="checkbox checkbox--checked checkbox--sm" data-checkbox-child="receivers" data-checkbox-value="buyer">
                <div class="checkbox__inner"></div>
                <div class="checkbox__icon"><img class="checkbox__asset" src="./lib/icons/checkbox-check.svg" alt=""></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">采购负责人</span></div>
              </div>
            </div>
          </button>
          <button type="button" class="cell cell--single cell--bg-white cell--clickable" data-checkbox-child-row data-checkbox-group="receivers" data-checkbox-value="warehouse">
            <div class="cell__backspace"></div>
            <div class="cell__select">
              <div class="checkbox checkbox--sm" data-checkbox-child="receivers" data-checkbox-value="warehouse">
                <div class="checkbox__inner"></div>
              </div>
            </div>
            <div class="cell__body">
              <div class="cell__content">
                <div class="cell__title-row"><span class="cell__title">仓库员</span></div>
              </div>
            </div>
          </button>
        </section>
