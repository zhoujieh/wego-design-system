<section class="screen-panel inventory-settings-page" data-screen="settings" data-bg="page">
  <div class="navbar">
    <div class="navbar__body">
      <div class="navbar__left">
        <button type="button" class="navbar__left-btn" data-close-screen aria-label="返回设置宿主">
          <i class="wego-iconfont-s icon-fanhui"></i>
        </button>
      </div>
      <div class="navbar__center"><span class="navbar__title">设置</span></div>
      <div class="navbar__right"></div>
    </div>
  </div>
  <div class="page-body inventory-settings-page__body">
    <div class="inventory-settings-page__section-title">库存与预警</div>
    <section class="inventory-settings-page__group">
      <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-open-modal="inventory-rule">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">库存规则</span></div>
            <div class="cell__subtitle" data-summary-copy>已启用 3 项保护，2 个渠道参与可售库存同步</div>
          </div>
          <div class="cell__action">
            <div class="cell__action-badge">
              <span class="badge badge--inline badge--text" data-summary-status><span class="badge__text">已启用</span></span>
            </div>
            <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
          </div>
        </div>
      </button>
    </section>

    <div class="inventory-settings-page__section-title">常用开关</div>
    <section class="inventory-settings-page__group">
      <div class="cell cell--single cell--bg-white cell--divider-center">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">库存预警通知</span></div>
          </div>
          <div class="cell__action">
            <span class="cell__action-text" data-summary-alerts>3 人接收</span>
          </div>
        </div>
      </div>
      <div class="cell cell--single cell--bg-white">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">扣减时机</span></div>
          </div>
          <div class="cell__action">
            <span class="cell__action-text" data-summary-deduct>付款减库存</span>
          </div>
        </div>
      </div>
    </section>

    <p class="inventory-settings-page__helper">
      库存规则保存后立即生效，并同步影响锁单、可售库存展示和低库存预警。
    </p>
  </div>
</section>
