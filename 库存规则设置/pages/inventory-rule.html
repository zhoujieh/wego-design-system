<section class="screen-panel inventory-rule-page" data-screen="inventory-rule" data-bg="page">
  <div class="navbar">
    <div class="navbar__body navbar__body--spaced">
      <div class="navbar__left">
        <button type="button" class="navbar__left-text" data-close-modal>取消</button>
      </div>
      <div class="navbar__center"><span class="navbar__title">库存规则</span></div>
      <div class="navbar__right navbar__right--button">
        <div class="navbar__action navbar__action--button">
          <button type="button" class="btn btn--strong btn--sm" data-save-rule>保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="page-body inventory-rule-page__body">
    <section class="inventory-rule-page__summary">
      <div class="inventory-rule-page__summary-main">
        <div class="inventory-rule-page__summary-row">
          <h2 class="inventory-rule-page__summary-title">门店现货库存防穿仓</h2>
          <span class="badge badge--inline badge--text inventory-rule-page__summary-badge"><span class="badge__text">库存方案</span></span>
        </div>
        <p class="inventory-rule-page__summary-desc">统一控制扣减时机、预占库存时长、预警通知和多渠道同步范围。</p>
      </div>
      <div class="inventory-rule-page__tag-group">
        <span class="tag tag--20 tag--brand-stroke"><span class="tag__label">实时同步</span></span>
        <span class="tag tag--20 tag--white"><span class="tag__label">支持预警</span></span>
        <span class="tag tag--20 tag--gray"><span class="tag__label">订单锁库</span></span>
      </div>
    </section>

    <div class="inventory-rule-page__section-title">基础控制</div>
    <section class="inventory-rule-page__group">
      <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-switch-row data-setting-switch="enabled">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">启用库存规则</span></div>
            <div class="cell__subtitle">关闭后仅保留手工改库存，不做锁单和阈值保护</div>
          </div>
          <div class="cell__action">
            <div class="switch switch--on" data-switch-control="enabled"><div class="switch__thumb"></div></div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-switch-row data-setting-switch="freezeOversold">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">锁单时冻结可售库存</span></div>
            <div class="cell__subtitle">提交订单后先冻结库存，支付超时自动释放</div>
          </div>
          <div class="cell__action">
            <div class="switch switch--on" data-switch-control="freezeOversold"><div class="switch__thumb"></div></div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-switch-row data-setting-switch="shareAcrossChannels">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">多渠道共享可售库存</span></div>
            <div class="cell__subtitle">微信小店、视频号、门店现货共用同一可售数量</div>
          </div>
          <div class="cell__action">
            <div class="switch switch--off" data-switch-control="shareAcrossChannels"><div class="switch__thumb"></div></div>
          </div>
        </div>
      </button>
    </section>

    <div class="inventory-rule-page__section-title">扣减时机</div>
    <section class="inventory-rule-page__group">
      <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="deductMode" data-radio-value="pay">
        <div class="cell__select">
          <div class="radio radio--sm radio--checked" data-radio-control="deductMode" data-radio-value="pay">
            <div class="radio__inner"></div>
            <div class="radio__dot"></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">付款减库存</span></div>
            <div class="cell__subtitle">适合现货商品，保证下单占位但不提前扣减</div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-radio-option data-radio-group="deductMode" data-radio-value="lock">
        <div class="cell__select">
          <div class="radio radio--sm" data-radio-control="deductMode" data-radio-value="lock">
            <div class="radio__inner"></div>
            <div class="radio__dot"></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">下单锁库存</span></div>
            <div class="cell__subtitle">提交订单即扣减，适合爆款和限量场景</div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--double cell--bg-white cell--clickable" data-radio-option data-radio-group="deductMode" data-radio-value="ship">
        <div class="cell__select">
          <div class="radio radio--sm" data-radio-control="deductMode" data-radio-value="ship">
            <div class="radio__inner"></div>
            <div class="radio__dot"></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">发货减库存</span></div>
            <div class="cell__subtitle">更适合预售或人工确认后再出库的流程</div>
          </div>
        </div>
      </button>
    </section>

    <div class="inventory-rule-page__section-title">阈值与同步</div>
    <section class="inventory-rule-page__group">
      <div class="form">
        <div class="form-body form-body--preserve-content-align">
          <div class="form-body__label">预占时长</div>
          <div class="form-body__action">
            <div class="number-input inventory-rule-page__number-input" data-number-input>
              <input class="number-input__field" type="text" inputmode="numeric" value="30" data-number-key="holdMinutes" aria-label="预占时长">
              <span class="number-input__suffix">分钟</span>
            </div>
          </div>
        </div>
        <div class="form-body form-body--preserve-content-align">
          <div class="form-body__label">安全库存</div>
          <div class="form-body__action">
            <div class="number-input inventory-rule-page__number-input" data-number-input>
              <input class="number-input__field" type="text" inputmode="numeric" value="8" data-number-key="safeStock" aria-label="安全库存">
              <span class="number-input__suffix">件</span>
            </div>
          </div>
        </div>
        <div class="form-body form-body--preserve-content-align">
          <div class="form-body__label">预警阈值</div>
          <div class="form-body__action">
            <div class="number-input inventory-rule-page__number-input" data-number-input>
              <input class="number-input__field" type="text" inputmode="numeric" value="3" data-number-key="warningStock" aria-label="预警阈值">
              <span class="number-input__suffix">件</span>
            </div>
          </div>
        </div>
        <div class="form-body form-body--preserve-content-align">
          <div class="form-body__label">同步策略</div>
          <div class="form-body__right-btn">
            <div class="form-body__stack-group" data-stack-group="syncStrategy">
              <button type="button" class="stack stack--selected" data-stack-option data-stack-value="realtime">
                <div class="stack__bg">
                  <span class="stack__label">实时</span>
                  <span class="stack__check-corner"><i class="stack__check-icon wego-iconfont-s icon-duihao16"></i></span>
                </div>
              </button>
              <button type="button" class="stack" data-stack-option data-stack-value="batch">
                <div class="stack__bg">
                  <span class="stack__label">批量</span>
                  <span class="stack__check-corner"><i class="stack__check-icon wego-iconfont-s icon-duihao16"></i></span>
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="inventory-rule-page__section-title">生效渠道</div>
    <section class="inventory-rule-page__group inventory-rule-page__group--padded">
      <div class="inventory-rule-page__tag-group" data-tag-group="channels">
        <button type="button" class="tag tag--28 tag--brand tag--selected" data-tag-option data-tag-value="wechat">
          <span class="tag__label">微信小店</span>
        </button>
        <button type="button" class="tag tag--28 tag--brand tag--selected" data-tag-option data-tag-value="video">
          <span class="tag__label">视频号</span>
        </button>
        <button type="button" class="tag tag--28 tag--white tag--normal" data-tag-option data-tag-value="offline">
          <span class="tag__label">门店现货</span>
        </button>
        <button type="button" class="tag tag--28 tag--white tag--normal" data-tag-option data-tag-value="distributor">
          <span class="tag__label">分销代发</span>
        </button>
      </div>
      <p class="inventory-rule-page__helper inventory-rule-page__helper--tight">只同步已勾选渠道的可售库存，未勾选渠道仍允许手工维护。</p>
    </section>

    <div class="inventory-rule-page__section-title">预警接收人</div>
    <section class="inventory-rule-page__group">
      <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-parent-row data-checkbox-group="receivers">
        <div class="cell__select">
          <div class="checkbox checkbox--indeterminate checkbox--sm" data-checkbox-parent="receivers">
            <div class="checkbox__inner"></div>
            <div class="checkbox__minus"></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">全选通知对象</span></div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="receivers" data-checkbox-value="owner">
        <div class="cell__backspace"></div>
        <div class="cell__select">
          <div class="checkbox checkbox--checked checkbox--sm" data-checkbox-child="receivers" data-checkbox-value="owner">
            <div class="checkbox__inner"></div>
            <div class="checkbox__icon"><img class="checkbox__asset" src="../lib/icons/checkbox-check.svg" alt=""></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">店主</span></div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--single cell--bg-white cell--clickable cell--divider-center" data-checkbox-child-row data-checkbox-group="receivers" data-checkbox-value="buyer">
        <div class="cell__backspace"></div>
        <div class="cell__select">
          <div class="checkbox checkbox--checked checkbox--sm" data-checkbox-child="receivers" data-checkbox-value="buyer">
            <div class="checkbox__inner"></div>
            <div class="checkbox__icon"><img class="checkbox__asset" src="../lib/icons/checkbox-check.svg" alt=""></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">采购负责人</span></div>
          </div>
        </div>
      </button>
      <button type="button" class="cell cell--single cell--bg-white cell--clickable" data-checkbox-child-row data-checkbox-group="receivers" data-checkbox-value="warehouse">
        <div class="cell__backspace"></div>
        <div class="cell__select">
          <div class="checkbox checkbox--sm" data-checkbox-child="receivers" data-checkbox-value="warehouse">
            <div class="checkbox__inner"></div>
          </div>
        </div>
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">仓库员</span></div>
          </div>
        </div>
      </button>
    </section>

    <div class="inventory-rule-page__section-title">补充配置</div>
    <section class="inventory-rule-page__group">
      <button type="button" class="cell cell--double cell--bg-white cell--clickable cell--divider-center" data-inline-action="exclude">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">排除商品</span></div>
            <div class="cell__subtitle" data-exclude-copy>已排除 12 个 SKU，不参与自动锁库</div>
          </div>
          <div class="cell__action cell__action--link">
            <span class="link">查看清单</span>
            <i class="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
          </div>
        </div>
      </button>
      <div class="cell cell--single cell--bg-white">
        <div class="cell__body">
          <div class="cell__content">
            <div class="cell__title-row"><span class="cell__title">风险提示</span></div>
            <div class="cell__subtitle">预警阈值必须小于安全库存，避免配置后库存页长期显示异常告警。</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</section>
