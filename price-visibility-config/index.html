<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>价格权限设置原型</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/page.css" />
</head>
<body data-bg="page">
  <header class="navbar">
    <div class="navbar__body">
      <div class="navbar__left">
        <div class="navbar__left-btn" aria-label="返回">
          <i class="wego-iconfont-s icon-fanhui"></i>
        </div>
      </div>
      <div class="navbar__center">
        <span class="navbar__title">商品价格</span>
      </div>
      <div class="navbar__right navbar__right--text">
        <div class="navbar__action navbar__action--text">
          <span class="navbar__action-label">预览</span>
        </div>
      </div>
    </div>
  </header>

  <main class="page-body price-visibility-page">
    <section class="price-visibility-page__hero">
      <p class="price-visibility-page__eyebrow">微购工作流验证任务</p>
      <h1 class="price-visibility-page__title">价格权限设置</h1>
      <p class="price-visibility-page__desc">模拟商家在商品编辑页配置价格对谁可见，并验证二级页、多选分组、新建分组、保存回填与本地持久化是否完整联通。</p>
    </section>

    <section class="price-visibility-page__section">
      <div class="price-visibility-summary">
        <div class="price-visibility-summary__row">
          <span class="price-visibility-summary__label">当前规则</span>
          <div class="price-visibility-summary__value" id="summary-mode"></div>
        </div>
        <div class="price-visibility-summary__row">
          <span class="price-visibility-summary__label">附加条件</span>
          <div class="price-visibility-summary__value" id="summary-detail"></div>
        </div>
        <div class="price-visibility-summary__row">
          <span class="price-visibility-summary__label">最近保存</span>
          <div class="price-visibility-summary__value" id="summary-time"></div>
        </div>
        <div class="price-visibility-tag-row" id="summary-tags"></div>
      </div>
    </section>

    <section class="price-visibility-page__section">
      <div class="price-visibility-entry">
        <div class="price-visibility-entry__copy">
          <p class="price-visibility-entry__title">打开价格权限设置</p>
          <p class="price-visibility-entry__text">按 `biz-rule-config` 范式从底部滑入全屏模态页，所有改动先写入草稿，点击保存后再回填当前页。</p>
        </div>
        <button type="button" class="btn btn--strong btn--md" id="open-permission-settings">开始设置</button>
      </div>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay" hidden></div>
  <div id="app-toast" class="price-visibility-toast" hidden>价格权限已保存</div>

  <script src="./js/app.js"></script>
</body>
</html>
