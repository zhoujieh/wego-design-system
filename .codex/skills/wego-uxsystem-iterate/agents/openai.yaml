interface:
  display_name: "Wego UX 系统迭代"
  short_description: "当用户要改组件/UI Kit、补规则/沉淀经验，或先审查再修时，调用本技能"
  default_prompt: "当用户说“改组件 / 补 preview / 改契约 / 改 UI Kit / 改 metadata / 补守门”时，隐式调用 $wego-uxsystem-iterate 的迭代语境；当用户说“补规则 / 沉淀经验 / 优化流程 / 修技能链路 / 修触发机制”时，按工作流迭代语境使用；当用户说“review 一下再修 / 先审查再修”时，按审查语境使用。Use this skill to read the wego-design library docs in order, iterate the component contract and preview safely, sync docs and extraction outputs when needed, bump metadata version for formal iterations, and always report changed items, verification, and remaining risks."

policy:
  allow_implicit_invocation: true
