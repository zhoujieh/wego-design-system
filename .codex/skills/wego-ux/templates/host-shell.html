<!doctype html>
<!--
  wego-ux 固定宿主模板

  使用规则:
  - 仅在新任务首次落原型时初始化一次;同任务后续迭代复用,不重复套壳
  - 宿主路径由 page_spec.host_container + route_id 驱动
  - 一级/二级入口请在 data-route-id、data-entry-label、data-parent-entry 中补齐真实值
  - 业务详情页仍按 design_consumption_plan 生成到 pages/;宿主只负责入口、跳转和回填
  - 图标优先使用 lib/icons/app-center/*.svg 作为业务入口图标资产
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>宿主首页</title>
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/page.css" />
  <link rel="stylesheet" href="./css/host-shell.css" />
</head>
<body data-bg="page" data-host-shell="true">
  <main class="host-shell-page">
    <section class="host-shell-page__panel host-shell-page__panel--active" data-host-tab="dongtai">
      <header class="host-shell-page__header">
        <h1 class="host-shell-page__title">相册动态</h1>
        <p class="host-shell-page__subtitle">新任务可按需替换为真实动态摘要，不作为业务页主入口。</p>
      </header>
      <section class="host-shell-card">
        <div class="host-shell-card__body">
          <p class="host-shell-empty">默认宿主模板保留动态 Tab 占位。业务任务优先挂到“工作台”或“我的”。</p>
        </div>
      </section>
    </section>

    <section class="host-shell-page__panel" data-host-tab="haoyou" hidden>
      <header class="host-shell-page__header">
        <h1 class="host-shell-page__title">好友</h1>
        <p class="host-shell-page__subtitle">成员协作、好友触达等入口可后续按任务补充。</p>
      </header>
      <section class="host-shell-card">
        <div class="host-shell-card__body">
          <p class="host-shell-empty">当前模板保留好友 Tab 占位，不预置业务入口。</p>
        </div>
      </section>
    </section>

    <section class="host-shell-page__panel" data-host-tab="workspace" hidden>
      <header class="host-shell-page__header">
        <h1 class="host-shell-page__title">工作台</h1>
        <p class="host-shell-page__subtitle">仓库管理、价格规则、配货配置等任务优先挂在这里。</p>
      </header>
      <section class="host-shell-card">
        <div class="host-shell-grid" data-entry-group="workspace-primary">
          <button type="button" class="host-shell-grid-entry" data-route-id="workspace-inventory-management" data-entry-label="仓库管理">
            <img src="./lib/icons/app-center/库存管理.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">仓库管理</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="workspace-data-center" data-entry-label="数据中心">
            <img src="./lib/icons/app-center/数据中心.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">数据中心</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="workspace-shop-decoration" data-entry-label="店铺装修">
            <img src="./lib/icons/app-center/店铺装修.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">店铺装修</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="workspace-team-management" data-entry-label="团队管理">
            <img src="./lib/icons/app-center/团队管理.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">团队管理</span>
          </button>
        </div>
      </section>
    </section>

    <section class="host-shell-page__panel" data-host-tab="xiaoxi" hidden>
      <header class="host-shell-page__header">
        <h1 class="host-shell-page__title">消息</h1>
        <p class="host-shell-page__subtitle">提醒、通知、待办回填默认挂在消息 Tab。</p>
      </header>
      <section class="host-shell-card">
        <div class="host-shell-card__body">
          <p class="host-shell-empty">当前模板保留消息 Tab 占位，待任务需要时补充入口。</p>
        </div>
      </section>
    </section>

    <section class="host-shell-page__panel" data-host-tab="my" hidden>
      <section class="host-shell-profile">
        <div class="host-shell-profile__main">
          <img src="./lib/image/avatar-defult.png" alt="" class="avatar avatar--lg" />
          <div class="host-shell-profile__meta">
            <div class="host-shell-profile__title-row">
              <h1 class="host-shell-profile__title">微购相册·用户体验设计师</h1>
              <span class="host-shell-badge">SVIP</span>
            </div>
            <div class="host-shell-profile__tags">
              <span class="host-shell-tag">游客版</span>
              <span class="host-shell-tag host-shell-tag--success">超级管理员</span>
            </div>
          </div>
        </div>
        <div class="host-shell-profile__actions">
          <button type="button" class="button button--secondary button--sm">+ 员工</button>
          <button type="button" class="button button--secondary button--sm">员工管理</button>
        </div>
      </section>

      <section class="host-shell-membership">
        <div class="host-shell-membership__header">
          <span class="host-shell-membership__label">SVIP 年度超级会员</span>
          <button type="button" class="button button--primary button--sm">去续费</button>
        </div>
        <div class="host-shell-membership__body">
          <div class="host-shell-membership__usage">
            <strong>90.33G</strong>
            <span>/360G</span>
          </div>
          <a href="./pages/space-management.html" class="link link--default">空间管理</a>
        </div>
      </section>

      <section class="host-shell-card">
        <div class="host-shell-grid" data-entry-group="my-quick-actions">
          <button type="button" class="host-shell-grid-entry" data-route-id="my-fans" data-entry-label="粉丝">
            <img src="./lib/icons/app-center/粉丝会员卡.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">粉丝 107</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-homepage" data-entry-label="我的主页">
            <img src="./lib/icons/app-center/我的小店.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">我的主页</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-qrcode" data-entry-label="二维码">
            <img src="./lib/icons/app-center/收款码.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">二维码</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-mini-program" data-entry-label="小程序码">
            <img src="./lib/icons/app-center/专享小程序.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">小程序码</span>
          </button>
        </div>
      </section>

      <section class="host-shell-card">
        <div class="host-shell-grid" data-entry-group="my-app-center">
          <button type="button" class="host-shell-grid-entry" data-route-id="my-start-group" data-entry-label="一键开团">
            <img src="./lib/icons/app-center/一键开团.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">一键开团</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-shop-decoration" data-entry-label="店铺装修">
            <img src="./lib/icons/app-center/店铺装修.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">店铺装修</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-collect-code" data-entry-label="收款码">
            <img src="./lib/icons/app-center/收款码.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">收款码</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-store" data-entry-label="我的小店">
            <img src="./lib/icons/app-center/我的小店.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">我的小店</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-data-center" data-entry-label="数据中心">
            <img src="./lib/icons/app-center/数据中心.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">数据中心</span>
          </button>
          <button type="button" class="host-shell-grid-entry" data-route-id="my-private-keyboard" data-entry-label="私域键盘">
            <img src="./lib/icons/app-center/私域键盘.svg" alt="" class="host-shell-grid-entry__icon" />
            <span class="host-shell-grid-entry__label">私域键盘</span>
          </button>
        </div>
      </section>

      <section class="host-shell-card">
        <div class="host-shell-list" data-entry-group="my-settings">
          <a class="cell" href="./pages/settings.html" data-route-id="my-settings" data-entry-label="设置">
            <div class="cell__body">
              <div class="cell__title-group">
                <span class="cell__title">设置</span>
              </div>
            </div>
            <div class="cell__value">
              <i class="wego-iconfont-s icon-youjiantou"></i>
            </div>
          </a>
          <a class="cell" href="./pages/wallet.html" data-route-id="my-wallet" data-entry-label="我的钱包">
            <div class="cell__body">
              <div class="cell__title-group">
                <span class="cell__title">我的钱包</span>
              </div>
            </div>
            <div class="cell__value">
              <span class="cell__desc">¥ 0.02</span>
              <i class="wego-iconfont-s icon-youjiantou"></i>
            </div>
          </a>
          <a class="cell" href="./pages/favorites.html" data-route-id="my-favorites" data-entry-label="我的收藏">
            <div class="cell__body">
              <div class="cell__title-group">
                <span class="cell__title">我的收藏</span>
              </div>
            </div>
            <div class="cell__value">
              <i class="wego-iconfont-s icon-youjiantou"></i>
            </div>
          </a>
          <a class="cell cell--last" href="./pages/coupons.html" data-route-id="my-coupons" data-entry-label="我的卡券">
            <div class="cell__body">
              <div class="cell__title-group">
                <span class="cell__title">我的卡券</span>
              </div>
            </div>
            <div class="cell__value">
              <i class="wego-iconfont-s icon-youjiantou"></i>
            </div>
          </a>
        </div>
      </section>
    </section>
  </main>

  <nav class="bottom-nav">
    <button type="button" class="bottom-nav__item active" data-host-tab-trigger="dongtai">
      <span class="bottom-nav__icon"><img src="./lib/icons/tab-active-dongtai.svg" alt="" /></span>
      <span class="bottom-nav__label">动态</span>
    </button>
    <button type="button" class="bottom-nav__item" data-host-tab-trigger="haoyou">
      <span class="bottom-nav__icon"><img src="./lib/icons/tab-haoyou.svg" alt="" /></span>
      <span class="bottom-nav__label">好友</span>
    </button>
    <button type="button" class="bottom-nav__item" data-host-tab-trigger="workspace">
      <span class="bottom-nav__icon"><img src="./lib/icons/tab-gongzuotai.svg" alt="" /></span>
      <span class="bottom-nav__label">工作台</span>
    </button>
    <button type="button" class="bottom-nav__item" data-host-tab-trigger="xiaoxi">
      <span class="bottom-nav__icon"><img src="./lib/icons/tab-xiaoxi.svg" alt="" /></span>
      <span class="bottom-nav__label">消息</span>
    </button>
    <button type="button" class="bottom-nav__item" data-host-tab-trigger="my">
      <span class="bottom-nav__icon"><img src="./lib/icons/tab-wode.svg" alt="" /></span>
      <span class="bottom-nav__label">我的</span>
    </button>
  </nav>

  <script src="./js/host-shell.js"></script>
</body>
</html>
