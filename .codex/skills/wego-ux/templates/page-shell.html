<!doctype html>
<!--
  wego-ux 页面外壳标准模板

  使用规则:
  - 这是真实生产页面骨架,不是 UI Kit Showcase 外壳
  - preview-shell / phone-frame / phone-screen 是全局预览外壳:电脑端显示,移动端同链接隐藏
  - 禁止复制 .uikit-shell / .phone-body;.phone-status / .phone-indicator 作为预览安全区,与 host-shell 一致,absolute 悬浮透明背景不占位,PC 端显示、移动端隐藏
  - 全局元素重置已统一收口到 colors_and_type.css(*、html/body、button、a、img/svg、h1-h6/p、ul/ol、input/textarea/select、滚动条隐藏),page.css 不再重复
  - page.css 在 .phone-screen 内定义 --safe-area-top / --safe-area-bottom 模拟值(44px/34px),与 host-shell 一致;内容区通过自身 padding 避让安全区
  - 模态层必须使用 position: fixed; inset: 0,不要用 position: absolute
  - 容器宽度由 body 上的 max-width 约束(默认 768px,沉浸页可去掉)
  - 复制本模板后,按 design_consumption_plan 替换 navbar 变体、page-body 内容、modal 触发逻辑

  navbar 定位说明:
  - navbar 默认 sticky 吸顶(components.css 已配置 position: sticky; top: 0; z-index: var(--z-sticky)),并在组件内部通过 padding-top: var(--safe-area-top, 0px) 自动避让顶部 phone-status 安全区,宿主无需额外处理
  - 深色/图片背景场景加 .navbar--fixed-transparent 修饰类,切换为 fixed 透明反白模式,此时 page-body 需加 padding-top: calc(var(--navbar-body-height, 56px) + var(--safe-area-top, 0px)) 为 navbar 与顶部安全区让位
  - 真机 WebView 场景由 .phone-screen 内 phone-status/phone-indicator 悬浮模拟安全区,内容区自身留距;真机由 env() 返回实际值;移动端同链接隐藏外壳视觉
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>页面标题</title>
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/page.css" />
</head>
<body data-bg="page">
  <div class="preview-shell">
    <div class="phone-frame">
      <div class="phone-screen">
  <div class="phone-status" aria-hidden="true">
    <span>9:41</span>
    <span>5G</span>
  </div>
  <!-- 顶部导航栏:按 design_consumption_plan.navigation_pattern 选择 navbar 变体 -->
  <header data-component="navbar" class="navbar">
    <div class="navbar__body navbar__body--spaced">
      <div class="navbar__left">
        <div class="navbar__left-btn" data-position="left">
          <i class="wego-iconfont-s icon-fanhui"></i>
        </div>
      </div>
      <div class="navbar__center">
        <span class="navbar__title">页面标题</span>
      </div>
      <div class="navbar__right navbar__right--text">
        <button type="button" class="navbar__action navbar__action--text">
          <span class="navbar__action-label">保存</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 页面主体:容器宽度约束 + 居中 -->
  <main class="page-body">
    <!-- 按 design_consumption_plan.component_mapping 组织 section -->
  </main>

  <!-- 全屏模态层容器(full-screen-modal 范式时预置;push 范式可删除) -->
  <div id="modal-overlay" class="modal-overlay" hidden></div>
  <div class="phone-indicator" aria-hidden="true">
    <div class="phone-indicator-bar"></div>
  </div>
      </div>
    </div>
  </div>
</body>
</html>
