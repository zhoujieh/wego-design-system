interface:
  display_name: "Wego Tests"
  short_description: "当用户要验收、回归、review 当前场景是否符合规格时，调用本技能"
  default_prompt: "当用户说“帮我验收 / 检查 / 回归 / review 当前场景”、要核对需求承接、路由、交互、部署状态，或要求输出 acceptance_report 时，隐式调用 $wego-tests。Use this skill to validate the current wego-app scene against page_spec, design_consumption_plan, design rules, route registration, interaction behavior, and deployment readiness."

policy:
  allow_implicit_invocation: true
