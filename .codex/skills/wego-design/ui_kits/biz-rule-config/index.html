<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务规则配置 - 全屏模态</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../scaffold.css">
<link rel="stylesheet" href="../../iconfont.css">
<link rel="stylesheet" href="../../components.css">
<style>
html, body { min-height: auto; }

.phone-status {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--spacer-16);
  background: transparent;
  box-sizing: border-box;
  font-size: var(--body-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
  z-index: var(--z-critical);
  pointer-events: none;
}

.uikit-host-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg-page);
  position: relative;
}

.phone-body {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  gap: var(--spacer-8);
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: var(--safe-area-bottom-content);
}

.bottom-nav {
  padding-bottom: var(--safe-area-bottom);
}

.uikit-base-card {
  background: var(--bg-surface);
  border-radius: var(--radius-12);
  margin: var(--spacer-12);
  padding: var(--spacer-16);
  display: flex;
  align-items: center;
  gap: var(--spacer-12);
}

.uikit-base-copy {
  flex: 1;
  min-width: 0;
}

.uikit-base-title {
  font-size: var(--heading-sm-font-size);
  font-weight: var(--font-weight-semibold);
  color: var(--text-default);
}

.uikit-base-desc {
  margin-top: var(--spacer-4);
  font-size: var(--body-sm-font-size);
  color: var(--text-secondary);
}

.radio-field:focus-visible,
.cell[role="button"]:focus-visible,
.cell[role="checkbox"]:focus-visible,
.switch[role="switch"]:focus-visible {
  outline: 2px solid var(--bg-brand);
  outline-offset: -2px;
}

.uikit-modal-screen {
  position: absolute;
  inset: 0;
  z-index: var(--z-overlay);
  display: flex;
  flex-direction: column;
  background: var(--bg-page);
  transform: translateY(100%);
  transition: transform var(--duration-normal) var(--ease-enter);
  will-change: transform;
}

.uikit-modal-screen.is-open {
  transform: translateY(0);
}

.uikit-modal-screen.is-hidden {
  visibility: hidden;
  pointer-events: none;
}

.uikit-modal-screen .navbar {
  width: 100%;
  flex-shrink: 0;
}

.uikit-modal-screen .navbar__left-text,
.uikit-modal-screen .navbar__action-label {
  font-size: var(--body-lg-font-size);
}

.uikit-toast {
  position: absolute;
  left: 50%;
  bottom: 120px;
  transform: translate(-50%, 16px);
  padding: 8px 16px;
  border-radius: var(--radius-full);
  background: rgba(30, 32, 40, 0.82);
  color: var(--text-inverse);
  font-size: var(--body-sm-font-size);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--duration-fast) var(--ease-standard), transform var(--duration-fast) var(--ease-standard);
  z-index: var(--z-toast);
  white-space: nowrap;
}

.uikit-toast.is-visible {
  opacity: 1;
  transform: translate(-50%, 0);
}

@media (max-width: 767px) {
  .uikit-shell {
    min-height: 100vh;
    min-height: 100dvh;
    align-items: stretch;
    padding: 0;
  }

  .phone-frame {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    max-height: 900px;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }

  .phone-screen {
    border-radius: 0;
  }

  .phone-status,
  .phone-indicator {
    display: none;
  }
}
</style>
</head>
<body class="uikit-page">
<div class="uikit-shell">
  <div class="phone-frame">
    <div class="phone-screen" id="root"></div>
  </div>
</div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useEffect, useState } = React;

function handleActionKeyDown(event, action) {
  if (event.key !== 'Enter' && event.key !== ' ') return;
  event.preventDefault();
  action();
}

function StatusBar() {
  return (
    <div className="phone-status">
      <span>9:41</span>
      <span>5G</span>
    </div>
  );
}

function HomeIndicator() {
  return (
    <div className="phone-indicator">
      <div className="phone-indicator-bar"></div>
    </div>
  );
}

function BottomNav() {
  const iconSrc = (tab) => `../../assets/icons/tab-${tab === 'wode' ? 'active-' : ''}${tab}.svg`;

  return (
    <nav data-component="bottom-nav" className="bottom-nav">
      <div className="bottom-nav__item" data-tab="dongtai">
        <div className="bottom-nav__icon"><img src={iconSrc('dongtai')} width="32" height="32" alt="" /></div>
        <span className="bottom-nav__label">动态</span>
      </div>
      <div className="bottom-nav__item" data-tab="haoyou">
        <div className="bottom-nav__icon"><img src={iconSrc('haoyou')} width="32" height="32" alt="" /></div>
        <span className="bottom-nav__label">好友</span>
      </div>
      <div className="bottom-nav__item" data-tab="gongzuotai">
        <div className="bottom-nav__icon"><img src={iconSrc('gongzuotai')} width="32" height="32" alt="" /></div>
        <span className="bottom-nav__label">工作台</span>
      </div>
      <div className="bottom-nav__item" data-tab="xiaoxi">
        <div className="bottom-nav__icon"><img src={iconSrc('xiaoxi')} width="32" height="32" alt="" /></div>
        <span className="bottom-nav__label">消息</span>
      </div>
      <div className="bottom-nav__item active" data-tab="wode">
        <div className="bottom-nav__icon"><img src={iconSrc('wode')} width="32" height="32" alt="" /></div>
        <span className="bottom-nav__label">我的</span>
      </div>
    </nav>
  );
}

function CheckIcon() {
  return <img className="checkbox__asset" src="../../assets/icons/checkbox-check.svg" alt="" />;
}

function BizSettingsContent({ onPreviewAction }) {
  const [planName, setPlanName] = useState('会员运营设置');
  const [reportCycle, setReportCycle] = useState('all');
  const [switches, setSwitches] = useState({
    autoSync: true,
    stockAlert: true,
    smsNotify: false
  });
  const [permissions, setPermissions] = useState({
    exportData: true,
    editPrice: false,
    notifyMembers: true
  });

  const toggleSwitch = (key) => setSwitches((prev) => ({ ...prev, [key]: !prev[key] }));
  const togglePermission = (key) => setPermissions((prev) => ({ ...prev, [key]: !prev[key] }));

  return (
    <>
      <div className="form-group">
        <div className="form-group__title">基础信息</div>
        <div className="form-group__content">
          <div className="form-body">
            <div className="form-body__label">方案名称</div>
            <div className="form-body__action">
              <input
                type="text"
                value={planName}
                onChange={(event) => setPlanName(event.target.value)}
                placeholder="请输入方案名称"
              />
            </div>
          </div>
          <div
            className="form-body form-body--clickable"
            role="button"
            tabIndex={0}
            onClick={() => onPreviewAction('负责人选择面板待接入')}
            onKeyDown={(event) => handleActionKeyDown(event, () => onPreviewAction('负责人选择面板待接入'))}
          >
            <div className="form-body__label">负责人</div>
            <div className="form-body__action">
              <div className="form-body__select">
                <span className="form-body__select-text has-value">商品运营组</span>
                <i className="form-body__select-arrow wego-iconfont-s icon-youjiantou16"></i>
              </div>
            </div>
          </div>
          <div
            className="form-body form-body--clickable"
            role="button"
            tabIndex={0}
            onClick={() => onPreviewAction('同步频率选择面板待接入')}
            onKeyDown={(event) => handleActionKeyDown(event, () => onPreviewAction('同步频率选择面板待接入'))}
          >
            <div className="form-body__label">同步频率</div>
            <div className="form-body__action">
              <div className="form-body__select">
                <span className="form-body__select-text has-value">每30分钟</span>
                <i className="form-body__select-arrow wego-iconfont-s icon-youjiantou16"></i>
              </div>
            </div>
          </div>
          <div className="form-body form-body--preserve-content-align">
            <div className="form-body__label">统计口径</div>
            <div className="form-body__action" aria-hidden="true"></div>
            <div className="form-body__right-btn">
              <div className="radio-field-group" role="radiogroup" aria-label="统计口径">
                <div
                  className="radio-field"
                  role="radio"
                  aria-checked={reportCycle === 'all'}
                  tabIndex={0}
                  onClick={() => setReportCycle('all')}
                  onKeyDown={(event) => handleActionKeyDown(event, () => setReportCycle('all'))}
                >
                  <div className={`radio radio--sm${reportCycle === 'all' ? ' radio--checked' : ''}`}>
                    <div className="radio__inner"></div>
                    <div className="radio__dot"></div>
                  </div>
                  <span className="radio-field__text">全店汇总</span>
                </div>
                <div
                  className="radio-field"
                  role="radio"
                  aria-checked={reportCycle === 'shop'}
                  tabIndex={0}
                  onClick={() => setReportCycle('shop')}
                  onKeyDown={(event) => handleActionKeyDown(event, () => setReportCycle('shop'))}
                >
                  <div className={`radio radio--sm${reportCycle === 'shop' ? ' radio--checked' : ''}`}>
                    <div className="radio__inner"></div>
                    <div className="radio__dot"></div>
                  </div>
                  <span className="radio-field__text">按门店</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="cell-group">
        <div className="cell-group__title">规则与提醒</div>
        <div className="cell-group__content">
        <div
          className="cell cell--double cell--divider-right-edge cell--bg-white"
        >
          <div className="cell__body">
            <div className="cell__content">
              <div className="cell__title-row"><span className="cell__title">自动同步业务数据</span></div>
              <div className="cell__subtitle">保存后按同步频率自动刷新库存、价格和成员归属。</div>
            </div>
            <div className="cell__action">
              <div
                className={`switch${switches.autoSync ? ' switch--on' : ' switch--off'}`}
                role="switch"
                aria-checked={switches.autoSync}
                tabIndex={0}
                onClick={() => toggleSwitch('autoSync')}
                onKeyDown={(event) => handleActionKeyDown(event, () => toggleSwitch('autoSync'))}
              ><div className="switch__thumb"></div></div>
            </div>
          </div>
        </div>
        <div
          className="cell cell--single cell--divider-right-edge cell--bg-white"
        >
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">库存异常预警</span></div></div>
            <div className="cell__action">
              <div
                className={`switch${switches.stockAlert ? ' switch--on' : ' switch--off'}`}
                role="switch"
                aria-checked={switches.stockAlert}
                tabIndex={0}
                onClick={() => toggleSwitch('stockAlert')}
                onKeyDown={(event) => handleActionKeyDown(event, () => toggleSwitch('stockAlert'))}
              ><div className="switch__thumb"></div></div>
            </div>
          </div>
        </div>
        <div
          className="cell cell--single cell--divider-right-edge cell--bg-white"
        >
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">短信提醒负责人</span></div></div>
            <div className="cell__action">
              <div
                className={`switch${switches.smsNotify ? ' switch--on' : ' switch--off'}`}
                role="switch"
                aria-checked={switches.smsNotify}
                tabIndex={0}
                onClick={() => toggleSwitch('smsNotify')}
                onKeyDown={(event) => handleActionKeyDown(event, () => toggleSwitch('smsNotify'))}
              ><div className="switch__thumb"></div></div>
            </div>
          </div>
        </div>
        </div>
      </div>

      <div className="cell-group">
        <div className="cell-group__title">适用范围</div>
        <div className="cell-group__content">
        <div
          className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          role="button"
          tabIndex={0}
          onClick={() => onPreviewAction('可见范围选择面板待接入')}
          onKeyDown={(event) => handleActionKeyDown(event, () => onPreviewAction('可见范围选择面板待接入'))}
        >
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">可见范围</span></div></div>
            <div className="cell__action">
              <span className="cell__action-text">全部导购</span>
              <i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
            </div>
          </div>
        </div>
        <div
          className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          role="button"
          tabIndex={0}
          onClick={() => onPreviewAction('默认处理人选择面板待接入')}
          onKeyDown={(event) => handleActionKeyDown(event, () => onPreviewAction('默认处理人选择面板待接入'))}
        >
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">默认处理人</span></div></div>
            <div className="cell__action">
              <span className="cell__action-text">当前负责人</span>
              <i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i>
            </div>
          </div>
        </div>
        <div
          className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          role="checkbox"
          aria-checked={permissions.exportData}
          tabIndex={0}
          onClick={() => togglePermission('exportData')}
          onKeyDown={(event) => handleActionKeyDown(event, () => togglePermission('exportData'))}
        >
          <div className="cell__select">
            <div className={`checkbox${permissions.exportData ? ' checkbox--checked' : ''}`}>
              <div className="checkbox__inner"></div>
              {permissions.exportData && <div className="checkbox__icon"><CheckIcon /></div>}
            </div>
          </div>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许成员导出数据</span></div></div>
          </div>
        </div>
        <div
          className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          role="checkbox"
          aria-checked={permissions.editPrice}
          tabIndex={0}
          onClick={() => togglePermission('editPrice')}
          onKeyDown={(event) => handleActionKeyDown(event, () => togglePermission('editPrice'))}
        >
          <div className="cell__select">
            <div className={`checkbox${permissions.editPrice ? ' checkbox--checked' : ''}`}>
              <div className="checkbox__inner"></div>
              {permissions.editPrice && <div className="checkbox__icon"><CheckIcon /></div>}
            </div>
          </div>
          <div className="cell__body">
            <div className="cell__content"><div className="cell__title-row"><span className="cell__title">允许修改售价</span></div></div>
          </div>
        </div>
        <div
          className="cell cell--double cell--divider-right-edge cell--bg-white cell--clickable"
          role="checkbox"
          aria-checked={permissions.notifyMembers}
          tabIndex={0}
          onClick={() => togglePermission('notifyMembers')}
          onKeyDown={(event) => handleActionKeyDown(event, () => togglePermission('notifyMembers'))}
        >
          <div className="cell__select">
            <div className={`checkbox${permissions.notifyMembers ? ' checkbox--checked' : ''}`}>
              <div className="checkbox__inner"></div>
              {permissions.notifyMembers && <div className="checkbox__icon"><CheckIcon /></div>}
            </div>
          </div>
          <div className="cell__body">
            <div className="cell__content">
              <div className="cell__title-row"><span className="cell__title">保存后通知相关成员</span></div>
              <div className="cell__subtitle">保存生效后，通过站内消息通知受影响成员。</div>
            </div>
          </div>
        </div>
        </div>
      </div>
    </>
  );
}

function BizSettingsModal({ isOpen, onCancel, onSave, onPreviewAction }) {
  return (
    <div className={`uikit-modal-screen${isOpen ? ' is-open' : ''}`} aria-hidden={!isOpen}>
      <StatusBar />
      <div data-component="navbar" className="navbar">
          <div className="navbar__body navbar__body--spaced">
          <div className="navbar__left">
            <button type="button" className="navbar__left-text" onClick={onCancel}>取消</button>
          </div>
          <div className="navbar__center">
            <span className="navbar__title">业务规则配置</span>
          </div>
          <div className="navbar__right navbar__right--button">
            <div className="navbar__action navbar__action--button">
              <button type="button" className="btn btn--strong btn--sm" onClick={onSave}>保存</button>
            </div>
          </div>
        </div>
      </div>
      <div className="phone-body">
        <BizSettingsContent onPreviewAction={onPreviewAction} />
      </div>
      <HomeIndicator />
    </div>
  );
}

function BaseScreen({ onOpen }) {
  return (
    <div className="uikit-host-screen">
      <StatusBar />
      <div data-component="navbar" className="navbar">
        <div className="navbar__body">
          <div className="navbar__left"></div>
          <div className="navbar__center navbar__center--wide">
            <span className="navbar__title">我的</span>
          </div>
          <div className="navbar__right"></div>
        </div>
      </div>
      <div className="phone-body">
        <div className="uikit-base-card">
          <div data-component="avatar" className="avatar avatar--56 avatar--initials">微</div>
        <div className="uikit-base-copy">
          <div className="uikit-base-title">门店业务规则配置</div>
          <div className="uikit-base-desc">从底部打开，全屏覆盖，适合管理复杂设置任务。</div>
        </div>
        </div>
        <div className="cell-group">
          <div className="cell-group__title">设置入口</div>
          <div className="cell-group__content cell-group__content--card">
          <div
            data-component="cell"
            className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
            role="button"
            tabIndex={0}
            onClick={onOpen}
            onKeyDown={(event) => handleActionKeyDown(event, onOpen)}
          >
            <div className="cell__body">
              <div className="cell__content"><div className="cell__title-row"><span className="cell__title">业务规则配置</span></div></div>
              <div className="cell__action"><i className="cell__arrow wego-iconfont-s icon-youjiantou16"></i></div>
            </div>
          </div>
          <div data-component="cell" className="cell cell--single cell--divider-right-edge cell--bg-white">
            <div className="cell__body">
              <div className="cell__content"><div className="cell__title-row"><span className="cell__title">消息通知</span></div></div>
              <div className="cell__action"><span className="cell__action-text">已开启</span></div>
            </div>
          </div>
          </div>
        </div>
      </div>
      <BottomNav />
      <HomeIndicator />
    </div>
  );
}

function App() {
  const [modalMounted, setModalMounted] = useState(true);
  const [modalOpen, setModalOpen] = useState(true);
  const [toast, setToast] = useState('');

  useEffect(() => {
    if (!toast) return undefined;
    const timer = window.setTimeout(() => setToast(''), 1500);
    return () => window.clearTimeout(timer);
  }, [toast]);

  const openModal = () => {
    setModalMounted(true);
    window.setTimeout(() => setModalOpen(true), 16);
  };

  const closeModal = () => {
    setModalOpen(false);
    window.setTimeout(() => setModalMounted(false), 260);
  };

      const handleSave = () => {
    setToast('已保存业务规则配置');
    closeModal();
  };

  return (
    <>
      <BaseScreen onOpen={openModal} />
      {modalMounted ? <BizSettingsModal isOpen={modalOpen} onCancel={closeModal} onSave={handleSave} onPreviewAction={setToast} /> : null}
      <div className={`uikit-toast${toast ? ' is-visible' : ''}`}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
