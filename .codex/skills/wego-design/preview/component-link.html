<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link 链接 — 微购设计系统</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>

/* @component-css-start */
/* ── Link (Standalone) ── */
.link { --link-font-size:var(--body-md-font-size); --link-line-height:var(--body-md-line-height); position:relative; display:inline-flex; align-items:center; height:20px; gap:var(--spacer-4); color:var(--text-link); font-size:var(--link-font-size); font-weight:var(--font-weight-medium); line-height:var(--link-line-height); cursor:pointer; text-decoration:none; transition:background var(--duration-fast) var(--ease-standard), color var(--duration-fast) var(--ease-standard); border-radius:0; padding:0; user-select:none; -webkit-tap-highlight-color:transparent; white-space:nowrap; flex-shrink:0; }
.link::before { content:""; position:absolute; top:50%; left:50%; width:max(100%, var(--touch-min)); min-width:var(--touch-min); height:var(--touch-min); transform:translate(-50%, -50%); }
/* Pressed state — 无圆角 */
.link:active { background:var(--bg-overlay-l2); }
/* Disabled state */
.link--disabled { color:var(--text-disabled); pointer-events:none; cursor:not-allowed; }
.link--disabled:active { background:transparent; }
.link--12 { --link-font-size:var(--body-sm-font-size); --link-line-height:var(--body-sm-line-height); }

/* ── LinkSpan (Inline) ── */
.link--inline { height:auto; padding:0; font-size:inherit; line-height:inherit; white-space:normal; flex-shrink:1; }
.link--inline::before { display:none; }
.link--inline:active { background:var(--bg-overlay-l2); }

/* @component-css-end */

.link-demo-flow { max-width:320px; flex-wrap:wrap; gap:var(--spacer-4); }
.link-demo-flow--spaced { margin-top:var(--spacer-16); }
.link-demo-flow--md { font-size:var(--body-md-font-size); line-height:var(--body-md-line-height); }
.link-demo-flow--sm { font-size:var(--body-sm-font-size); line-height:var(--body-sm-line-height); }
.link-demo-copy { color:var(--text-secondary); }
.link-demo-note { font-size:var(--body-sm-font-size); color:var(--text-tertiary); max-width:400px; line-height:1.6; }
</style>
</head>
<body>
<div class="pv-header"><h1>链接</h1><p>独立链接和内联链接，适合文字跳转操作。</p></div>

<div class="pv-section__title">Standalone — 默认态</div>
<div class="row">
  <span class="label">14px</span>
  <a class="link" href="javascript:void(0)">查看详情</a>
</div>

<div class="pv-section__title">Standalone — 紧凑态</div>
<div class="row">
  <span class="label">12px</span>
  <a class="link link--12" href="javascript:void(0)">查看规则</a>
</div>


<div class="pv-section__title">Standalone — 禁用态</div>
<div class="row">
  <span class="label">14px 禁用</span>
  <a class="link link--disabled" href="javascript:void(0)">查看详情</a>
</div>


<div class="pv-section__title">Inline — RichText 内联链接</div>
<div class="row link-demo-flow link-demo-flow--md">
  <span class="link-demo-copy">请阅读 </span>
  <a class="link link--inline" href="javascript:void(0)">服务协议</a>
  <span class="link-demo-copy"> 和 </span>
  <a class="link link--inline" href="javascript:void(0)">隐私政策</a>
</div>
<div class="row link-demo-flow link-demo-flow--sm link-demo-flow--spaced">
  <span class="link-demo-copy">下单前请阅读 </span>
  <a class="link link--inline" href="javascript:void(0)">配送规则</a>
  <span class="link-demo-copy">，避免错过时效说明</span>
</div>


<div class="pv-section__title">交互提示</div>
<div class="link-demo-note">
  独立链接默认 14px，支持 12px 紧凑尺寸，并通过伪元素补足紧凑热区；正文内联链接跟随所在文本行字号，不额外扩展热区。禁用态使用禁用文字色，不响应点击。
</div>

</body>
</html>
