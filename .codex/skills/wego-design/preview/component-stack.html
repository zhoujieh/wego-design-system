<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack (选项卡) - 微购设计系统</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>
.sub-label { font-size:var(--body-sm-font-size); color:var(--text-tertiary); margin:var(--spacer-8) 0 var(--spacer-4); }
.interactive-row .stack { cursor:pointer; }

/* @component-css-start */
.stack{display:inline-flex;box-sizing:border-box;cursor:pointer;-webkit-tap-highlight-color:transparent}
.stack__bg{position:relative;display:inline-flex;align-items:center;justify-content:center;width:56px;height:32px;box-sizing:border-box;border-radius:var(--radius-6);background:var(--bg-subtle);transition:background var(--duration-fast) var(--ease-standard),border-color var(--duration-fast) var(--ease-standard),color var(--duration-fast) var(--ease-standard)}
.stack--selected .stack__bg{background:var(--bg-brand-surface-l2);box-shadow:inset 0 0 0 1px var(--bg-brand)}
.stack__check-corner{position:absolute;top:0;right:0;display:none;align-items:center;justify-content:center;width:12px;height:12px;border-top-right-radius:var(--radius-6);border-bottom-left-radius:8px;background:var(--bg-brand);color:var(--bg-surface)}
.stack--selected .stack__check-corner{display:inline-flex}
.stack__check-icon{font-size:10px;line-height:1}
.stack__label{font-family:var(--body-md-font-family);font-size:var(--body-md-font-size);font-weight:var(--font-weight-regular);line-height:var(--body-md-line-height);color:var(--text-secondary);text-align:center;font-feature-settings:"zero";transition:color var(--duration-fast) var(--ease-standard)}
.stack--selected .stack__label{font-weight:var(--font-weight-medium);color:var(--text-brand)}
/* @component-css-end */
</style>
</head>
<body>
<div class="pv-header"><h1>选项卡</h1><p>方块式选项，多项选择场景，支持未选和已选态。</p></div>

<div class="pv-section__title">默认状态</div>
<div class="row">
  <span class="label">未选中</span>
  <div class="stack">
    <div class="stack__bg">
      <span class="stack__label">选项</span>
      <span class="stack__check-corner" aria-hidden="true">
        <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
      </span>
    </div>
  </div>
  <span class="label">选中</span>
  <div class="stack stack--selected">
    <div class="stack__bg">
      <span class="stack__label">选项</span>
      <span class="stack__check-corner" aria-hidden="true">
        <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
      </span>
    </div>
  </div>
</div>


<div class="pv-section__title">暗色模式</div>
<div class="dark-strip">
  <div class="row">
    <span class="label">暗色未选中</span>
    <div class="stack">
      <div class="stack__bg">
        <span class="stack__label">选项</span>
        <span class="stack__check-corner" aria-hidden="true">
          <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
        </span>
      </div>
    </div>
    <span class="label">暗色选中</span>
    <div class="stack stack--selected">
      <div class="stack__bg">
        <span class="stack__label">选项</span>
        <span class="stack__check-corner" aria-hidden="true">
          <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
        </span>
      </div>
    </div>
  </div>
</div>


<div class="pv-section__title">交互演示</div>
<p class="demo-hint">点击选项卡切换选中/未选中状态</p>

<div class="interactive-row">
  <div class="stack" data-selected="false">
    <div class="stack__bg">
      <span class="stack__label">全部</span>
      <span class="stack__check-corner" aria-hidden="true">
        <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
      </span>
    </div>
  </div>
  <span class="interactive-text">全部商品</span>
</div>
<div class="interactive-row">
  <div class="stack stack--selected" data-selected="true">
    <div class="stack__bg">
      <span class="stack__label">数码</span>
      <span class="stack__check-corner" aria-hidden="true">
        <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
      </span>
    </div>
  </div>
  <span class="interactive-text">数码产品</span>
</div>
<div class="interactive-row">
  <div class="stack" data-selected="false">
    <div class="stack__bg">
      <span class="stack__label">食品</span>
      <span class="stack__check-corner" aria-hidden="true">
        <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
      </span>
    </div>
  </div>
  <span class="interactive-text">食品饮料</span>
</div>
<div class="interactive-row">
  <div class="stack" data-selected="false">
    <div class="stack__bg">
      <span class="stack__label">服饰</span>
      <span class="stack__check-corner" aria-hidden="true">
        <i class="wego-iconfont-s icon-gou16 stack__check-icon"></i>
      </span>
    </div>
  </div>
  <span class="interactive-text">服饰鞋包</span>
</div>

<script>
(function() {
  document.querySelectorAll('.interactive-row').forEach(function(row) {
    row.addEventListener('click', function() {
      var stack = row.querySelector('.stack');
      var isSelected = stack.getAttribute('data-selected') === 'true';

      if (isSelected) {
        stack.classList.remove('stack--selected');
        stack.setAttribute('data-selected', 'false');
      } else {
        stack.classList.add('stack--selected');
        stack.setAttribute('data-selected', 'true');
      }
    });
  });
})();
</script>
</body>
</html>
