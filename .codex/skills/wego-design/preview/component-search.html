<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search 搜索框</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>
.search-demo { display: flex; flex-direction: column; gap: var(--spacer-16); }
.search-demo__row { display: flex; flex-wrap: wrap; align-items: flex-start; gap: var(--spacer-16); }
.search-demo__cell { display: flex; flex-direction: column; gap: var(--spacer-8); min-width: 0; }
.search-demo__label { color: var(--text-secondary); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); }
.search-demo__surface { display: flex; flex-direction: column; gap: var(--spacer-12); width: 360px; max-width: 100%; padding: var(--spacer-16); border-radius: var(--radius-12); background: var(--bg-surface); box-shadow: var(--shadow-xs); box-sizing: border-box; }
.search-demo__surface--page { background: var(--bg-page); }
.search-demo__surface--dark { background: var(--bg-inverse); }
.search-demo__surface--wide { width: 520px; }
.search-demo__surface--narrow { width: 240px; }
.search-demo__fixed { width: var(--demo-width); }
.search-demo__fixed--240 { --demo-width: 240px; }
.search-demo__fixed--180 { --demo-width: 180px; }
.search-results-panel { width: 360px; max-width: 100%; min-height: 360px; background: var(--bg-surface); border-radius: 0 0 var(--radius-12) var(--radius-12); box-shadow: var(--shadow-sm); overflow: hidden; }
.search-results-panel__item { display: flex; align-items: center; gap: var(--spacer-12); padding: var(--spacer-12) var(--spacer-16); border-bottom: 0.5px solid var(--border-neutral-l2); color: var(--text-default); font-size: var(--body-md-font-size); line-height: var(--body-md-line-height); }
.search-results-panel__thumb { width: var(--size-36); height: var(--size-36); border-radius: var(--radius-6); object-fit: cover; background: var(--bg-muted); }

/* @component-css-start */
.searchbox {
  --searchbox-height: var(--size-36);
  --searchbox-radius: var(--radius-8);
  --searchbox-icon-slot: var(--size-36);
  --searchbox-icon-size: var(--size-20);
  --searchbox-font-size: var(--body-lg-font-size);
  --searchbox-bg: var(--bg-subtle);
  --searchbox-color: var(--text-default);
  --searchbox-placeholder-color: var(--text-placeholder);
  --searchbox-width: 100%;
  display: flex;
  align-items: center;
  width: var(--searchbox-width);
  min-width: 0;
  height: var(--searchbox-height);
  overflow: hidden;
  border-radius: var(--searchbox-radius);
  background: var(--searchbox-bg);
  color: var(--searchbox-color);
  box-sizing: border-box;
}

.searchbox--md {
  --searchbox-height: var(--size-36);
  --searchbox-radius: var(--radius-8);
  --searchbox-icon-slot: var(--size-36);
  --searchbox-icon-size: var(--size-20);
  --searchbox-font-size: var(--body-lg-font-size);
}

.searchbox--sm {
  --searchbox-height: var(--size-32);
  --searchbox-radius: var(--radius-6);
  --searchbox-icon-slot: var(--size-32);
  --searchbox-icon-size: var(--size-16);
  --searchbox-font-size: var(--body-md-font-size);
}

.searchbox--gray { --searchbox-bg: var(--bg-subtle); }
.searchbox--white { --searchbox-bg: var(--bg-surface); }

.searchbox--accent {
  --searchbox-radius: var(--radius-full);
  --searchbox-font-size: var(--body-md-font-size);
  padding-right: var(--spacer-12);
  border: var(--stroke-strong) solid var(--bg-brand);
  background: var(--transparent);
}

.searchbox__icon,
.searchbox__action {
  flex: 0 0 var(--searchbox-icon-slot);
  display: flex;
  align-items: center;
  justify-content: center;
  width: var(--searchbox-icon-slot);
  height: var(--searchbox-height);
  border: 0;
  background: var(--transparent);
  color: var(--icon-secondary);
  font-size: var(--searchbox-icon-size);
  line-height: 1;
  box-sizing: border-box;
}

.searchbox__action {
  flex-basis: var(--size-32);
  width: var(--size-32);
  cursor: pointer;
}

.searchbox__input {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: var(--spacer-4);
  height: 100%;
}

.searchbox__field {
  width: 100%;
  min-width: 0;
  height: 100%;
  padding: 0;
  border: 0;
  outline: 0;
  appearance: none;
  -webkit-appearance: none;
  background: var(--transparent);
  color: var(--searchbox-color);
  font: inherit;
  font-size: var(--searchbox-font-size);
}

.searchbox__field::-webkit-search-decoration,
.searchbox__field::-webkit-search-cancel-button,
.searchbox__field::-webkit-search-results-button,
.searchbox__field::-webkit-search-results-decoration {
  appearance: none;
  -webkit-appearance: none;
}

.searchbox__field::placeholder,
.searchbox__placeholder {
  color: var(--searchbox-placeholder-color);
}

.searchbox__placeholder,
.searchbox__keyword {
  display: block;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: var(--searchbox-font-size);
  line-height: var(--body-lg-line-height);
}

.searchbox__keyword { color: var(--text-default); }

.searchbox__actions {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  height: 100%;
}

.searchbox__clear { color: var(--text-disabled); }

.searchbox__image-token {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  overflow: hidden;
}

.searchbox__image-token--single {
  width: var(--size-24);
  height: var(--size-24);
}

.searchbox__image-thumb {
  display: block;
  width: var(--size-24);
  height: var(--size-24);
  border-radius: 2px;
  object-fit: cover;
  background: var(--bg-subtle);
}

.searchbox__image-token--multi {
  width: 64px;
  height: var(--size-24);
  gap: var(--spacer-4);
  border-radius: 2px;
}

.searchbox__image-token--multi.searchbox__image-token--gray {
  background: var(--bg-subtle);
}

.searchbox__image-token--dark {
  width: 68px;
  height: var(--size-28);
  gap: var(--spacer-4);
  padding: 2px var(--spacer-4) 2px 2px;
  border-radius: var(--radius-6);
  background: var(--bg-toast);
  box-sizing: border-box;
}

.searchbox__image-token--dark .searchbox__image-thumb {
  flex: 0 0 var(--size-24);
}

.searchbox__image-count {
  min-width: 0;
  overflow: hidden;
  color: var(--text-secondary);
  font-size: var(--body-xs-font-size);
  line-height: var(--body-xs-line-height);
  white-space: nowrap;
}

.searchbox__image-token--dark .searchbox__image-count { color: var(--text-inverse); }

.searchbox--accent .searchbox__icon,
.searchbox--accent .searchbox__action {
  flex-basis: var(--size-20);
  width: var(--size-20);
  height: var(--searchbox-height);
  color: var(--bg-brand);
}

.searchbox--accent .searchbox__input {
  padding-left: var(--spacer-8);
}

.search-host--dark {
  padding: var(--spacer-16);
  background: var(--bg-inverse);
}

.search-host--dark .searchbox:not(.searchbox--accent) {
  --searchbox-bg: var(--bg-surface);
}

.search-overlay-bar,
.search-toolbar {
  display: flex;
  align-items: center;
  width: 100%;
  min-width: 0;
  gap: var(--spacer-8);
  box-sizing: border-box;
}

.search-overlay-bar {
  padding: var(--spacer-8) var(--spacer-12);
  background: var(--bg-surface);
}

.search-overlay-bar--page {
  background: var(--bg-page);
}

.search-overlay-bar__cancel,
.search-nav-bar__back,
.search-nav-bar__action,
.search-toolbar__action {
  flex: 0 0 auto;
  border: 0;
  background: var(--transparent);
  color: var(--text-default);
  font-size: var(--body-md-font-size);
  line-height: var(--body-md-line-height);
}

.search-overlay-bar__cancel {
  padding: 0 var(--spacer-4);
  color: var(--text-secondary);
  white-space: nowrap;
  cursor: pointer;
}

.search-nav-bar {
  display: flex;
  align-items: center;
  width: 100%;
  min-width: 0;
  height: var(--size-48);
  gap: var(--spacer-8);
  padding: 0 var(--spacer-12);
  background: var(--bg-surface);
  box-sizing: border-box;
}

.search-nav-bar--page {
  background: var(--bg-page);
}

.search-nav-bar__back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: var(--size-28);
  height: var(--size-40);
  padding: 0;
  font-size: var(--size-24);
  cursor: pointer;
}

.search-nav-bar__actions {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: var(--spacer-8);
}

.search-nav-bar__action {
  padding: 0;
  white-space: nowrap;
  cursor: pointer;
}

.search-toolbar {
  padding: var(--spacer-8) 0;
  background: var(--transparent);
}

.search-toolbar__actions {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: var(--spacer-8);
}

.search-toolbar__action {
  display: inline-flex;
  align-items: center;
  gap: var(--spacer-4);
  min-height: var(--size-32);
  padding: 0 var(--spacer-8);
  border-radius: var(--radius-6);
  background: var(--bg-surface);
  box-shadow: var(--shadow-xs);
  cursor: pointer;
}

.search-toolbar__action-icon {
  color: var(--icon-secondary);
  font-size: var(--size-16);
  line-height: 1;
}

.search-toolbar__action--stacked {
  flex-direction: column;
  gap: 0;
  min-width: var(--size-40);
  min-height: var(--size-40);
  padding: var(--spacer-4);
  font-size: var(--body-xs-font-size);
  line-height: var(--body-xs-line-height);
}

.search-toolbar__action--stacked .search-toolbar__action-icon {
  font-size: var(--size-20);
}

.search-title-bar {
  display: flex;
  align-items: center;
  width: 100%;
  min-width: 0;
  padding: var(--spacer-4) var(--spacer-8);
  box-sizing: border-box;
}
/* @component-css-end */
</style>
</head>
<body>

<div class="pv-header">
  <h1>Search 搜索框</h1>
  <p>覆盖文搜、图搜、内部动作和外层业务组合范式；基础搜索框固定为左图标、中间输入、右侧内部动作三段。</p>
</div>

<div class="search-demo">
  <section class="pv-section">
    <h2>36 默认自适应</h2>
    <div class="search-demo__row">
      <div class="search-demo__surface search-demo__surface--wide">
        <span class="search-demo__label">宽宿主</span>
        <div class="searchbox searchbox--md searchbox--white">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <input class="searchbox__field" type="search" placeholder="提示词" aria-label="搜索商品">
          </div>
          <div class="searchbox__actions"></div>
        </div>
      </div>
      <div class="search-demo__surface search-demo__surface--narrow">
        <span class="search-demo__label">窄宿主</span>
        <div class="searchbox searchbox--md searchbox--white">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <span class="searchbox__placeholder">提示词</span>
          </div>
          <div class="searchbox__actions"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="pv-section">
    <h2>32 局部定宽</h2>
    <div class="search-demo__row">
      <div class="search-demo__surface">
        <span class="search-demo__label">240px</span>
        <div class="search-demo__fixed search-demo__fixed--240">
          <div class="searchbox searchbox--sm searchbox--gray">
            <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
            <div class="searchbox__input"><span class="searchbox__placeholder">搜索商品</span></div>
            <div class="searchbox__actions">
              <button class="searchbox__action wego-iconfont-s icon-tupian" type="button" aria-label="选择图片"></button>
            </div>
          </div>
        </div>
        <span class="search-demo__label">180px</span>
        <div class="search-demo__fixed search-demo__fixed--180">
          <div class="searchbox searchbox--sm searchbox--white is-text-result">
            <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
            <div class="searchbox__input"><span class="searchbox__keyword">关键词关键词</span></div>
            <div class="searchbox__actions">
              <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="pv-section">
    <h2>文搜与图搜</h2>
    <div class="search-demo__row">
      <div class="search-demo__surface">
        <span class="search-demo__label">文搜输入中</span>
        <div class="searchbox searchbox--md searchbox--white is-inputting">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <input class="searchbox__field" type="search" value="关键词" aria-label="搜索商品">
          </div>
          <div class="searchbox__actions">
            <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
          </div>
        </div>
        <span class="search-demo__label">文搜结果态</span>
        <div class="searchbox searchbox--md searchbox--white is-text-result">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input"><span class="searchbox__keyword">关键词</span></div>
          <div class="searchbox__actions">
            <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
            <button class="searchbox__action wego-iconfont-s icon-tupian" type="button" aria-label="选择图片"></button>
          </div>
        </div>
        <span class="search-demo__label">显式开启图搜后的结果态</span>
        <div class="searchbox searchbox--md searchbox--white is-image-result">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <span class="searchbox__image-token searchbox__image-token--single">
              <img class="searchbox__image-thumb" src="../assets/image/clothing/clothing_5/1663741067252_48951.jpg" alt="">
            </span>
            <input class="searchbox__field" type="search" placeholder="继续输入文字切回文搜" aria-label="按图搜索后继续输入文字">
          </div>
          <div class="searchbox__actions">
            <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
          </div>
        </div>
        <span class="search-demo__label">显式开启图搜后的多图结果态</span>
        <div class="searchbox searchbox--md searchbox--white is-image-result">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <span class="searchbox__image-token searchbox__image-token--multi">
              <img class="searchbox__image-thumb" src="../assets/image/clothing/clothing_6/img_1708defc_20240216_i1708092843_7820_16.jpg.jpg" alt="">
              <span class="searchbox__image-count">共3张</span>
            </span>
          </div>
          <div class="searchbox__actions">
            <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
            <button class="searchbox__action wego-iconfont-s icon-saoyisao" type="button" aria-label="扫一扫"></button>
          </div>
        </div>
      </div>
      <div class="search-demo__surface search-demo__surface--dark search-host--dark">
        <span class="search-demo__label">深色透明宿主</span>
        <div class="searchbox searchbox--md searchbox--white">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <span class="searchbox__image-token searchbox__image-token--dark">
              <img class="searchbox__image-thumb" src="../assets/image/clothing/clothing_10/1663740458800_66991.jpg" alt="">
              <span class="searchbox__image-count">共3张</span>
            </span>
          </div>
          <div class="searchbox__actions">
            <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
            <button class="searchbox__action wego-iconfont-s icon-tupian" type="button" aria-label="选择图片"></button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="pv-section">
    <h2>覆盖式搜索取消</h2>
    <div class="search-demo__surface">
      <div class="search-overlay-bar">
        <div class="searchbox searchbox--md searchbox--white is-inputting">
          <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
          <div class="searchbox__input">
            <input class="searchbox__field" type="search" value="羽绒外套" aria-label="搜索商品">
          </div>
          <div class="searchbox__actions">
            <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
          </div>
        </div>
        <button class="search-overlay-bar__cancel" type="button">取消</button>
      </div>
      <div class="search-results-panel">
        <div class="search-results-panel__item">
          <img class="search-results-panel__thumb" src="../assets/image/clothing/clothing_11/1663741015636_57550.jpg" alt="">
          <span>羽绒外套 女短款</span>
        </div>
        <div class="search-results-panel__item">
          <img class="search-results-panel__thumb" src="../assets/image/clothing/clothing_13/1664276865083_43086.jpg" alt="">
          <span>连帽羽绒服</span>
        </div>
      </div>
    </div>
  </section>

  <section class="pv-section">
    <h2>业务组合</h2>
    <div class="search-demo__row">
      <div class="search-demo__surface">
        <span class="search-demo__label">导航栏返回搜索</span>
        <div class="search-nav-bar">
          <button class="search-nav-bar__back wego-iconfont-s icon-fanhui" type="button" aria-label="返回"></button>
          <div class="searchbox searchbox--md searchbox--gray">
            <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
            <div class="searchbox__input"><span class="searchbox__placeholder">商品名/货号</span></div>
            <div class="searchbox__actions">
              <button class="searchbox__action wego-iconfont-s icon-tupian" type="button" aria-label="选择图片"></button>
            </div>
          </div>
          <div class="search-nav-bar__actions">
            <button class="search-nav-bar__action" type="button">搜索</button>
          </div>
        </div>
        <span class="search-demo__label">页面内部筛选</span>
        <div class="search-toolbar">
          <div class="searchbox searchbox--sm searchbox--gray">
            <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
            <div class="searchbox__input"><span class="searchbox__placeholder">搜索商品</span></div>
            <div class="searchbox__actions">
              <button class="searchbox__action wego-iconfont-s icon-tupian" type="button" aria-label="选择图片"></button>
            </div>
          </div>
          <div class="search-toolbar__actions">
            <button class="search-toolbar__action" type="button"><span class="search-toolbar__action-icon wego-iconfont-s icon-shaixuan" aria-hidden="true"></span>筛选</button>
          </div>
        </div>
        <div class="search-toolbar">
          <div class="searchbox searchbox--sm searchbox--white is-text-result">
            <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
            <div class="searchbox__input"><span class="searchbox__keyword">连衣裙</span></div>
            <div class="searchbox__actions">
              <button class="searchbox__action searchbox__clear wego-iconfont-s icon-yuancha-mian" type="button" aria-label="清除"></button>
            </div>
          </div>
          <div class="search-toolbar__actions">
            <button class="search-toolbar__action search-toolbar__action--stacked" type="button">
              <span class="search-toolbar__action-icon wego-iconfont-s icon-shaixuan" aria-hidden="true"></span>
              筛选
            </button>
          </div>
        </div>
      </div>
      <div class="search-demo__surface">
        <span class="search-demo__label">导航标题区强调搜索</span>
        <div class="search-title-bar">
          <div class="searchbox searchbox--md searchbox--accent">
            <span class="searchbox__icon wego-iconfont-s icon-sousuo" aria-hidden="true"></span>
            <div class="searchbox__input"><span class="searchbox__placeholder">搜索</span></div>
            <div class="searchbox__actions">
              <button class="searchbox__action wego-iconfont-s icon-tupian" type="button" aria-label="选择图片"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
document.querySelectorAll(".searchbox__clear").forEach((button) => {
  button.addEventListener("click", () => {
    const box = button.closest(".searchbox");
    const field = box?.querySelector(".searchbox__field");
    if (field) {
      field.value = "";
      field.focus();
    }
    box?.querySelectorAll(".searchbox__image-token").forEach((token) => token.remove());
  });
});
</script>
</body>
</html>
