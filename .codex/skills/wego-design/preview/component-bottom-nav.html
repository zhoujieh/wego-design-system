<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<link rel="stylesheet" href="../components.css">
<style>

/* @component-css-start */

/* ── Bottom Nav ──────────────────────────────────────────────── */
/* @anatomy
   <nav class="bottom-nav">
     <div class="bottom-nav__item [active]" data-tab="dongtai">
       <div class="bottom-nav__icon">
         <img src="../assets/icons/tab-dongtai.svg" width="32" height="32" alt="">
         [<span class="badge badge--corner badge--number [badge--number-multi]">6</span>]
         [<span class="badge badge--corner badge--dot"></span>]
       </div>
       <span class="bottom-nav__label">动态</span>
     </div>
   </nav>
*/
.bottom-nav {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  justify-content: space-around;
  width: 100%;
  background: var(--bg-surface);
  border-top: 0.5px solid var(--border-neutral-l2);
  padding-bottom: var(--safe-area-bottom, env(safe-area-inset-bottom, 0px));
  flex-shrink: 0;
  overflow: visible;
}

.bottom-nav__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  flex: 1 0 0;
  min-width: 0;
  cursor: pointer;
  height: var(--size-56);
  padding: 0 var(--spacer-16);
  color: var(--text-default);
  position: relative;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: opacity var(--duration-fast) var(--ease-standard);
}

.bottom-nav__item.active { color: var(--text-brand); }
.bottom-nav__item:active,
.bottom-nav__item.is-pressed { opacity: 0.6; }

.bottom-nav__icon {
  width: var(--size-32);
  height: var(--size-32);
  flex-shrink: 0;
  position: relative;
  overflow: visible;
}

.bottom-nav__icon svg,
.bottom-nav__icon img {
  width: 100%;
  height: 100%;
  display: block;
}

.bottom-nav__label {
  font-family: var(--body-md-font-family);
  font-size: var(--body-xs-font-size);
  font-weight: var(--font-weight-regular);
  line-height: normal;
  white-space: nowrap;
  font-feature-settings: "zero";
}

/* ── Badge 复用说明 ─────────────────────────────────────── */
/* 直接复用 Badge 组件 class（已通过 components.css 引入）:
   数字角标: <span class="badge badge--corner badge--number [badge--number-multi]">6</span>
   红点:     <span class="badge badge--corner badge--dot"></span> */

/* ── 固定五项说明 ───────────────────────────────────────── */
/* bottom-nav 是固定主 Tab 组件，文案和图标不作为运行时配置项开放。
   默认顺序：动态、好友、工作台、消息、我的；使用时直接复制对应 markup 到页面。 */

/* @component-css-end */
</style>
</head>
<body>
<div class="pv-header"><h1>底部导航</h1><p>移动端主 Tab，默认 5 个 Tab，支持选中态和角标。</p></div>

<div class="label">默认态 — 动态选中</div>
<div class="preview-phone">
  <div class="preview-phone__content">页面内容区域</div>
  <nav class="bottom-nav" id="nav1">
    <div class="bottom-nav__item active" data-tab="dongtai">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-active-dongtai.svg" width="32" height="32">
      </div>
      <span class="bottom-nav__label">动态</span>
    </div>
    <div class="bottom-nav__item" data-tab="haoyou">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-haoyou.svg" width="32" height="32">
      </div>
      <span class="bottom-nav__label">好友</span>
    </div>
    <div class="bottom-nav__item" data-tab="gongzuotai">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-gongzuotai.svg" width="32" height="32">
      </div>
      <span class="bottom-nav__label">工作台</span>
    </div>
    <div class="bottom-nav__item" data-tab="xiaoxi">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-xiaoxi.svg" width="32" height="32">
      </div>
      <span class="bottom-nav__label">消息</span>
    </div>
    <div class="bottom-nav__item" data-tab="wode">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-wode.svg" width="32" height="32">
      </div>
      <span class="bottom-nav__label">我的</span>
    </div>
  </nav>
</div>


<div class="label">带角标 — 消息选中</div>
<div class="preview-phone">
  <div class="preview-phone__content">页面内容区域</div>
  <nav class="bottom-nav" id="nav2">
    <div class="bottom-nav__item" data-tab="dongtai">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-dongtai.svg" width="32" height="32">
      </div>
      <span class="bottom-nav__label">动态</span>
    </div>
    <div class="bottom-nav__item" data-tab="haoyou">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-haoyou.svg" width="32" height="32">
        <span class="badge badge--corner badge--number">6</span>
      </div>
      <span class="bottom-nav__label">好友</span>
    </div>
    <div class="bottom-nav__item" data-tab="gongzuotai">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-gongzuotai.svg" width="32" height="32">
        <span class="badge badge--corner badge--number badge--number-multi">18</span>
      </div>
      <span class="bottom-nav__label">工作台</span>
    </div>
    <div class="bottom-nav__item active" data-tab="xiaoxi">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-active-xiaoxi.svg" width="32" height="32">
        <span class="badge badge--corner badge--number badge--number-multi">45</span>
      </div>
      <span class="bottom-nav__label">消息</span>
    </div>
    <div class="bottom-nav__item" data-tab="wode">
      <div class="bottom-nav__icon">
        <img src="../assets/icons/tab-wode.svg" width="32" height="32">
        <span class="badge badge--corner badge--dot"></span>
      </div>
      <span class="bottom-nav__label">我的</span>
    </div>
  </nav>
</div>

<script>
/* Tab icon path mapping */
const TAB_ICONS = {
  dongtai:   { active: '../assets/icons/tab-active-dongtai.svg', default: '../assets/icons/tab-dongtai.svg' },
  haoyou:    { active: '../assets/icons/tab-active-haoyou.svg', default: '../assets/icons/tab-haoyou.svg' },
  gongzuotai: { active: '../assets/icons/tab-active-gongzuotai.svg', default: '../assets/icons/tab-gongzuotai.svg' },
  xiaoxi:    { active: '../assets/icons/tab-active-xiaoxi.svg', default: '../assets/icons/tab-xiaoxi.svg' },
  wode:      { active: '../assets/icons/tab-active-wode.svg', default: '../assets/icons/tab-wode.svg' },
};

/* Click handler — switch active tab immediately, no press/hover animation */
document.querySelectorAll('.bottom-nav').forEach(nav => {
  nav.querySelectorAll('.bottom-nav__item').forEach(item => {
    item.addEventListener('click', () => {
      const tab = item.dataset.tab;
      if (!tab) return;

      nav.querySelectorAll('.bottom-nav__item').forEach(el => {
        el.classList.remove('active');
        const t = el.dataset.tab;
        if (t && TAB_ICONS[t]) {
          /* Only replace the icon img, preserve badge elements */
          const iconWrap = el.querySelector('.bottom-nav__icon');
          const badge = iconWrap.querySelector('.badge');
          iconWrap.innerHTML = '<img src="' + TAB_ICONS[t].default + '" width="32" height="32">';
          if (badge) iconWrap.appendChild(badge);
        }
      });

      item.classList.add('active');
      if (TAB_ICONS[tab]) {
        const iconWrap = item.querySelector('.bottom-nav__icon');
        const badge = iconWrap.querySelector('.badge');
        iconWrap.innerHTML = '<img src="' + TAB_ICONS[tab].active + '" width="32" height="32">';
        if (badge) iconWrap.appendChild(badge);
      }
    });
  });
});
</script>
</body>
</html>
