<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wegoux 组件预览总览</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>
html,
body {
  height: 100vh;
  margin: 0;
  overflow: hidden;
  scrollbar-width: none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
  display: none;
}

body {
  display: flex;
  flex-direction: column;
  padding: 20px 16px 16px;
  box-sizing: border-box;
}

.pv-header {
  flex-shrink: 0;
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: 0;
}

.pv-header__intro {
  margin-top: 12px;
  padding: 16px;
  border: 1px solid var(--border-neutral-l2);
  border-radius: var(--radius-12);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: var(--body-md-font-size);
  line-height: var(--body-md-line-height);
}

.pv-header__intro strong {
  color: var(--text-default);
}

.overview-layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 272px minmax(0, 1fr);
  gap: 16px;
  margin-top: 16px;
}

.overview-sidebar,
.overview-viewer {
  min-width: 0;
  border: 1px solid var(--border-neutral-l2);
  border-radius: var(--radius-12);
  background: var(--bg-surface);
  box-shadow: var(--shadow-xs);
}

.overview-sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
  padding: 16px 0;
  scrollbar-width: none;
}

.overview-sidebar::-webkit-scrollbar {
  display: none;
}

.overview-sidebar__header {
  padding: 0 16px 16px;
}

.overview-sidebar__title {
  margin: 0;
  color: var(--text-default);
  font-size: var(--heading-sm-font-size);
  line-height: var(--heading-sm-line-height);
}

.overview-sidebar__sub {
  margin-top: 4px;
  color: var(--text-tertiary);
  font-size: var(--body-sm-font-size);
  line-height: var(--body-sm-line-height);
}

.overview-nav-group + .overview-nav-group {
  margin-top: 16px;
}

.overview-nav-group__title {
  margin: 0 16px 8px;
  color: var(--text-tertiary);
  font-size: var(--body-xs-font-size);
  line-height: var(--body-xs-line-height);
}

.overview-nav-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.overview-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: calc(100% - 16px);
  margin: 0 8px;
  padding: 12px;
  border: 0;
  border-radius: var(--radius-8);
  background: transparent;
  color: var(--text-default);
  text-align: left;
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-standard);
}

.overview-nav-item:hover {
  background: var(--bg-overlay-l1);
}

.overview-nav-item.is-active {
  background: var(--status-success-surface-l1);
}

.overview-nav-item__main {
  min-width: 0;
  flex: 1;
}

.overview-nav-item__name {
  display: block;
  color: var(--text-default);
  font-size: var(--body-md-font-size);
  line-height: var(--body-md-line-height);
}

.overview-nav-item__slug {
  display: block;
  margin-top: 2px;
  color: var(--text-tertiary);
  font-size: var(--body-xs-font-size);
  line-height: var(--body-xs-line-height);
}

.overview-nav-item__status {
  flex-shrink: 0;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--bg-overlay-l1);
  color: var(--text-secondary);
  font-size: var(--body-xs-font-size);
  line-height: var(--body-xs-line-height);
}

.overview-nav-item.is-active .overview-nav-item__status {
  background: var(--bg-surface);
  color: var(--status-success-default);
}

.overview-viewer {
  display: flex;
  flex-direction: column;
  min-height: 0;
  scrollbar-width: none;
}

.overview-viewer::-webkit-scrollbar {
  display: none;
}

.overview-viewer__frame-wrap {
  flex: 1;
  min-height: 0;
  padding: 16px;
  box-sizing: border-box;
}

.overview-viewer iframe {
  display: block;
  width: 100%;
  height: 100%;
  border: 1px solid var(--border-neutral-l2);
  border-radius: var(--radius-8);
  background: var(--bg-page);
  scrollbar-width: none;
}

.overview-viewer iframe::-webkit-scrollbar {
  display: none;
}

@media (max-width: 991px) {
  .overview-layout {
    grid-template-rows: auto minmax(0, 1fr);
    grid-template-columns: 1fr;
  }

  .overview-sidebar {
    max-height: 240px;
    flex-shrink: 0;
  }

  .overview-nav-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    padding: 0 8px;
  }

  .overview-nav-item {
    width: 100%;
    margin: 0;
  }
}

@media (max-width: 767px) {
  body {
    padding: 16px 12px 12px;
  }
}
</style>
</head>

          <span class="overview-nav-item__main">

<script>
const navItems = Array.from(document.querySelectorAll(".overview-nav-item"));
const viewerFrame = document.getElementById("viewer-frame");

function syncViewerBySlug(slug) {
  const currentItem = navItems.find((item) => item.dataset.slug === slug) || navItems[0];
  if (!currentItem) return;

  navItems.forEach((item) => {
    item.classList.toggle("is-active", item === currentItem);
  });

  const { src } = currentItem.dataset;
  viewerFrame.src = src;

  const nextHash = `#${currentItem.dataset.slug}`;
  if (window.location.hash !== nextHash) {
    history.replaceState(null, "", nextHash);
  }
}

navItems.forEach((item) => {
  item.addEventListener("click", () => {
    syncViewerBySlug(item.dataset.slug);
  });
});

window.addEventListener("hashchange", () => {
  syncViewerBySlug(window.location.hash.replace("#", ""));
});

syncViewerBySlug(window.location.hash.replace("#", ""));

viewerFrame.addEventListener("load", () => {
  try {
    const doc = viewerFrame.contentDocument;
    if (doc && doc.documentElement) {
      doc.documentElement.style.scrollbarWidth = "none";
    }
    if (doc && doc.body) {
      doc.body.style.scrollbarWidth = "none";
    }
  } catch (e) {}
});
</script>
