<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务设置 - 岗位权限</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../scaffold.css">
<link rel="stylesheet" href="../../iconfont.css">
<link rel="stylesheet" href="../../components.css">
<style>

.phone-status {

.section-group {

.section-gap {

</head>
<body class="uikit-page">

<script type="text/babel">
const { useState } = React;

/* ═══ Status Bar ═══ */
function StatusBar() {
  return (
    <div className="phone-status">
      <span>9:41</span>
      <span>5G</span>
    </div>
  );
}

/* ═══ Home Indicator ═══ */
function HomeIndicator() {
  return (
    <div className="phone-indicator">
      <div className="phone-indicator-bar"></div>
    </div>
  );
}

/* ═══ Checkmark SVG (from component-checkbox.html) ═══ */
const CHECKMARK_SVG = (
  <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
    <path fillRule="evenodd" clipRule="evenodd" d="M4.41406 6.5L1.41406 3.5L0 4.91406L4.41406 9.32812L12.3281 1.41406L10.9141 0L4.41406 6.5Z" fill="white"/>
  </svg>
);

/* ═══ Business Settings Screen ═══ */
function BizSettingsScreen() {
  const [attributionChecked, setAttributionChecked] = useState(true);
  const [switches, setSwitches] = useState({
    selection: true, fans: true, order: true, purchase: true,
    delivery: true, finance: true, ops: true, warehouse: true

    purchaseOrder: true, viewSupplier: true, manageSupplier: true,

    deliveryGoods: true, setShipping: true,
    walletOp: true, viewTransaction: true,
    privateDomain: true, createManageTask: true, shopDeco: true, marketingGames: true

    <div>
      {/* ═════════ 业务信息 ═════════ */}

        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable">
          <div className="cell__body">
            <div className="cell__content">
              <div className="cell__title-row"><span className="cell__title">业绩归属</span></div>

        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"

              <div className="cell__title-row"><span className="cell__title">允许修改粉丝的绑定员工</span></div>
            </div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          onClick={() => togglePermission('viewVisitors')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.viewVisitors ? ' checkbox--checked' : ''}`}>

            <div className="cell__content">

            </div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          onClick={() => togglePermission('createCustomer')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.createCustomer ? ' checkbox--checked' : ''}`}>
              <div className="checkbox__inner"></div>
              {permissions.createCustomer && <div className="checkbox__icon">{CHECKMARK_SVG}</div>}
            </div>
          </div>
          <div className="cell__body">
            <div className="cell__content">
              <div className="cell__title-row"><span className="cell__title">允许创建客户</span></div>
            </div>
          </div>
        </div>
      </div>
      <div className="section-gap"></div>

      {/* ═════════ 仓库 ═════════ */}
      <div className="section-title">仓库</div>
      <div className="section-group">
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          onClick={() => toggleSwitch('warehouse')}>
          <div className="cell__body">
            <div className="cell__content">
              <div className="cell__title-row"><span className="cell__title">仓库</span></div>
            </div>
            <div className="cell__action">
              <div className={`switch${switches.warehouse ? ' switch--on' : ' switch--off'}`}>
                <div className="switch__thumb"></div>
              </div>
            </div>
          </div>
        </div>
        <div className="cell cell--single cell--divider-right-edge cell--bg-white cell--clickable"
          onClick={() => togglePermission('manageSupplier')}>
          <div className="cell__select">
            <div className={`checkbox${permissions.manageSupplier ? ' checkbox--checked' : ''}`}>
              <div className="checkbox__inner"></div>
              {permissions.manageSupplier && <div className="checkbox__icon">{CHECKMARK_SVG}</div>}

            </div>
            <div className="cell__action">
              <span className="cell__action-text" style={{color:'var(--text-tertiary)'}}>未分配</span>
              <i className="wego-iconfont-s icon-youjiantou16 cell__arrow" style={{color:'var(--text-tertiary)'}}></i>
            </div>
          </div>
        </div>
      </div>
      <div className="section-gap"></div>

          onClick={() => toggleSwitch('order')}>
