<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link 链接 — 微购设计系统</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../scaffold.css">
<link rel="stylesheet" href="../iconfont.css">
<style>

/* @component-css-start */
/* ── Link (Standalone) ── */
.link { display:inline-flex; align-items:center; height:20px; gap:var(--spacer-4); color:var(--text-link); font-size:var(--body-md-font-size); font-weight:var(--font-weight-medium); line-height:var(--body-md-line-height); cursor:pointer; text-decoration:none; transition:background var(--duration-fast) var(--ease-standard), opacity var(--duration-fast) var(--ease-standard); border-radius:0; padding:0 var(--spacer-4); user-select:none; -webkit-tap-highlight-color:transparent; }
/* Pressed state — 无圆角 */
.link:active { background:var(--bg-overlay-l2); }
/* Disabled state */
.link--disabled { opacity:0.2; pointer-events:none; cursor:not-allowed; }
.link--disabled:active { background:transparent; }

/* ── LinkSpan (Inline) ── */
.link--inline { height:auto; padding:0; }
.link--inline:active { background:var(--bg-overlay-l2); }

/* @component-css-end */
</style>
</head>
<body>
<div class="pv-header"><h1>链接</h1><p>独立链接和内联链接，适合文字跳转操作。</p></div>

<div class="pv-section__title">Standalone — 默认态</div>
<div class="row">
  <span class="label">纯文本</span>
  <a class="link" href="javascript:void(0)">View details</a>
</div>


<div class="pv-section__title">Standalone — 禁用态</div>
<div class="row">
  <span class="label">纯文本禁用</span>
  <a class="link link--disabled" href="javascript:void(0)">View details</a>
</div>


<div class="pv-section__title">Inline — RichText 内联链接</div>
<div class="row" style="max-width:320px; flex-wrap:wrap;">
  <span style="font-size:var(--body-md-font-size); color:var(--text-secondary); line-height:var(--body-md-line-height);">请阅读 </span>
  <a class="link link--inline" href="javascript:void(0)">服务协议</a>
  <span style="font-size:var(--body-md-font-size); color:var(--text-secondary); line-height:var(--body-md-line-height);"> 和 </span>
  <a class="link link--inline" href="javascript:void(0)">隐私政策</a>
</div>
<div class="row" style="max-width:320px; flex-wrap:wrap; margin-top:var(--spacer-16);">
  <span style="font-size:var(--body-lg-font-size); color:var(--text-secondary); line-height:var(--body-lg-line-height);">订单详情请 </span>
  <a class="link link--inline" href="javascript:void(0)" style="font-size:var(--body-lg-font-size); line-height:var(--body-lg-line-height);">查看详情</a>
  <span style="font-size:var(--body-lg-font-size); color:var(--text-secondary); line-height:var(--body-lg-line-height);"> 了解更多信息</span>
</div>


<div class="pv-section__title">交互提示</div>
<div style="font-size:var(--body-sm-font-size); color:var(--text-tertiary); max-width:400px; line-height:1.6;">
  Standalone 和 Inline 链接按下时背景均变为 neutral-alpha-06，无圆角，松手恢复。禁用时不透明度降至 20%，不响应点击。按住任意链接可体验按下态。
</div>

</body>
</html>
