<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="微购相册" />
  <title>微购相册原型</title>
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/safe-area.css" />
  <link rel="stylesheet" href="./css/viewport.css" />
</head>
<body data-bg="page" data-host-shell="true">
  <div class="preview-shell">
    <div class="phone-frame">
      <div class="phone-screen" data-phone-screen>
        <div class="phone-status" aria-hidden="true">
          <span>9:41</span>
          <span>5G</span>
        </div>

        <main class="host-shell-page" data-host-content>
          <section class="host-shell-page__panel host-shell-page__panel--active host-shell-page__panel--blank" data-host-tab="dongtai" aria-label="动态"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="haoyou" hidden aria-label="好友"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="workspace" hidden aria-label="工作台"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="xiaoxi" hidden aria-label="消息"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="my" hidden aria-label="我的"></section>
        </main>

        <div class="app-scene-layer" data-scene-layer hidden></div>
        <div class="app-overlay-layer" data-overlay-layer hidden></div>
        <div class="app-dialog-host" data-dialog-host role="region" aria-label="对话框浮层"></div>
        <div class="app-toast-host" data-toast-host aria-live="polite" role="status"></div>

        <nav class="bottom-nav" data-bottom-nav>
          <button type="button" class="bottom-nav__item active" data-host-tab-trigger="dongtai">
            <span class="bottom-nav__icon"><img src="./lib/assets/icons/tab-active-dongtai.svg" alt="" data-tab-icon="dongtai" /></span>
            <span class="bottom-nav__label">动态</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="haoyou">
            <span class="bottom-nav__icon"><img src="./lib/assets/icons/tab-haoyou.svg" alt="" data-tab-icon="haoyou" /></span>
            <span class="bottom-nav__label">好友</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="workspace">
            <span class="bottom-nav__icon"><img src="./lib/assets/icons/tab-gongzuotai.svg" alt="" data-tab-icon="gongzuotai" /></span>
            <span class="bottom-nav__label">工作台</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="xiaoxi">
            <span class="bottom-nav__icon"><img src="./lib/assets/icons/tab-xiaoxi.svg" alt="" data-tab-icon="xiaoxi" /></span>
            <span class="bottom-nav__label">消息</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="my">
            <span class="bottom-nav__icon"><img src="./lib/assets/icons/tab-wode.svg" alt="" data-tab-icon="wode" /></span>
            <span class="bottom-nav__label">我的</span>
          </button>
        </nav>

        <div class="phone-indicator" aria-hidden="true">
          <div class="phone-indicator-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function lockStableMobileViewport() {
      var root = document.documentElement;
      var body = document.body;
      var html = document.documentElement;
      var stableHeight = 0;
      var stableTallest = 0;
      var hostShell = body && body.getAttribute('data-host-shell') === 'true';
      var allowLock = hostShell;

      function readViewport() {
        return {
          innerHeight: window.innerHeight,
          innerWidth: window.innerWidth,
          clientHeight: html.clientHeight,
          visualHeight: window.visualViewport ? Math.round(window.visualViewport.height) : window.innerHeight
        };
      }

      function updateHeight() {
        if (!allowLock) return;
        var sizes = readViewport();
        var target = sizes.visualHeight || sizes.innerHeight;
        if (target && target !== stableHeight) {
          stableHeight = target;
          root.style.setProperty('--wego-stable-viewport-height', target + 'px');
        }
        if (sizes.innerHeight > stableTallest) {
          stableTallest = sizes.innerHeight;
          root.style.setProperty('--wego-stable-viewport-tallest', stableTallest + 'px');
        }
      }

      function clearStableHeight() {
        if (!allowLock) return;
        if (stableHeight) {
          stableHeight = 0;
          root.style.removeProperty('--wego-stable-viewport-height');
        }
      }

      window.addEventListener('resize', updateHeight);
      window.addEventListener('orientationchange', function () {
        clearStableHeight();
        updateHeight();
      });
      window.addEventListener('pageshow', updateHeight);
      document.addEventListener('focusout', function () {
        setTimeout(updateHeight, 0);
        setTimeout(updateHeight, 120);
        setTimeout(updateHeight, 320);
      });
      document.addEventListener('focusin', updateHeight);
      updateHeight();
    })();
  </script>
  <script src="./js/viewport.js"></script>
  <script src="./js/routes.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
