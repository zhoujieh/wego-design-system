<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="微购相册" />
  <title>微购相册原型</title>
  <link rel="stylesheet" href="./lib/colors_and_type.css" />
  <link rel="stylesheet" href="./lib/components.css" />
  <link rel="stylesheet" href="./lib/iconfont.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body data-bg="page" data-host-shell="true">
  <div class="preview-shell">
    <div class="phone-frame">
      <div class="phone-screen" data-phone-screen>
        <div class="phone-status" aria-hidden="true">
          <span>9:41</span>
          <span>5G</span>
        </div>

        <main class="host-shell-page" data-host-content>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="dongtai" hidden aria-label="动态"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="haoyou" hidden aria-label="好友"></section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="workspace" hidden aria-label="工作台">
            <section class="card card--surface host-shell-list-card">
              <div class="card__content host-shell-list-card__content">
                <div class="host-shell-list" data-entry-group="workspace-tools"></div>
              </div>
            </section>
          </section>
          <section class="host-shell-page__panel host-shell-page__panel--blank" data-host-tab="xiaoxi" hidden aria-label="消息"></section>

          <section class="host-shell-page__panel" data-host-tab="my" hidden>
            <section class="card card--surface host-shell-profile-card">
              <div class="card__content host-shell-profile">
                <div class="host-shell-profile__main">
                  <div class="avatar avatar--56 avatar--image">
                    <img src="./lib/image/avatar-defult.png" alt="默认头像" />
                  </div>
                  <div class="host-shell-profile__meta">
                    <div class="host-shell-profile__title-row">
                      <h1 class="host-shell-profile__title">微购相册·店主</h1>
                      <span class="badge badge--inline badge--text host-shell-profile__badge"><span class="badge__text">SVIP</span></span>
                    </div>
                    <p class="host-shell-profile__subtitle">超级管理员</p>
                  </div>
                </div>
                <div class="host-shell-profile__actions">
                  <button type="button" class="button button--secondary button--sm">+ 员工</button>
                  <button type="button" class="button button--secondary button--sm">员工管理</button>
                </div>
              </div>
            </section>

            <section class="card card--filled host-shell-membership-card">
              <div class="card__content host-shell-membership">
                <div class="host-shell-membership__header">
                  <span class="card__header host-shell-membership__label">SVIP 年度超级会员</span>
                  <button type="button" class="button button--primary button--sm">去续费</button>
                </div>
                <div class="host-shell-membership__body">
                  <div class="card__body host-shell-membership__usage">
                    <strong>90.33G</strong>
                    <span>/360G</span>
                  </div>
                  <button type="button" class="link link--default host-shell-link-button" data-route-id="my-space-management" data-entry-label="空间管理">空间管理</button>
                </div>
              </div>
            </section>

            <section class="card card--surface host-shell-app-card">
              <div class="card__content host-shell-app-card__content">
                <div class="host-shell-grid" data-entry-group="my-app-center">
                  <button type="button" class="host-shell-grid-entry" data-route-id="my-start-group" data-entry-label="一键开团">
                    <img src="./lib/icons/app-center/一键开团.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">一键开团</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry" data-route-id="my-shop-decoration" data-entry-label="店铺装修">
                    <img src="./lib/icons/app-center/店铺装修.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">店铺装修</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry" data-route-id="my-collect-code" data-entry-label="收款码">
                    <img src="./lib/icons/app-center/收款码.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">收款码</span>
                  </button>
                  <button type="button" class="host-shell-grid-entry" data-route-id="my-store" data-entry-label="我的小店">
                    <img src="./lib/icons/app-center/我的小店.svg" alt="" class="host-shell-grid-entry__icon" />
                    <span class="host-shell-grid-entry__label">我的小店</span>
                  </button>
                </div>
              </div>
            </section>

            <section class="card card--surface host-shell-list-card">
              <div class="card__content host-shell-list-card__content">
                <div class="host-shell-list" data-entry-group="my-settings"></div>
              </div>
            </section>
          </section>
        </main>

        <div class="app-scene-layer" data-scene-layer hidden></div>
        <div class="app-overlay-layer" data-overlay-layer hidden></div>
        <div class="app-toast" data-toast hidden></div>

        <nav class="bottom-nav" data-bottom-nav>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="dongtai">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-dongtai.svg" alt="" data-tab-icon="dongtai" /></span>
            <span class="bottom-nav__label">动态</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="haoyou">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-haoyou.svg" alt="" data-tab-icon="haoyou" /></span>
            <span class="bottom-nav__label">好友</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="workspace">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-gongzuotai.svg" alt="" data-tab-icon="gongzuotai" /></span>
            <span class="bottom-nav__label">工作台</span>
          </button>
          <button type="button" class="bottom-nav__item" data-host-tab-trigger="xiaoxi">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-xiaoxi.svg" alt="" data-tab-icon="xiaoxi" /></span>
            <span class="bottom-nav__label">消息</span>
          </button>
          <button type="button" class="bottom-nav__item active" data-host-tab-trigger="my">
            <span class="bottom-nav__icon"><img src="./lib/icons/tab-active-wode.svg" alt="" data-tab-icon="wode" /></span>
            <span class="bottom-nav__label">我的</span>
          </button>
        </nav>

        <div class="phone-indicator" aria-hidden="true">
          <div class="phone-indicator-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/routes.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
